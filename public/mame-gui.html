<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAME GUI — Naimean</title>
  <meta name="description" content="Configure Noah's Arcade MAME cabinet URLs.">
  <style>
    :root {
      --bg: #06060b;
      --panel: rgba(14, 16, 24, 0.92);
      --border: rgba(255, 180, 92, 0.28);
      --text: #f8ead8;
      --muted: rgba(248, 234, 216, 0.72);
      --accent: #ff9d3d;
      --accent-2: #ffd166;
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      background:
        linear-gradient(rgba(6, 6, 11, 0.72), rgba(6, 6, 11, 0.9)),
        url('/assets/images/den_arcade.PNG') center/cover fixed;
    }

    main {
      width: min(1200px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
      padding: 24px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent-2);
      text-decoration: none;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.05;
    }

    .lead {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
      align-items: center;
    }

    .controls select,
    .controls button,
    .card input {
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      background: rgba(6, 6, 11, 0.75);
      color: var(--text);
      padding: 8px 10px;
      font-size: 0.9rem;
    }

    .controls select {
      min-width: 260px;
      max-width: 100%;
    }

    .controls button {
      font-weight: 700;
      cursor: pointer;
    }

    .controls button:hover,
    .controls button:focus-visible,
    .controls select:focus-visible,
    .card input:focus-visible {
      border-color: var(--accent);
      outline: none;
      box-shadow: 0 0 0 2px rgba(255, 157, 61, 0.24);
    }

    #status {
      margin: 0 0 16px;
      color: var(--muted);
    }

    #editor-status {
      margin: 0 0 16px;
      color: var(--muted);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 14px;
    }

    .card {
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      padding: 12px;
      scroll-margin-top: 24px;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 1rem;
    }

    .card p {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .card label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.86rem;
      color: var(--muted);
    }

    .card input {
      width: 100%;
    }

    .url-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .url-row input {
      flex: 1;
      min-width: 0;
    }

    .google-btn {
      flex-shrink: 0;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      background: rgba(6, 6, 11, 0.75);
      color: var(--accent-2);
      padding: 8px 10px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .google-btn:hover,
    .google-btn:focus-visible {
      border-color: var(--accent);
      outline: none;
      box-shadow: 0 0 0 2px rgba(255, 157, 61, 0.24);
    }

    @media (max-width: 640px) {
      main {
        width: min(100% - 20px, 1200px);
        padding-top: 20px;
      }

      .panel {
        border-radius: 16px;
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <div class="top-actions">
        <a class="back-link" href="/noahs-arcade.html">← Back to Noah's Arcade</a>
      </div>

      <h1>MAME GUI</h1>
      <p class="lead">Each cabinet has its own configuration card below. Use the dropdown to jump to any cabinet quickly.</p>

      <div class="controls">
        <select id="cabinet-jump" aria-label="Jump to cabinet">
          <option value="">Jump to cabinet…</option>
        </select>
        <button type="button" id="save-urls">Save URL updates</button>
        <button type="button" id="reset-urls">Reset all updates</button>
      </div>

      <p id="status">Loading cabinets…</p>
      <p id="editor-status"></p>
      <div id="cards" class="cards" hidden></div>
    </section>
  </main>

  <script>
    (async () => {
      const status = document.getElementById('status');
      const editorStatus = document.getElementById('editor-status');
      const cards = document.getElementById('cards');
      const jump = document.getElementById('cabinet-jump');
      const saveButton = document.getElementById('save-urls');
      const resetButton = document.getElementById('reset-urls');
      const URL_OVERRIDES_KEY = 'naimean.arcade.urlOverrides';

      function parseOverrides() {
        try {
          const raw = localStorage.getItem(URL_OVERRIDES_KEY);
          if (!raw) return {};
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : {};
        } catch (error) {
          console.warn('Failed to parse saved arcade URL overrides.', error);
          return {};
        }
      }

      function normalizeUrl(input) {
        if (typeof input !== 'string') return null;
        const trimmed = input.trim();
        if (!trimmed) return '';
        if (/^https?:\/\//i.test(trimmed)) return trimmed;
        if (/^(\/|\.\/|\.\.\/|\?|#)/.test(trimmed)) return trimmed;
        return null;
      }

      function setEditorStatus(message, isError = false) {
        editorStatus.textContent = message;
        editorStatus.style.color = isError ? '#fda4af' : 'var(--muted)';
      }

      let cabinets = [];
      let urlOverrides = parseOverrides();

      function getCabinetUrl(cabinet) {
        const override = normalizeUrl(urlOverrides[cabinet.name]);
        if (override) return override;
        const fallback = normalizeUrl(cabinet.url);
        return fallback || '';
      }

      function renderJumpOptions() {
        jump.innerHTML = '<option value="">Jump to cabinet…</option>';
        cabinets.forEach((cabinet, index) => {
          const option = document.createElement('option');
          option.value = String(index);
          option.textContent = cabinet.name;
          jump.appendChild(option);
        });
      }

      function renderCards() {
        cards.innerHTML = '';
        cabinets.forEach((cabinet, index) => {
          const card = document.createElement('article');
          card.className = 'card';
          card.id = `cabinet-card-${index}`;
          card.dataset.index = String(index);

          const heading = document.createElement('h2');
          heading.textContent = cabinet.name;
          card.appendChild(heading);

          const activeUrl = getCabinetUrl(cabinet);
          const activeText = document.createElement('p');
          activeText.textContent = `Current URL: ${activeUrl || 'No URL configured'}`;
          card.appendChild(activeText);

          if (normalizeUrl(urlOverrides[cabinet.name])) {
            const defaultText = document.createElement('p');
            defaultText.textContent = `Default URL: ${cabinet.url || 'No URL configured'}`;
            card.appendChild(defaultText);
          }

          const label = document.createElement('label');
          const inputId = `cabinet-url-${index}`;
          label.setAttribute('for', inputId);
          label.textContent = 'URL override';
          card.appendChild(label);

          const urlRow = document.createElement('div');
          urlRow.className = 'url-row';

          const input = document.createElement('input');
          input.type = 'text';
          input.id = inputId;
          input.dataset.name = cabinet.name;
          input.placeholder = cabinet.url || '/path-or-https://example.com';
          const override = normalizeUrl(urlOverrides[cabinet.name]);
          input.value = override || '';
          urlRow.appendChild(input);

          const googleBtn = document.createElement('button');
          googleBtn.type = 'button';
          googleBtn.className = 'google-btn';
          googleBtn.textContent = 'Google';
          googleBtn.title = `Search Google for "${cabinet.name}"`;
          googleBtn.addEventListener('click', () => {
            const query = encodeURIComponent('DOS Game Online ' + cabinet.name);
            window.location.href = `https://www.google.com/search?q=${query}`;
          });
          urlRow.appendChild(googleBtn);

          card.appendChild(urlRow);

          cards.appendChild(card);
        });
      }

      function saveUrlOverrides() {
        const nextOverrides = {};
        const invalid = [];
        const inputs = cards.querySelectorAll('input[data-name]');

        inputs.forEach((input) => {
          const normalized = normalizeUrl(input.value);
          if (normalized === null) {
            invalid.push(input.dataset.name);
            return;
          }
          if (normalized) nextOverrides[input.dataset.name] = normalized;
        });

        if (invalid.length) {
          setEditorStatus(`Could not save. Invalid URL format: ${invalid.join(', ')}`, true);
          return;
        }

        urlOverrides = nextOverrides;
        localStorage.setItem(URL_OVERRIDES_KEY, JSON.stringify(urlOverrides));
        renderCards();
        setEditorStatus('URL updates saved.');
      }

      function resetUrlOverrides() {
        urlOverrides = {};
        localStorage.removeItem(URL_OVERRIDES_KEY);
        renderCards();
        setEditorStatus('URL updates reset.');
      }

      jump.addEventListener('change', () => {
        const target = cards.querySelector(`#cabinet-card-${jump.value}`);
        if (!target) return;
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        const input = target.querySelector('input');
        if (input) input.focus({ preventScroll: true });
      });

      saveButton.addEventListener('click', saveUrlOverrides);
      resetButton.addEventListener('click', resetUrlOverrides);

      try {
        const response = await fetch('/assets/arcade/cabinets.json', { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`Failed to load cabinets (${response.status})`);
        }

        cabinets = await response.json();
        status.hidden = true;
        cards.hidden = false;
        renderJumpOptions();
        renderCards();
        setEditorStatus('Saved URL updates are applied automatically in Noah’s Arcade.');
      } catch (error) {
        status.textContent = error.message;
        setEditorStatus('');
      }
    })();
  </script>
</body>
</html>
