<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Noah's Arcade — Naimean</title>
  <meta name="description" content="Step into Noah's arcade and launch a cabinet from the Naimean collection.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Naimean">
  <meta property="og:url" content="https://naimean.com/noahs-arcade">
  <meta property="og:title" content="Noah's Arcade">
  <meta property="og:description" content="Browse the Naimean arcade cabinet collection.">
  <meta property="og:image" content="https://naimean.com/assets/images/den_arcade.v20260528.PNG">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Noah's Arcade">
  <meta name="twitter:description" content="Browse the Naimean arcade cabinet collection.">
  <meta name="twitter:image" content="https://naimean.com/assets/images/den_arcade.v20260528.PNG">
  <style>
    :root {
      --ceiling-h: 8vh;
      --floor-h: 9vh;
      --cab-h: calc((100vh - var(--ceiling-h) - var(--floor-h)) * 1.1);
      --cab-w: calc(var(--cab-h) * 0.54);
      --cab-gap: clamp(8px, 1.1vw, 22px);
      --cab-pad: clamp(28px, 7vw, 120px);
      --text: #f0dfc0;
      --muted: rgba(240, 223, 192, 0.62);
      --accent: #ff9d3d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0910;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      touch-action: none;
      user-select: none;
    }

    /* ── Viewport & world ──────────────────────────────────── */

    #arcade-viewport {
      position: fixed;
      inset: 0;
      overflow: hidden;
      cursor: grab;
      isolation: isolate;
    }

    #arcade-viewport.dragging {
      cursor: grabbing;
    }

    /* Wall texture: subtle vertical dark stripes like old wood paneling */
    #arcade-viewport::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-color: #0a0910;
      background-image:
        repeating-linear-gradient(
          90deg,
          transparent 0px,
          transparent 79px,
          rgba(0, 0, 0, 0.18) 79px,
          rgba(0, 0, 0, 0.18) 80px
        );
    }

    /* Ambient screen-glow haze bleeding up from cabinet row */
    #arcade-viewport::after {
      content: '';
      position: absolute;
      bottom: var(--floor-h);
      left: 0;
      right: 0;
      height: 28vh;
      z-index: 0;
      pointer-events: none;
      background: radial-gradient(
        ellipse 80% 100% at 50% 100%,
        rgba(40, 20, 80, 0.45) 0%,
        transparent 70%
      );
    }

    /* The scrollable world: a flex row of cabinets, vertically centered in the gap between ceiling & floor */
    #world {
      position: absolute;
      left: 0;
      top: var(--ceiling-h);
      height: var(--cab-h);
      display: flex;
      align-items: flex-end;
      padding: 0 var(--cab-pad);
      gap: var(--cab-gap);
      will-change: transform;
      z-index: 2;
      /* Width is set by JS after cabinets are rendered */
    }

    /* ── Ceiling ───────────────────────────────────────────── */

    #arcade-ceiling {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: var(--ceiling-h);
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
      /* Dropped ceiling tile grid */
      background-color: #0f0f1a;
      background-image:
        linear-gradient(rgba(200, 210, 180, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200, 210, 180, 0.055) 1px, transparent 1px);
      background-size: 96px 72px;
      /* Seam between ceiling and wall */
      box-shadow: 0 3px 18px rgba(0, 0, 0, 0.7);
    }

    /* Fluorescent tube glow at the front of the ceiling */
    #arcade-ceiling::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(200, 235, 180, 0.22) 8%,
        rgba(220, 245, 200, 0.38) 20%,
        rgba(200, 235, 180, 0.22) 35%,
        transparent 42%,
        transparent 48%,
        rgba(200, 235, 180, 0.22) 54%,
        rgba(220, 245, 200, 0.38) 66%,
        rgba(200, 235, 180, 0.22) 80%,
        transparent 88%,
        transparent 100%
      );
    }

    /* Fluorescent tube light bloom spilling down from ceiling */
    #arcade-ceiling::after {
      content: '';
      position: absolute;
      bottom: -28px;
      left: 0;
      right: 0;
      height: 40px;
      pointer-events: none;
      background: linear-gradient(
        to bottom,
        rgba(200, 235, 180, 0.07) 0%,
        transparent 100%
      );
    }

    /* ── Floor / carpet ────────────────────────────────────── */

    #arcade-floor {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--floor-h);
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
      /* Classic grimy 90s arcade carpet */
      background-color: #190820;
      background-image:
        /* Diamond crosshatch in teal */
        repeating-linear-gradient(
          45deg,
          transparent 0px,
          transparent 9px,
          rgba(0, 155, 110, 0.13) 9px,
          rgba(0, 155, 110, 0.13) 11px
        ),
        repeating-linear-gradient(
          -45deg,
          transparent 0px,
          transparent 9px,
          rgba(0, 155, 110, 0.10) 9px,
          rgba(0, 155, 110, 0.10) 11px
        ),
        /* Broader diamond in maroon */
        repeating-linear-gradient(
          45deg,
          transparent 0px,
          transparent 19px,
          rgba(130, 15, 45, 0.14) 19px,
          rgba(130, 15, 45, 0.14) 21px
        ),
        repeating-linear-gradient(
          -45deg,
          transparent 0px,
          transparent 19px,
          rgba(130, 15, 45, 0.14) 19px,
          rgba(130, 15, 45, 0.14) 21px
        ),
        /* Sparse gold accent dots */
        repeating-linear-gradient(
          0deg,
          transparent 0px,
          transparent 39px,
          rgba(160, 110, 0, 0.08) 39px,
          rgba(160, 110, 0, 0.08) 41px
        );
      /* Dirt/wear gradient — darker at edges */
      box-shadow:
        inset 0 0 40px rgba(0, 0, 0, 0.55),
        inset 0 8px 16px rgba(0, 0, 0, 0.4);
    }

    /* Thin baseboard / scuff line at top of floor */
    #arcade-floor::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(
        90deg,
        #0a0612 0%,
        #1a0e2a 20%,
        #0d0918 50%,
        #1a0e2a 80%,
        #0a0612 100%
      );
    }

    /* Reflected glow from cabinet screens bleeding onto carpet */
    #arcade-floor::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 60%;
      background: linear-gradient(
        to bottom,
        rgba(60, 20, 100, 0.28) 0%,
        transparent 100%
      );
    }

    /* ── Cabinet cards ─────────────────────────────────────── */

    .cabinet-card {
      position: relative;
      height: var(--cab-h);
      width: var(--cab-w);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      text-decoration: none;
      color: var(--text);
      cursor: pointer;
      transition: transform 0.18s ease, filter 0.18s ease;
      -webkit-user-drag: none;
      /* Ambient floor glow via box-shadow (accent color set per-card in JS) */
      filter: drop-shadow(0 6px 18px var(--glow, rgba(255, 157, 61, 0.18)));
    }

    .cabinet-card:hover,
    .cabinet-card:focus-visible {
      transform: translateY(-6px);
      filter:
        brightness(1.1)
        drop-shadow(0 8px 28px var(--glow, rgba(255, 157, 61, 0.35)))
        drop-shadow(0 0 6px var(--glow, rgba(255, 157, 61, 0.2)));
      outline: none;
      z-index: 2;
    }

    .cabinet-card[aria-disabled='true'] {
      opacity: 0.55;
      cursor: default;
    }

    .cabinet-card[aria-disabled='true']:hover {
      transform: none;
      filter: drop-shadow(0 6px 18px var(--glow, rgba(255, 157, 61, 0.12)));
    }

    .cabinet-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: bottom center;
      pointer-events: none;
      -webkit-user-drag: none;
      display: block;
    }

    .cabinet-label {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: 22px 10px 5px;
      font-size: clamp(0.6rem, 1.2vh, 0.82rem);
      font-weight: 700;
      text-align: center;
      color: var(--text);
      letter-spacing: 0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(0, 0, 0, 0.55) 40%,
        rgba(0, 0, 0, 0.72) 100%
      );
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.9);
    }

    .cabinet-label--override {
      color: var(--accent);
    }

    /* ── Scroll-edge hint arrows ───────────────────────────── */

    .scroll-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      pointer-events: none;
      width: 48px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .scroll-arrow.visible {
      opacity: 1;
    }

    #arrow-left  { left: 10px; }
    #arrow-right { right: 10px; }

    .scroll-arrow svg {
      width: 28px;
      height: 28px;
      stroke: rgba(240, 223, 192, 0.55);
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 6px rgba(0,0,0,0.7));
    }

    /* ── Top-bar nav overlay ───────────────────────────────── */

    #top-bar {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 10px);
      left: calc(env(safe-area-inset-left, 0px) + 12px);
      z-index: 50;
      display: flex;
      gap: 8px;
      align-items: center;
      pointer-events: auto;
    }

    .top-bar-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border: 1px solid rgba(240, 223, 192, 0.18);
      border-radius: 8px;
      background: rgba(10, 8, 16, 0.72);
      color: var(--text);
      font-size: 0.82rem;
      font-weight: 700;
      text-decoration: none;
      backdrop-filter: blur(4px);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .top-bar-btn:hover,
    .top-bar-btn:focus-visible {
      border-color: var(--accent);
      background: rgba(14, 10, 22, 0.88);
      outline: none;
    }

    /* ── Load / error state ────────────────────────────────── */

    #load-state {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      font-size: 1rem;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    #load-state.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #load-state .load-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.05em;
    }

    @media (max-width: 700px) {
      :root {
        --cab-h: calc(100vh - var(--ceiling-h) - var(--floor-h));
      }
    }
  </style>
</head>
<body>
  <!-- Arcade sidescroller viewport -->
  <div id="arcade-viewport" aria-label="Noah's Arcade — side-scrolling cabinet row">
    <!-- Cabinets rendered into #world by JS -->
    <div id="world"></div>
    <!-- Environment overlays (render above cabinets) -->
    <div id="arcade-ceiling" aria-hidden="true"></div>
    <div id="arcade-floor"   aria-hidden="true"></div>
  </div>

  <!-- Fixed nav -->
  <div id="top-bar">
    <a class="top-bar-btn" href="/">← Den</a>
    <a class="top-bar-btn" href="/mame-gui.html">MAME GUI</a>
  </div>

  <!-- Scroll hint arrows -->
  <div id="arrow-left"  class="scroll-arrow" aria-hidden="true">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </div>
  <div id="arrow-right" class="scroll-arrow" aria-hidden="true">
    <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
  </div>

  <!-- Loading / error -->
  <div id="load-state" aria-live="polite">
    <span class="load-title">Noah's Arcade</span>
    <span id="load-msg">Loading cabinets…</span>
  </div>

  <script>
    (() => {
      /* ── URL overrides (MAME GUI persisted) ──────────────── */
      const URL_OVERRIDES_KEY = 'naimean.arcade.urlOverrides';
      const URL_OVERRIDES_API = '/api/arcade-url-overrides';

      function parseLocalOverrides() {
        try {
          const raw = localStorage.getItem(URL_OVERRIDES_KEY);
          if (!raw) return {};
          const parsed = JSON.parse(raw);
          return (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) ? parsed : {};
        } catch (e) {
          console.warn('Failed to parse arcade URL overrides.', e);
          return {};
        }
      }

      function saveLocalOverrides(overrides) {
        localStorage.setItem(URL_OVERRIDES_KEY, JSON.stringify(overrides));
      }

      async function loadServerOverrides() {
        const response = await fetch(URL_OVERRIDES_API, { cache: 'no-store' });
        if (!response.ok) throw new Error(`Failed to load saved URL overrides (${response.status})`);
        const body = await response.json();
        const overrides = body && typeof body === 'object' && !Array.isArray(body)
          ? (body.overrides && typeof body.overrides === 'object' && !Array.isArray(body.overrides) ? body.overrides : {})
          : {};
        saveLocalOverrides(overrides);
        return overrides;
      }

      async function getEffectiveOverrides() {
        try {
          return await loadServerOverrides();
        } catch (_) {
          return parseLocalOverrides();
        }
      }

      function normalizeUrl(input) {
        if (typeof input !== 'string') return null;
        const t = input.trim();
        if (!t) return '';
        if (/^https?:\/\//i.test(t)) return t;
        if (/^(\/|\.\/|\.\.\/|\?|#)/.test(t)) return t;
        return null;
      }

      function getCabinetUrl(cabinet, overrides) {
        const ov = normalizeUrl(overrides[cabinet.name]);
        if (ov) return ov;
        return normalizeUrl(cabinet.url) || '';
      }

      function getCabinetLabel(url, fallback, isOverride) {
        if (!url) return fallback;
        let display = fallback;
        try {
          const parsed = new URL(url, window.location.href);
          display = parsed.origin !== window.location.origin
            ? (parsed.hostname || fallback)
            : (parsed.pathname || fallback);
        } catch (e) {
          /* leave display as fallback */
        }
        return isOverride ? '\u2605 ' + display : display;
      }

      /* ── Accent-glow helper ───────────────────────────────── */
      function accentToGlow(hex, alpha) {
        if (!hex || !/^#[0-9a-f]{6}$/i.test(hex)) return `rgba(255,157,61,${alpha})`;
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r},${g},${b},${alpha})`;
      }

      /* ── DOM refs ─────────────────────────────────────────── */
      const viewport  = document.getElementById('arcade-viewport');
      const world     = document.getElementById('world');
      const loadState = document.getElementById('load-state');
      const loadMsg   = document.getElementById('load-msg');
      const arrowLeft  = document.getElementById('arrow-left');
      const arrowRight = document.getElementById('arrow-right');

      /* ── Scroll / camera state ────────────────────────────── */
      const DRAG_START_THRESHOLD    = 8;      // px before a drag is recognized
      const CAMERA_SMOOTHING        = 0.13;   // desktop spring lerp factor
      const CAMERA_SETTLE_EPSILON   = 0.4;    // px, stop animating below this
      const WHEEL_MULTIPLIER        = 0.85;
      const LINE_SCROLL_PX          = 20;
      const MOMENTUM_DECAY          = 0.005;  // per ms
      const MOMENTUM_MIN_VELOCITY   = 0.05;   // px/ms

      let cameraX = 0;
      let targetCameraX = 0;
      let maxCameraX = 0;

      let isPointerDown   = false;
      let isDragging      = false;
      let suppressClick   = false;
      let activeId        = null;
      let activeType      = '';
      let pointerStartX   = 0;
      let lastPointerX    = 0;
      let lastPointerTime = 0;
      let dragVelocityX   = 0;

      let camAnimId     = null;
      let momAnimId     = null;
      let momVelocityX  = 0;
      let lastMomTime   = 0;

      function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

      function shouldUseMomentum(type) { return type === 'touch'; }

      function applyCameraX() {
        world.style.transform = `translateX(${-cameraX}px)`;
        updateArrows();
      }

      function setCameraX(x) {
        cameraX = clamp(x, 0, maxCameraX);
        applyCameraX();
      }

      function setTargetCameraX(x) {
        const next = clamp(x, 0, maxCameraX);
        if (targetCameraX === next) return;
        targetCameraX = next;
        startCamAnim();
      }

      function startCamAnim() {
        if (camAnimId !== null) return;
        camAnimId = requestAnimationFrame(tickCamera);
      }

      function tickCamera() {
        camAnimId = null;
        const delta = targetCameraX - cameraX;
        if (Math.abs(delta) < CAMERA_SETTLE_EPSILON) {
          setCameraX(targetCameraX);
          return;
        }
        setCameraX(cameraX + delta * CAMERA_SMOOTHING);
        startCamAnim();
      }

      function stopMomentum() {
        if (momAnimId !== null) { cancelAnimationFrame(momAnimId); momAnimId = null; }
        momVelocityX = 0;
        lastMomTime  = 0;
      }

      function startMomentum(vel) {
        stopMomentum();
        if (Math.abs(vel) < MOMENTUM_MIN_VELOCITY) return;
        setCameraX(targetCameraX);
        targetCameraX = cameraX;
        momVelocityX = vel;
        momAnimId = requestAnimationFrame(function tickMom(ts) {
          if (lastMomTime === 0) lastMomTime = ts;
          const dt = Math.max(1, ts - lastMomTime);
          lastMomTime = ts;
          momVelocityX *= Math.exp(-MOMENTUM_DECAY * dt);
          if (Math.abs(momVelocityX) < MOMENTUM_MIN_VELOCITY) { stopMomentum(); return; }
          const prev = cameraX;
          setCameraX(cameraX + momVelocityX * dt);
          targetCameraX = cameraX;
          if (cameraX === prev) { stopMomentum(); return; }
          momAnimId = requestAnimationFrame(tickMom);
        });
      }

      function updateLayout() {
        maxCameraX = Math.max(0, world.scrollWidth - window.innerWidth);
        const clamped = clamp(cameraX, 0, maxCameraX);
        setCameraX(clamped);
        targetCameraX = clamped;
        updateArrows();
      }

      function updateArrows() {
        arrowLeft.classList.toggle('visible',  cameraX > 2);
        arrowRight.classList.toggle('visible', cameraX < maxCameraX - 2);
      }

      /* ── Pointer events ───────────────────────────────────── */

      viewport.addEventListener('pointerdown', (e) => {
        isPointerDown = true;
        activeId       = e.pointerId;
        activeType     = e.pointerType || '';
        pointerStartX  = e.clientX;
        lastPointerX   = e.clientX;
        lastPointerTime = e.timeStamp;
        dragVelocityX  = 0;
        stopMomentum();
      });

      viewport.addEventListener('pointermove', (e) => {
        if (e.pointerId !== activeId || !isPointerDown) return;

        if (!isDragging) {
          if (Math.abs(e.clientX - pointerStartX) < DRAG_START_THRESHOLD) return;
          isDragging = true;
          viewport.classList.add('dragging');
          viewport.setPointerCapture(e.pointerId);
        }

        e.preventDefault();
        const dx = e.clientX - lastPointerX;
        const dt = Math.max(1, e.timeStamp - lastPointerTime);
        lastPointerX    = e.clientX;
        lastPointerTime = e.timeStamp;

        const worldDelta = -dx;
        dragVelocityX = dragVelocityX * 0.75 + (worldDelta / dt) * 0.25;

        if (shouldUseMomentum(activeType)) {
          setCameraX(cameraX + worldDelta);
          targetCameraX = cameraX;
        } else {
          setTargetCameraX(targetCameraX + worldDelta);
        }
      }, { passive: false });

      function endDrag(e) {
        if (e.pointerId !== activeId) return;
        const wasDragging  = isDragging;
        const relVel       = dragVelocityX;
        const wasTouch     = shouldUseMomentum(activeType);
        isPointerDown  = false;
        isDragging     = false;
        activeId       = null;
        activeType     = '';
        dragVelocityX  = 0;
        viewport.classList.remove('dragging');
        if (viewport.hasPointerCapture(e.pointerId)) viewport.releasePointerCapture(e.pointerId);
        if (wasDragging) {
          suppressClick = true;
          if (wasTouch) startMomentum(relVel);
        }
      }

      viewport.addEventListener('pointerup',     endDrag);
      viewport.addEventListener('pointercancel', endDrag);

      /* Suppress click-through after a drag */
      viewport.addEventListener('click', (e) => {
        if (suppressClick) {
          suppressClick = false;
          e.preventDefault();
          e.stopPropagation();
        }
      }, true);

      /* Wheel scrolling */
      viewport.addEventListener('wheel', (e) => {
        e.preventDefault();
        stopMomentum();
        let unit = 1;
        if (e.deltaMode === 1) unit = LINE_SCROLL_PX;
        else if (e.deltaMode === 2) unit = window.innerWidth;
        const useH = Math.abs(e.deltaX) > Math.abs(e.deltaY);
        setTargetCameraX(targetCameraX + (useH ? e.deltaX : e.deltaY) * unit * WHEEL_MULTIPLIER);
      }, { passive: false });

      /* Keyboard nav */
      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') { e.preventDefault(); setTargetCameraX(targetCameraX + 360); }
        if (e.key === 'ArrowLeft')  { e.preventDefault(); setTargetCameraX(targetCameraX - 360); }
      });

      /* Resize */
      window.addEventListener('resize', () => requestAnimationFrame(updateLayout));

      /* ── Cabinet rendering ────────────────────────────────── */

      function renderCabinets(cabinets, overrides) {
        world.innerHTML = '';

        cabinets.forEach((cabinet) => {
          const url = getCabinetUrl(cabinet, overrides);
          const hasOverride = !!(normalizeUrl(overrides[cabinet.name]));

          const card = document.createElement(url ? 'a' : 'div');
          card.className = 'cabinet-card';

          if (url) {
            card.href = url;
            if (/^https?:\/\//i.test(url)) { card.target = '_blank'; card.rel = 'noopener'; }
          } else {
            card.setAttribute('aria-disabled', 'true');
          }

          /* Set per-cabinet glow color from accent */
          card.style.setProperty('--glow', accentToGlow(cabinet.accent, 0.22));

          const img = document.createElement('img');
          img.className = 'cabinet-img';
          img.src = cabinet.cabinetArt || cabinet.image || '/assets/images/den_arcade.v20260528.PNG';
          img.alt = cabinet.name + ' arcade cabinet';
          img.loading = 'lazy';
          img.draggable = false;
          card.appendChild(img);

          const label = document.createElement('span');
          label.className = 'cabinet-label' + (hasOverride ? ' cabinet-label--override' : '');
          label.textContent = getCabinetLabel(url, cabinet.name, hasOverride);
          card.appendChild(label);

          world.appendChild(card);
        });

        /* Let the browser lay out, then measure & init scroll */
        requestAnimationFrame(() => {
          updateLayout();
          loadState.classList.add('hidden');
        });
      }

      /* ── Fetch & go ───────────────────────────────────────── */

      let loadedCabinets = null;

      async function renderFromOverrides() {
        if (!loadedCabinets) return;
        const overrides = await getEffectiveOverrides();
        renderCabinets(loadedCabinets, overrides);
      }

      /* Re-render if browser restores this page from bfcache */
      window.addEventListener('pageshow', (e) => {
        if (e.persisted) renderFromOverrides();
      });

      (async () => {
        try {
          const res = await fetch('/assets/arcade/cabinets.json', { cache: 'no-store' });
          if (!res.ok) throw new Error(`Failed to load cabinets (${res.status})`);
          loadedCabinets = await res.json();
          const overrides = await getEffectiveOverrides();
          renderCabinets(loadedCabinets, overrides);
        } catch (err) {
          loadMsg.textContent = err.message;
        }
      })();
    })();
  </script>
</body>
</html>
