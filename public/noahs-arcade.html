<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noah's Arcade — Naimean</title>
  <meta name="description" content="Step into Noah's arcade and launch a cabinet from the Naimean collection.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Naimean">
  <meta property="og:url" content="https://naimean.com/noahs-arcade.html">
  <meta property="og:title" content="Noah's Arcade">
  <meta property="og:description" content="Browse the Naimean arcade cabinet collection.">
  <meta property="og:image" content="https://naimean.com/assets/images/den_arcade.PNG">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Noah's Arcade">
  <meta name="twitter:description" content="Browse the Naimean arcade cabinet collection.">
  <meta name="twitter:image" content="https://naimean.com/assets/images/den_arcade.PNG">
  <style>
    :root {
      --bg: #06060b;
      --panel: rgba(14, 16, 24, 0.92);
      --border: rgba(255, 180, 92, 0.28);
      --text: #f8ead8;
      --muted: rgba(248, 234, 216, 0.72);
      --accent: #ff9d3d;
      --accent-2: #ffd166;
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      background:
        linear-gradient(rgba(6, 6, 11, 0.72), rgba(6, 6, 11, 0.9)),
        url('/assets/images/den_arcade.PNG') center/cover fixed;
    }

    main {
      width: min(1200px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    .hero,
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
    }

    .hero {
      padding: 28px;
      margin-bottom: 24px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent-2);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3.6rem);
      line-height: 1.05;
    }

    .hero p {
      margin: 0;
      max-width: 62ch;
      color: var(--muted);
      line-height: 1.6;
    }

    .panel {
      padding: 24px;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: baseline;
      margin-bottom: 18px;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 1.2rem;
    }

    .panel-head p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    #status {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .cabinet-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .cabinet-card {
      display: block;
      color: inherit;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
    }

    .cabinet-card[aria-disabled='true'] {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .cabinet-card:hover,
    .cabinet-card:focus-visible {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
      outline: none;
    }

    .cabinet-art {
      aspect-ratio: 4 / 5;
      width: 100%;
      object-fit: cover;
      display: block;
      background: rgba(255, 255, 255, 0.05);
    }

    .cabinet-copy {
      padding: 14px 16px 16px;
    }

    .cabinet-copy h3 {
      margin: 0 0 6px;
      font-size: 1rem;
    }

    .cabinet-copy p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent-2);
      text-decoration: none;
      font-weight: 700;
    }

    .mame-gui-button {
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 10px;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }

    .mame-gui-button:hover,
    .mame-gui-button:focus-visible {
      border-color: var(--accent);
      outline: none;
    }

    .editor-panel {
      margin-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      padding-top: 20px;
    }

    .editor-panel h3 {
      margin: 0 0 6px;
      font-size: 1.05rem;
    }

    .editor-panel p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .url-list {
      display: grid;
      gap: 10px;
    }

    .url-row {
      display: grid;
      grid-template-columns: minmax(150px, 1fr) minmax(280px, 2.2fr);
      gap: 10px;
      align-items: center;
    }

    .url-row label {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .url-row input {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 9px;
      background: rgba(6, 6, 11, 0.75);
      color: var(--text);
      padding: 8px 10px;
      font-size: 0.88rem;
    }

    .url-row input:focus {
      border-color: var(--accent);
      outline: none;
      box-shadow: 0 0 0 2px rgba(255, 157, 61, 0.24);
    }

    .editor-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
      align-items: center;
    }

    .editor-actions button {
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      padding: 8px 14px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }

    .editor-actions button:hover,
    .editor-actions button:focus-visible {
      border-color: var(--accent);
      outline: none;
    }

    #editor-status {
      margin: 0;
      color: var(--muted);
      font-size: 0.88rem;
    }

    @media (max-width: 640px) {
      main {
        width: min(100% - 20px, 1200px);
        padding-top: 20px;
      }

      .hero,
      .panel {
        border-radius: 16px;
      }

      .hero,
      .panel {
        padding: 18px;
      }

      .panel-head {
        display: block;
      }
    }
  </style>
</head>
<body>
  <main>
  <div class="top-actions">
    <a class="back-link" href="/den.html">← Back to the den</a>
    <button type="button" class="mame-gui-button" id="toggle-url-editor" aria-expanded="false">MAME GUI</button>
  </div>

    <section class="hero">
      <p class="eyebrow">Now entering</p>
      <h1>Noah's Arcade</h1>
      <p>Pick a cabinet and jump straight into the collection. Cabinets open in a new tab when they point off-site.</p>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Cabinets</h2>
        <p id="count"></p>
      </div>
      <p id="status">Loading cabinets…</p>
      <div id="cabinet-grid" class="cabinet-grid" hidden></div>

      <section class="editor-panel" hidden id="url-editor">
        <h3>MAME URL Manager</h3>
        <p>Update cabinet URLs below. Leave a field blank to use its default URL.</p>
        <div id="url-list" class="url-list"></div>
        <div class="editor-actions">
          <button type="button" id="save-urls">Save URL updates</button>
          <button type="button" id="reset-urls">Reset all updates</button>
          <p id="editor-status"></p>
        </div>
      </section>
    </section>
  </main>

  <script>
    (async () => {
      const status = document.getElementById('status');
      const count = document.getElementById('count');
      const grid = document.getElementById('cabinet-grid');
      const editor = document.getElementById('url-editor');
      const urlList = document.getElementById('url-list');
      const saveButton = document.getElementById('save-urls');
      const resetButton = document.getElementById('reset-urls');
      const editorStatus = document.getElementById('editor-status');
      const toggleEditorButton = document.getElementById('toggle-url-editor');
      const URL_OVERRIDES_KEY = 'naimean.arcade.urlOverrides';

      function parseOverrides() {
        try {
          const raw = localStorage.getItem(URL_OVERRIDES_KEY);
          if (!raw) return {};
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : {};
        } catch (error) {
          console.warn('Failed to parse saved arcade URL overrides.', error);
          return {};
        }
      }

      function normalizeUrl(input) {
        if (typeof input !== 'string') return null;
        const trimmed = input.trim();
        if (!trimmed) return '';
        if (/^https?:\/\//i.test(trimmed)) return trimmed;
        if (/^(\/|\.\/|\.\.\/|\?|#)/.test(trimmed)) return trimmed;
        return null;
      }

      let cabinets = [];
      let urlOverrides = parseOverrides();
      let editorOpen = false;

      function getCabinetHost(url) {
        if (!url) return 'No URL configured';
        try {
          return new URL(url, window.location.origin).hostname || 'No URL configured';
        } catch (error) {
          return 'No URL configured';
        }
      }

      function setEditorOpenState(open) {
        editorOpen = open;
        editor.hidden = !editorOpen;
        toggleEditorButton.setAttribute('aria-expanded', editorOpen ? 'true' : 'false');
      }

      function getCabinetUrl(cabinet) {
        const override = normalizeUrl(urlOverrides[cabinet.name]);
        if (override) return override;
        const fallback = normalizeUrl(cabinet.url);
        return fallback || '';
      }

      function setEditorStatus(message, isError = false) {
        editorStatus.textContent = message;
        editorStatus.style.color = isError ? '#fda4af' : 'var(--muted)';
      }

      function renderCabinetGrid() {
        grid.innerHTML = '';
        cabinets.forEach((cabinet) => {
          const url = getCabinetUrl(cabinet);
          const card = document.createElement(url ? 'a' : 'div');
          card.className = 'cabinet-card';
          if (url) {
            card.href = url;
          } else {
            card.setAttribute('aria-disabled', 'true');
          }
          if (url && /^https?:\/\//.test(url)) {
            card.target = '_blank';
            card.rel = 'noopener';
          }

          const art = document.createElement('img');
          art.className = 'cabinet-art';
          art.src = cabinet.cabinetArt || cabinet.image || '/assets/images/den_arcade.PNG';
          art.alt = `${cabinet.name} cabinet art`;
          art.loading = 'lazy';
          card.appendChild(art);

          const copy = document.createElement('div');
          copy.className = 'cabinet-copy';

          const title = document.createElement('h3');
          title.textContent = cabinet.name;
          copy.appendChild(title);

          const tag = document.createElement('p');
          tag.textContent = getCabinetHost(url);
          copy.appendChild(tag);

          card.appendChild(copy);
          grid.appendChild(card);
        });
      }

      function renderUrlEditor() {
        urlList.innerHTML = '';
        cabinets.forEach((cabinet, index) => {
          const row = document.createElement('div');
          row.className = 'url-row';

          const label = document.createElement('label');
          const inputId = `url-row-${index}`;
          label.setAttribute('for', inputId);
          label.textContent = cabinet.name;

          const input = document.createElement('input');
          input.type = 'text';
          input.id = inputId;
          input.dataset.name = cabinet.name;
          input.placeholder = cabinet.url;
          const override = normalizeUrl(urlOverrides[cabinet.name]);
          input.value = override || '';

          row.appendChild(label);
          row.appendChild(input);
          urlList.appendChild(row);
        });
      }

      function saveUrlOverrides() {
        const nextOverrides = {};
        const invalid = [];
        const inputs = urlList.querySelectorAll('input[data-name]');

        inputs.forEach((input) => {
          const normalized = normalizeUrl(input.value);
          if (normalized === null) {
            invalid.push(input.dataset.name);
            return;
          }
          if (normalized) nextOverrides[input.dataset.name] = normalized;
        });

        if (invalid.length) {
          setEditorStatus(`Could not save. Invalid URL format: ${invalid.join(', ')}`, true);
          return;
        }

        urlOverrides = nextOverrides;
        localStorage.setItem(URL_OVERRIDES_KEY, JSON.stringify(urlOverrides));
        renderCabinetGrid();
        renderUrlEditor();
        setEditorStatus('URL updates saved.');
      }

      function resetUrlOverrides() {
        urlOverrides = {};
        localStorage.removeItem(URL_OVERRIDES_KEY);
        renderCabinetGrid();
        renderUrlEditor();
        setEditorStatus('URL updates reset.');
      }

      try {
        const response = await fetch('/assets/arcade/cabinets.json', { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`Failed to load cabinets (${response.status})`);
        }

        cabinets = await response.json();
        status.hidden = true;
        grid.hidden = false;
        count.textContent = `${cabinets.length} cabinets`;
        setEditorOpenState(false);

        renderCabinetGrid();
        renderUrlEditor();
        setEditorStatus('Saved URL updates are applied automatically.');
        toggleEditorButton.addEventListener('click', () => {
          setEditorOpenState(!editorOpen);
        });
        saveButton.addEventListener('click', saveUrlOverrides);
        resetButton.addEventListener('click', resetUrlOverrides);
      } catch (error) {
        status.textContent = error.message;
        count.textContent = '';
        editor.hidden = true;
        toggleEditorButton.disabled = true;
      }
    })();
  </script>
</body>
</html>
