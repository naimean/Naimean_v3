    if (!skipAutoFill && !fEventType.value.trim()) {
      const savedName = getColorTypeName(hex);
      if (savedName) fEventType.value = savedName;
    }
  }

  // Wire up preset swatches
  colorPalette.querySelectorAll('.color-swatch').forEach((sw) => {
    sw.addEventListener('click', () => setSelectedColor(sw.dataset.color));
  });

  // Wire up custom color picker — when the user picks a custom color, deselect presets
  fColorCustom.addEventListener('input', () => {
    selectedColor = fColorCustom.value;
    colorPalette.querySelectorAll('.color-swatch').forEach((sw) => sw.classList.remove('active'));
  });

  // ── Recurrence form helpers ──────────────────────────────────────
  fRecurFreq.addEventListener('change', () => {
    const freq = fRecurFreq.value;
    recurOptions.style.display = freq ? 'block' : 'none';
    recurBydayField.style.display = (freq === 'WEEKLY' || freq === 'BIWEEKLY') ? 'block' : 'none';
  });

  fRecurEndType.addEventListener('change', () => {
    const v = fRecurEndType.value;
    recurUntilField.style.display = v === 'until' ? 'block' : 'none';
    recurCountField.style.display = v === 'count' ? 'block' : 'none';
  });

  function resetRecurrenceFields() {
    fRecurFreq.value = '';
    recurOptions.style.display = 'none';
    recurBydayField.style.display = 'none';
    fRecurEndType.value = 'never';
    recurUntilField.style.display = 'none';
    recurCountField.style.display = 'none';
    fRecurUntil.value = '';
    fRecurCount.value = String(RECUR_DEFAULT_COUNT);
    document.querySelectorAll('.recur-day').forEach((cb) => { cb.checked = false; });
  }

  function populateRecurrenceFromRule(rule) {
    if (!rule || !rule.freq) {
      resetRecurrenceFields();
      return;
    }
    const isBiweekly = rule.freq === 'WEEKLY' && rule.interval === 2;
    fRecurFreq.value = isBiweekly ? 'BIWEEKLY' : rule.freq;
    recurOptions.style.display = 'block';
    recurBydayField.style.display = (rule.freq === 'WEEKLY') ? 'block' : 'none';
    if (rule.freq === 'WEEKLY' && Array.isArray(rule.byday)) {
      document.querySelectorAll('.recur-day').forEach((cb) => {
        cb.checked = rule.byday.includes(cb.value);
      });
    } else {
      document.querySelectorAll('.recur-day').forEach((cb) => { cb.checked = false; });
    }
    if (rule.until) {
      fRecurEndType.value = 'until';
      fRecurUntil.value = tsToLocalDateStr(rule.until);
      recurUntilField.style.display = 'block';
      recurCountField.style.display = 'none';
    } else if (rule.count) {
      fRecurEndType.value = 'count';
      fRecurCount.value = rule.count;
      recurUntilField.style.display = 'none';
      recurCountField.style.display = 'block';
    } else {
      fRecurEndType.value = 'never';
      recurUntilField.style.display = 'none';
      recurCountField.style.display = 'none';
    }
  }

  function getRecurrenceRule() {
    const freq = fRecurFreq.value;
    if (!freq) return null;
    const isBiweekly = freq === 'BIWEEKLY';
    const rule = { freq: isBiweekly ? 'WEEKLY' : freq, interval: isBiweekly ? 2 : 1 };
    if (freq === 'WEEKLY' || freq === 'BIWEEKLY') {
      const byday = [...document.querySelectorAll('.recur-day:checked')].map((el) => el.value);
      if (byday.length > 0) rule.byday = byday;
    }
    const endType = fRecurEndType.value;
    if (endType === 'until' && fRecurUntil.value) {
      rule.until = localDateToTs(fRecurUntil.value, '23:59');
    } else if (endType === 'count') {
      const n = parseInt(fRecurCount.value, 10);
      if (!isNaN(n) && n > 0) rule.count = n;
    }
    return rule;
  }

  // ── Auth ─────────────────────────────────────────────────────────
  async function refreshAuth() {
    showApp();
  }

  function showApp() {
    document.getElementById('topbar').style.display = '';
    document.getElementById('main').style.display = '';
  }

  function renderAuthStatus() {
    // Show add button whenever a date is selected
    if (selectedDate) {
      panelAddBtn.style.display = 'block';
    }
    panelLoginPrompt.style.display = 'none';
  }

  // ── View helpers ─────────────────────────────────────────────────
  function getAnchorDate() {
    return new Date(currentYear, currentMonth, currentDay);
  }

  function setAnchorDate(date) {
    currentYear = date.getFullYear();
    currentMonth = date.getMonth();
    currentDay = date.getDate();
  }

  function navigateDay(delta) {
    const d = getAnchorDate();
    d.setDate(d.getDate() + delta);
    setAnchorDate(d);
    loadViewEvents();
  }

  function navigateWeek(delta) {
    const d = getAnchorDate();
    d.setDate(d.getDate() + delta * 7);
    setAnchorDate(d);
    weeklyFocusDay = null;
    loadViewEvents();
  }

  function getWeekStart(date) {
    const d = new Date(date);
    d.setHours(0, 0, 0, 0);
    d.setDate(d.getDate() - d.getDay()); // Sunday
    return d;
  }

  function formatWeekLabel(start, end) {
    const sm = MONTH_NAMES[start.getMonth()].substring(0, 3);
    const em = MONTH_NAMES[end.getMonth()].substring(0, 3);
    const sy = start.getFullYear();
    const ey = end.getFullYear();
    const startStr = `${sm} ${pad2(start.getDate())}${sy !== ey ? ` ${sy}` : ''}`;
    const endStr = `${em} ${pad2(end.getDate())} ${ey}`;
    return `${startStr} \u2013 ${endStr}`;
  }

  function updateViewButtons() {
    viewDailyBtn.classList.toggle('active', currentView === 'daily');
    viewWeeklyBtn.classList.toggle('active', currentView === 'weekly');
    viewMonthlyBtn.classList.toggle('active', currentView === 'monthly');
    if (viewScheduleBtn) viewScheduleBtn.classList.toggle('active', currentView === 'schedule');
  }

  function switchView(view) {
    if (currentView === view && view === 'weekly') {
      // Already in weekly: scroll back to the focused day (top of list)
      weeklyFocusDay = null;
      renderWeeklyView();
      return;
    }
    currentView = view;
    weeklyFocusDay = null;
    updateViewButtons();
    loadViewEvents();
  }

  // ── Events API ───────────────────────────────────────────────────
  async function loadViewEvents() {
    let from, to;

    if (currentView === 'daily') {
      const anchor = getAnchorDate();
      anchor.setHours(0, 0, 0, 0);
      from = anchor.getTime() - 24 * 60 * 60 * 1000; // slight buffer for multi-day events
      to = anchor.getTime() + 2 * 24 * 60 * 60 * 1000;
    } else if (currentView === 'weekly') {
      const weekStart = getWeekStart(getAnchorDate());
      from = weekStart.getTime() - 24 * 60 * 60 * 1000;
      const weekEnd = new Date(weekStart);
      weekEnd.setDate(weekEnd.getDate() + 7);
      to = weekEnd.getTime() + 24 * 60 * 60 * 1000;
    } else if (currentView === 'schedule') {
      const todayStart = new Date();
      todayStart.setHours(0, 0, 0, 0);
      from = todayStart.getTime();
      to = todayStart.getTime() + 365 * 24 * 60 * 60 * 1000;
    } else {
      const firstDay = new Date(currentYear, currentMonth, 1);
      const lastDay = new Date(currentYear, currentMonth + 1, 0, 23, 59, 59, 999);
      from = firstDay.getTime() - 24 * 60 * 60 * 1000;
      to = lastDay.getTime() + 24 * 60 * 60 * 1000;
    }

    loadingIndicator.style.display = 'block';
    try {
      const res = await NaimeanAPI.getCalendarEvents(from, to, activeTab);
      if (!res.ok) throw new Error('Failed to load events');
      const data = await res.json();
      monthEvents = data.events || [];
    } catch (_) {
      monthEvents = [];
    }
    loadingIndicator.style.display = 'none';
    buildEventsByDay();

    // Show/hide the correct view containers
    grid.style.display = currentView === 'monthly' ? '' : 'none';
    document.getElementById('month-agenda').style.display = currentView === 'monthly' ? '' : 'none';
    dailyView.style.display = currentView === 'daily' ? '' : 'none';
    weeklyView.style.display = currentView === 'weekly' ? '' : 'none';
    const scheduleViewEl = document.getElementById('schedule-view');
    if (scheduleViewEl) scheduleViewEl.style.display = currentView === 'schedule' ? '' : 'none';

    if (currentView === 'monthly') {
      renderGrid();
      renderMonthAgenda();
      if (selectedDate) renderDayPanel(selectedDate);
    } else if (currentView === 'daily') {
      renderDailyView();
    } else if (currentView === 'weekly') {
      renderWeeklyView();
    } else if (currentView === 'schedule') {
      renderScheduleView();
    }
    // Sync mini cal and mobile bottom nav after every load
    renderMiniCal();
    updateBottomNav();
  }

  // Keep alias for callers that pre-date the view system (form save / delete)
  function loadMonthEvents() { return loadViewEvents(); }

  function isEventHidden(ev) {
    return hiddenLabels.size > 0 && hiddenLabels.has(ev.eventType || '');
  }

  function buildEventsByDay() {
    eventsByDay = new Map();
    for (const ev of monthEvents) {
      // Skip events whose category is hidden
      if (isEventHidden(ev)) continue;
      // Place event on every day it spans (within the loaded range).
      const startKey = dateKeyFromTs(ev.startTs);
      const endKey = dateKeyFromTs(ev.endTs);
      // Walk from start to end date.
      const start = new Date(ev.startTs);
      const end = new Date(ev.endTs);
      start.setHours(0, 0, 0, 0);
      end.setHours(0, 0, 0, 0);
      for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
        const key = `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
        if (!eventsByDay.has(key)) eventsByDay.set(key, []);
        if (!eventsByDay.get(key).find((e) => e.id === ev.id)) {
          eventsByDay.get(key).push(ev);
        }
      }
      void startKey; void endKey; // suppress unused lint hint
    }
  }

  async function createEvent(payload) {
    const res = await NaimeanAPI.createCalendarEvent(payload);
    return res;
  }

  // ── Render the current view (re-render without refetching) ─────────
  function renderView() {
    if (currentView === 'monthly') {
      renderGrid();
      renderMonthAgenda();
      if (selectedDate) renderDayPanel(selectedDate);
    } else if (currentView === 'daily') {
      renderDailyView();
    } else if (currentView === 'weekly') {
      renderWeeklyView();
    } else if (currentView === 'schedule') {
      renderScheduleView();
    }
    renderMiniCal();
  }

  async function updateEvent(id, payload) {
    const res = await NaimeanAPI.patchCalendarEvent(id, payload);
    return res;
  }

  async function deleteEvent(id) {
    const res = await NaimeanAPI.deleteCalendarEvent(id);
    return res;
  }

  // ── Daily view — Hour-by-hour time grid (Google/Outlook/Teams/Yahoo style) ──
  function renderDailyView() {
    const TG_HOUR_H = 60; // px per hour
    dailyView.innerHTML = '';
    const anchor = getAnchorDate();
    const key = toDateKey(anchor.getFullYear(), anchor.getMonth(), anchor.getDate());
    monthLabel.textContent = formatDateLabel(key);

    const events = eventsByDay.get(key) || [];
    const allDayEvs  = events.filter((e) => e.allDay);
    const timedEvs   = events.filter((e) => !e.allDay);

    const today = new Date();
    const todayKey = toDateKey(today.getFullYear(), today.getMonth(), today.getDate());
    const isPastDay = key < todayKey;

    // ── Sticky header: holiday + all-day strips stay visible while scrolling ──
    // Only pin (sticky) for today and future dates; past dates render normally.
    const stickyHeader = document.createElement('div');
    stickyHeader.className = isPastDay ? 'tg-allday-header' : 'tg-sticky-header';

    // ── Holiday strip (always shown if holiday, above all-day events) ──
    const anchorHoliday = getUSHoliday(anchor.getFullYear(), anchor.getMonth(), anchor.getDate());
    if (anchorHoliday) {
      const holidayStrip = document.createElement('div');
      holidayStrip.className = 'tg-allday-section';
      const hlbl = document.createElement('div');
      hlbl.className = 'tg-allday-label';
      hlbl.textContent = 'HOLIDAY';
      holidayStrip.appendChild(hlbl);
      const hcont = document.createElement('div');
      hcont.className = 'tg-allday-events';
      const hel = document.createElement('div');
      hel.className = 'tg-allday-event';
      hel.textContent = '★ ' + anchorHoliday.toUpperCase();
      hel.style.background = 'rgba(234,217,184,0.18)';
      hel.style.color = 'var(--c64-bright)';
      hel.style.fontWeight = '700';
      hcont.appendChild(hel);
      holidayStrip.appendChild(hcont);
      stickyHeader.appendChild(holidayStrip);
    }

    // ── All-day strip ──────────────────────────────────────────────
    if (allDayEvs.length) {
      const strip = document.createElement('div');
      strip.className = 'tg-allday-section';
      const lbl = document.createElement('div');
      lbl.className = 'tg-allday-label';
      lbl.textContent = 'ALL DAY';
      strip.appendChild(lbl);
      const cont = document.createElement('div');
      cont.className = 'tg-allday-events';
      for (const ev of allDayEvs) {
        const el = document.createElement('div');
        el.className = 'tg-allday-event';
        el.textContent = ev.title;
        el.style.background = ev.color || 'var(--c64-green)';
        el.addEventListener('click', (e) => handleEventInteraction(ev, e));
        cont.appendChild(el);
      }
      strip.appendChild(cont);
      stickyHeader.appendChild(strip);
    }

    if (stickyHeader.children.length) {
      dailyView.appendChild(stickyHeader);
    }

    // ── Body: hour-labels column + events column ───────────────────
    const body = document.createElement('div');
    body.className = 'tg-body';

    const labelsCol = document.createElement('div');
    labelsCol.className = 'tg-hour-labels';

    const eventsCol = document.createElement('div');
    eventsCol.className = 'tg-events-col';
    eventsCol.style.minHeight = `${24 * TG_HOUR_H}px`;

    // Hour labels + grid lines + clickable create slots
    for (let h = 0; h < 24; h++) {
      // Label
      const lbl = document.createElement('div');
      lbl.className = 'tg-hour-label';
      lbl.textContent = h === 0 ? '12 AM' : h < 12 ? `${h} AM` : h === 12 ? '12 PM' : `${h - 12} PM`;
      labelsCol.appendChild(lbl);

      // Solid hour line
      const line = document.createElement('div');
      line.className = 'tg-hour-line';
      line.style.top = `${h * TG_HOUR_H}px`;
      eventsCol.appendChild(line);

      // Dashed half-hour line
      const half = document.createElement('div');
      half.className = 'tg-half-line';
      half.style.top = `${h * TG_HOUR_H + TG_HOUR_H / 2}px`;
      eventsCol.appendChild(half);

      // Clickable slot (Google-style quick-create)
      const slot = document.createElement('div');
      slot.className = 'tg-slot';
      slot.style.top = `${h * TG_HOUR_H}px`;
      slot.style.height = `${TG_HOUR_H}px`;
      slot.dataset.hour = h;
      slot.addEventListener('click', () => {
        const startTime = pad2(h) + ':00';
        const endTime   = pad2(h < 23 ? h + 1 : 23) + ':' + (h < 23 ? '00' : '59');
        selectedDate = key;
        openPanel(key);
        showAddForm(key);
        fStart.value = startTime;
        fEnd.value   = endTime;
      });
      eventsCol.appendChild(slot);
    }

    // Current-time indicator (Google red line style)
    // todayKey is already declared above; reuse it here
    if (key === todayKey) {
      const now = new Date();
      const nowMin = now.getHours() * 60 + now.getMinutes();
      const nowLine = document.createElement('div');
      nowLine.className = 'tg-now-line';
      nowLine.style.top = `${nowMin / 60 * TG_HOUR_H}px`;
      const dot = document.createElement('div');
      dot.className = 'tg-now-dot';
      nowLine.appendChild(dot);
      eventsCol.appendChild(nowLine);
    }

    // Overlap-aware event positioning
    const sorted = [...timedEvs].sort((a, b) => a.startTs - b.startTs);
    const colEnds = [];
    const colAssign = [];
    for (const ev of sorted) {
      const sMin = new Date(ev.startTs).getHours() * 60 + new Date(ev.startTs).getMinutes();
      let col = 0;
      while (col < colEnds.length && colEnds[col] > sMin) col++;
      if (col === colEnds.length) colEnds.push(0);
      const eMin = new Date(ev.endTs).getHours() * 60 + new Date(ev.endTs).getMinutes();
      colEnds[col] = eMin;
      colAssign.push(col);
    }
    const numCols = Math.max(1, colEnds.length);

    sorted.forEach((ev, idx) => {
      const sd = new Date(ev.startTs), ed = new Date(ev.endTs);
      let sMin = Math.max(0, sd.getHours() * 60 + sd.getMinutes());
      let eMin = Math.min(24 * 60, ed.getHours() * 60 + ed.getMinutes());
      if (eMin <= sMin) return;
      const col = colAssign[idx];
      const colW = 100 / numCols;
      const topPx = sMin / 60 * TG_HOUR_H;
      const hPx   = Math.max(20, (eMin - sMin) / 60 * TG_HOUR_H - 2);

      const evEl = document.createElement('div');
      evEl.className = 'tg-event';
      evEl.style.top    = `${topPx}px`;
      evEl.style.height = `${hPx}px`;
      evEl.style.left   = `calc(${col * colW}% + 3px)`;
      evEl.style.width  = `calc(${colW}% - 6px)`;
      evEl.style.borderLeftColor = ev.color || 'var(--c64-green)';
      evEl.style.background = ev.color ? ev.color + '18' : 'rgba(0,232,122,0.07)';

      const t = document.createElement('div');
      t.className = 'tg-event-title';
      t.textContent = ev.title;
      evEl.appendChild(t);

      if (hPx >= 36) {
        const tm = document.createElement('div');
        tm.className = 'tg-event-time';
        tm.textContent = `${formatTime(ev.startTs)}–${formatTime(ev.endTs)}`;
        evEl.appendChild(tm);
      }

      evEl.addEventListener('click', (e) => { e.stopPropagation(); handleEventInteraction(ev, e); });
      eventsCol.appendChild(evEl);
    });

    body.appendChild(labelsCol);
    body.appendChild(eventsCol);
    dailyView.appendChild(body);

    // Auto-scroll: 1 hour before now (or 8 AM)
    const now = new Date();
    const scrollMin = key === todayKey
      ? Math.max(0, now.getHours() * 60 + now.getMinutes() - 60)
      : 8 * 60;
    requestAnimationFrame(() => { dailyView.scrollTop = scrollMin / 60 * TG_HOUR_H; });
  }


  function renderWeeklyView() {
    const TG_HOUR_H = 60;
    weeklyView.innerHTML = '';
    const anchor = getAnchorDate();
    const weekStart = getWeekStart(anchor);
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekEnd.getDate() + 6);
    monthLabel.textContent = formatWeekLabel(weekStart, weekEnd);

    const today = new Date();
    const todayKey = toDateKey(today.getFullYear(), today.getMonth(), today.getDate());
    const anchorKey = toDateKey(anchor.getFullYear(), anchor.getMonth(), anchor.getDate());

    const weekKeys = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(weekStart);
      d.setDate(d.getDate() + i);
      weekKeys.push(toDateKey(d.getFullYear(), d.getMonth(), d.getDate()));
    }

    if (!weeklyFocusDay || !weekKeys.includes(weeklyFocusDay)) {
      weeklyFocusDay = weekKeys.includes(todayKey) ? todayKey
        : weekKeys.includes(anchorKey) ? anchorKey : weekKeys[0];
    }

    // ── Sticky header row ──────────────────────────────────────────
    const headerRow = document.createElement('div');
    headerRow.className = 'wtg-header';

    const hGutter = document.createElement('div');
    hGutter.className = 'wtg-gutter';
    headerRow.appendChild(hGutter);

    const dayHeaders = document.createElement('div');
    dayHeaders.className = 'wtg-day-headers';

    for (let i = 0; i < 7; i++) {
      const key = weekKeys[i];
      const d = new Date(weekStart);
      d.setDate(d.getDate() + i);
      const isToday = key === todayKey;
      const isSel = key === weeklyFocusDay;

      const dh = document.createElement('div');
      dh.className = 'wtg-day-header'
        + (isToday ? ' is-today' : '')
        + (isSel ? ' is-selected' : '');
      dh.dataset.key = key;

      const wkHoliday = getUSHoliday(d.getFullYear(), d.getMonth(), d.getDate());
      if (wkHoliday) {
        const starEl = document.createElement('span');
        starEl.className = 'holiday-star';
        starEl.style.fontSize = '9px';
        starEl.textContent = '\u2605';
        starEl.title = wkHoliday;
        dh.appendChild(starEl);
      }

      const dowEl = document.createElement('div');
      dowEl.className = 'wtg-dow';
      dowEl.textContent = DOW_NAMES[d.getDay()];
      dh.appendChild(dowEl);

      const numEl = document.createElement('div');
      numEl.className = 'wtg-date-num';
      numEl.textContent = d.getDate();
      dh.appendChild(numEl);

      dh.addEventListener('click', () => {
        const [cy, cm1, cd] = key.split('-').map(Number);
        currentYear = cy; currentMonth = cm1 - 1; currentDay = cd;
        selectedDate = key;
        switchView('daily');
      });

      dayHeaders.appendChild(dh);
    }
    headerRow.appendChild(dayHeaders);
    weeklyView.appendChild(headerRow);

    // ── All-day row ────────────────────────────────────────────────
    let hasAnyAllDay = false;
    for (const key of weekKeys) {
      if ((eventsByDay.get(key) || []).some((e) => e.allDay)) { hasAnyAllDay = true; break; }
    }

    if (hasAnyAllDay) {
      const allDayRow = document.createElement('div');
      allDayRow.className = 'wtg-allday-row';

      const adGutter = document.createElement('div');
      adGutter.className = 'wtg-allday-gutter';
      adGutter.textContent = 'ALL DAY';
      allDayRow.appendChild(adGutter);

      const adDays = document.createElement('div');
      adDays.className = 'wtg-allday-days';
      for (const key of weekKeys) {
        const adEvs = (eventsByDay.get(key) || []).filter((e) => e.allDay);
        const dayEl = document.createElement('div');
        dayEl.className = 'wtg-allday-day';
        for (const ev of adEvs) {
          const el = document.createElement('div');
          el.className = 'tg-allday-event';
          el.textContent = ev.title;
          el.style.background = ev.color || 'var(--c64-green)';
          el.addEventListener('click', (e2) => { e2.stopPropagation(); handleEventInteraction(ev, e2); });
          dayEl.appendChild(el);
        }
        adDays.appendChild(dayEl);
      }
      allDayRow.appendChild(adDays);
      weeklyView.appendChild(allDayRow);
    }

    // ── Time-grid body ─────────────────────────────────────────────
    const body = document.createElement('div');
    body.className = 'wtg-body';

    const labelsCol = document.createElement('div');
    labelsCol.className = 'wtg-hour-labels';
    for (let h = 0; h < 24; h++) {
      const lbl = document.createElement('div');
      lbl.className = 'tg-hour-label';
      lbl.textContent = h === 0 ? '12 AM' : h < 12 ? `${h} AM` : h === 12 ? '12 PM' : `${h - 12} PM`;
      labelsCol.appendChild(lbl);
    }
    body.appendChild(labelsCol);

    const daysContainer = document.createElement('div');
    daysContainer.className = 'wtg-days';

    for (let i = 0; i < 7; i++) {
      const key = weekKeys[i];
      const d = new Date(weekStart);
      d.setDate(d.getDate() + i);
      const isToday = key === todayKey;
      const timedEvs = (eventsByDay.get(key) || []).filter((e) => !e.allDay);

      const col = document.createElement('div');
      col.className = 'wtg-day-col' + (isToday ? ' is-today' : '');
      col.style.minHeight = `${24 * TG_HOUR_H}px`;

      for (let h = 0; h < 24; h++) {
        const line = document.createElement('div');
        line.className = 'tg-hour-line';
        line.style.top = `${h * TG_HOUR_H}px`;
        col.appendChild(line);

        const half = document.createElement('div');
        half.className = 'tg-half-line';
        half.style.top = `${h * TG_HOUR_H + TG_HOUR_H / 2}px`;
        col.appendChild(half);

        const slot = document.createElement('div');
        slot.className = 'tg-slot';
        slot.style.top = `${h * TG_HOUR_H}px`;
        slot.style.height = `${TG_HOUR_H}px`;
        slot.dataset.hour = h;
        slot.addEventListener('click', () => {
          const [cy, cm1, cd] = key.split('-').map(Number);
          currentYear = cy; currentMonth = cm1 - 1; currentDay = cd;
          selectedDate = key;
          openPanel(key);
          showAddForm(key);
          fStart.value = pad2(h) + ':00';
          fEnd.value = pad2(h < 23 ? h + 1 : 23) + ':' + (h < 23 ? '00' : '59');
        });
        col.appendChild(slot);
      }

      if (isToday) {
        const now = new Date();
        const nowMin = now.getHours() * 60 + now.getMinutes();
        const nowLine = document.createElement('div');
        nowLine.className = 'tg-now-line';
        nowLine.style.top = `${nowMin / 60 * TG_HOUR_H}px`;
        const dot = document.createElement('div');
        dot.className = 'tg-now-dot';
        nowLine.appendChild(dot);
        col.appendChild(nowLine);
      }

      const sorted = [...timedEvs].sort((a, b) => a.startTs - b.startTs);
      const colEnds = [];
      const colAssign = [];
      for (const ev of sorted) {
        const sMin = new Date(ev.startTs).getHours() * 60 + new Date(ev.startTs).getMinutes();
        let evCol = 0;
        while (evCol < colEnds.length && colEnds[evCol] > sMin) evCol++;
        if (evCol === colEnds.length) colEnds.push(0);
        colEnds[evCol] = new Date(ev.endTs).getHours() * 60 + new Date(ev.endTs).getMinutes();
        colAssign.push(evCol);
      }
      const numCols = Math.max(1, colEnds.length);

      sorted.forEach((ev, idx) => {
        const sd = new Date(ev.startTs), ed = new Date(ev.endTs);
        const sMin = Math.max(0, sd.getHours() * 60 + sd.getMinutes());
        const eMin = Math.min(24 * 60, ed.getHours() * 60 + ed.getMinutes());
        if (eMin <= sMin) return;
        const evColIdx = colAssign[idx];
        const colW = 100 / numCols;
        const topPx = sMin / 60 * TG_HOUR_H;
        const hPx = Math.max(20, (eMin - sMin) / 60 * TG_HOUR_H - 2);

        const evEl = document.createElement('div');
        evEl.className = 'tg-event';
        evEl.style.top = `${topPx}px`;
        evEl.style.height = `${hPx}px`;
        evEl.style.left = `calc(${evColIdx * colW}% + 1px)`;
        evEl.style.width = `calc(${colW}% - 2px)`;
        evEl.style.borderLeftColor = ev.color || 'var(--c64-green)';
        evEl.style.background = ev.color ? ev.color + '18' : 'rgba(0,232,122,0.07)';

        const t = document.createElement('div');
        t.className = 'tg-event-title';
        t.textContent = ev.title;
        evEl.appendChild(t);

        if (hPx >= 36) {
          const tm = document.createElement('div');
          tm.className = 'tg-event-time';
          tm.textContent = `${formatTime(ev.startTs)}\u2013${formatTime(ev.endTs)}`;
          evEl.appendChild(tm);
        }

        evEl.addEventListener('click', (e2) => { e2.stopPropagation(); handleEventInteraction(ev, e2); });
        col.appendChild(evEl);
      });

      daysContainer.appendChild(col);
    }

    body.appendChild(daysContainer);
    weeklyView.appendChild(body);

    // Auto-scroll to ~1 hr before now (or 8 AM if week doesn't include today)
    const scrollMin = weekKeys.includes(todayKey)
      ? Math.max(0, new Date().getHours() * 60 + new Date().getMinutes() - 60)
      : 8 * 60;
    requestAnimationFrame(() => { weeklyView.scrollTop = scrollMin / 60 * TG_HOUR_H; });
  }

  // ── Calendar grid ─────────────────────────────────────────────────
  function renderGrid() {
    grid.innerHTML = '';

    // Day-of-week headers
    for (const dow of DOW_NAMES) {
      const h = document.createElement('div');
      h.className = 'dow-header';
      h.textContent = dow;
      grid.appendChild(h);
    }

    const today = new Date();
    const todayKey = toDateKey(today.getFullYear(), today.getMonth(), today.getDate());

    // First day of the month and how many days.
    const firstDow = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const prevMonthDays = new Date(currentYear, currentMonth, 0).getDate();

    const prevYear = currentMonth === 0 ? currentYear - 1 : currentYear;
    const prevMonth = currentMonth === 0 ? 11 : currentMonth - 1;
    const nextYear = currentMonth === 11 ? currentYear + 1 : currentYear;
    const nextMonth = currentMonth === 11 ? 0 : currentMonth + 1;

    // The Sunday that starts the first calendar row.
    const firstRowSunday = firstDow === 0
      ? new Date(currentYear, currentMonth, 1)
      : new Date(prevYear, prevMonth, prevMonthDays - firstDow + 1);

    let cellIndex = 0;
    function appendCell(year, month, day, otherMonth) {
      const rowIndex = Math.floor(cellIndex / 7);
      const sundayDate = new Date(firstRowSunday);
      sundayDate.setDate(sundayDate.getDate() + rowIndex * 7);
      const weekColorClass = getWeekColorClass(sundayDate);
      cellIndex++;
      grid.appendChild(makeDayCell(year, month, day, otherMonth, todayKey, weekColorClass));
    }

    // Leading empty cells (previous month)
    for (let i = 0; i < firstDow; i++) {
      appendCell(prevYear, prevMonth, prevMonthDays - firstDow + 1 + i, true);
    }

    // Current month cells
    for (let day = 1; day <= daysInMonth; day++) {
      appendCell(currentYear, currentMonth, day, false);
    }

    // Trailing cells
    const totalCells = firstDow + daysInMonth;
    const remainder = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
    for (let i = 1; i <= remainder; i++) {
      appendCell(nextYear, nextMonth, i, true);
    }

    monthLabel.textContent = `${MONTH_NAMES[currentMonth]} ${currentYear}`;
    // Overlay multi-day spanning bars after all cells are in the DOM
    overlaySpanBars();
  }

  // ── Multi-day spanning bars overlay ───────────────────────────────
  function overlaySpanBars() {
    // Collect grid cells (skip the 7 DOW header divs)
    const allCells = Array.from(grid.children).slice(7);
    if (!allCells.length) return;

    // Build key ↔ index maps
    const cellByKey = new Map();
    const cellIndexByKey = new Map();
    allCells.forEach((cell, idx) => {
      if (cell.dataset.key) {
        cellByKey.set(cell.dataset.key, cell);
        cellIndexByKey.set(cell.dataset.key, idx);
      }
    });
    if (!cellByKey.size) return;

    const sortedKeys = [...cellByKey.keys()].sort();
    const firstKey = sortedKeys[0];
    const lastKey = sortedKeys[sortedKeys.length - 1];
    const numRows = Math.ceil(allCells.length / 7);

    // Only events that span more than one calendar day
    const multiDayEvs = monthEvents.filter((ev) => {
      if (isEventHidden(ev)) return false;
      return dateKeyFromTs(ev.startTs) !== dateKeyFromTs(ev.endTs);
    });
    if (!multiDayEvs.length) return;

    // Sort: earliest start first, then longest duration first
    multiDayEvs.sort((a, b) => {
      const as = dateKeyFromTs(a.startTs), bs = dateKeyFromTs(b.startTs);
      if (as !== bs) return as < bs ? -1 : 1;
      return (b.endTs - b.startTs) - (a.endTs - a.startTs);
    });

    // slotOccupied[row][slot] = [[startCol, endCol], …]
    const slotOccupied = Array.from({ length: numRows }, () => [[], [], []]);

    // cellBarData: cellKey → { [slot]: { ev, showTitle, isStart, isEnd, isSolo } }
    const cellBarData = new Map();

    for (const ev of multiDayEvs) {
      const evStartKey = dateKeyFromTs(ev.startTs);
      const evEndKey   = dateKeyFromTs(ev.endTs);
      // Clamp to visible grid range
      const clampedStart = evStartKey < firstKey ? firstKey : evStartKey;
      const clampedEnd   = evEndKey   > lastKey  ? lastKey  : evEndKey;
      if (clampedStart > lastKey || clampedEnd < firstKey) continue;

      // Build week-row segments
      const segments = [];
      const cur = new Date(clampedStart + 'T12:00:00');
      const endD = new Date(clampedEnd   + 'T12:00:00');
      while (cur <= endD) {
        const k = toDateKey(cur.getFullYear(), cur.getMonth(), cur.getDate());
        const idx = cellIndexByKey.get(k);
        if (idx !== undefined) {
          const row = Math.floor(idx / 7);
          const col = idx % 7;
          let seg = segments[segments.length - 1];
          if (!seg || seg.weekRow !== row) {
            seg = { weekRow: row, startCol: col, endCol: col,
                    isSegStart: k === evStartKey, isSegEnd: false };
            segments.push(seg);
          } else {
            seg.endCol = col;
          }
          if (k === evEndKey) seg.isSegEnd = true;
        }
        cur.setDate(cur.getDate() + 1);
      }
      if (!segments.length) continue;

      // Find first non-conflicting slot across all segments of this event
      let slot = -1;
      for (let s = 0; s < 3; s++) {
        let ok = true;
        for (const seg of segments) {
          for (const [sc, ec] of slotOccupied[seg.weekRow][s]) {
            if (seg.startCol <= ec && seg.endCol >= sc) { ok = false; break; }
          }
          if (!ok) break;
        }
        if (ok) { slot = s; break; }
      }
      if (slot === -1) continue; // overflow — not shown as bar

      const isSoloBar = segments.length === 1 &&
        segments[0].startCol === segments[0].endCol &&
        segments[0].isSegStart && segments[0].isSegEnd;

      // Record occupancy and bar data
      for (const seg of segments) {
        slotOccupied[seg.weekRow][slot].push([seg.startCol, seg.endCol]);
        for (let col = seg.startCol; col <= seg.endCol; col++) {
          const idx = seg.weekRow * 7 + col;
          if (idx >= allCells.length) continue;
          const cell = allCells[idx];
          if (!cell.dataset.key) continue;
          const k = cell.dataset.key;
          if (!cellBarData.has(k)) cellBarData.set(k, {});
          const isStart = col === seg.startCol && seg.isSegStart;
          const isEnd   = col === seg.endCol   && seg.isSegEnd;
          cellBarData.get(k)[slot] = {
            ev,
            showTitle: col === seg.startCol,
            isStart, isEnd,
            isSolo: isSoloBar && isStart && isEnd,
          };
        }
      }
    }

    if (!cellBarData.size) return;

    // Inject span bar containers into cells
    for (const [key, bars] of cellBarData) {
      const cell = cellByKey.get(key);
      if (!cell) continue;

      const maxSlot = Math.max(...Object.keys(bars).map(Number));
      const container = document.createElement('div');
      container.className = 'span-bars-container';

      for (let s = 0; s <= maxSlot; s++) {
        const barInfo = bars[s];
        const el = document.createElement('div');
        if (!barInfo) {
          el.className = 'span-bar span-placeholder';
        } else {
          const { ev, showTitle, isStart, isEnd, isSolo } = barInfo;
          let cls = 'span-bar';
          if (isSolo) cls += ' span-solo';
          else if (isStart) cls += ' span-start';
          else if (isEnd)   cls += ' span-end';
          else              cls += ' span-mid';
          el.className = cls;
          el.style.background = ev.color || '#00E87A';
          if (showTitle) { el.textContent = ev.title; el.title = ev.title; }
          el.addEventListener('click', (e) => { e.stopPropagation(); handleEventInteraction(ev, e); });
        }
        container.appendChild(el);
      }

      // Insert after .day-num (or .holiday-label if present), before .day-chips
      const insertAnchor = cell.querySelector('.holiday-label') || cell.querySelector('.day-num');
      if (insertAnchor && insertAnchor.nextSibling) {
        cell.insertBefore(container, insertAnchor.nextSibling);
      } else {
        cell.appendChild(container);
      }
    }
  }


  function makeDayCell(year, month, day, otherMonth, todayKey, weekColorClass) {
    const key = toDateKey(year, month, day);
    const cell = document.createElement('div');
    // On Sundays the color shifts at 7:30 PM — show old color (top ~75%) blending to new color
    const isSunday = new Date(year, month, day).getDay() === 0;
    let wcc;
    if (isSunday) {
      wcc = weekColorClass === 'week-purple' ? ' week-sunday-to-purple' : ' week-sunday-to-orange';
    } else {
      wcc = weekColorClass ? ' ' + weekColorClass : '';
    }
    cell.className = 'day-cell' + (otherMonth ? ' other-month' : '') + (key === todayKey ? ' today' : '') + (key === selectedDate ? ' selected' : '') + wcc;
    cell.dataset.key = key;

    // Random stars (seeded by date so they stay consistent on re-render)
    const starsEl = document.createElement('span');
    starsEl.style.cssText = 'position:absolute;top:0;left:0;width:1px;height:1px;pointer-events:none;z-index:0;';
    starsEl.style.boxShadow = generateCellStars(key);
    cell.appendChild(starsEl);

    const numEl = document.createElement('div');
    numEl.className = 'day-num';

    // Check for US holiday — show bold ★ in front of the date number
    const holiday = getUSHoliday(year, month, day);
    if (holiday && !otherMonth) {
      const starEl = document.createElement('span');
      starEl.className = 'holiday-star';
      starEl.textContent = '★';
      starEl.title = holiday;
      numEl.appendChild(starEl);
    }

    const numText = document.createTextNode(day);
    numEl.appendChild(numText);
    cell.appendChild(numEl);

    // Holiday name label below the date number
    if (holiday && !otherMonth) {
      const lblEl = document.createElement('div');
      lblEl.className = 'holiday-label';
      lblEl.textContent = holiday.toUpperCase();
      cell.appendChild(lblEl);
    }

    const events = eventsByDay.get(key) || [];
    if (events.length > 0) {
      // Multi-day events are rendered as span bars by overlaySpanBars() — exclude here
      const isMultiDay = (ev) => dateKeyFromTs(ev.startTs) !== dateKeyFromTs(ev.endTs);
      const sorted = [...events].sort((a, b) => {
        if (a.allDay && !b.allDay) return -1;
        if (!a.allDay && b.allDay) return 1;
        return a.startTs - b.startTs;
      });
      // Only chip-render single-day events; multi-day events are handled by overlaySpanBars
      const chipEvents = sorted.filter((ev) => !isMultiDay(ev));
      if (chipEvents.length > 0) {
        const chipsEl = document.createElement('div');
        chipsEl.className = 'day-chips';
        const maxChips = 3;
        const showCount = Math.min(chipEvents.length, maxChips);
        for (let i = 0; i < showCount; i++) {
          const ev = chipEvents[i];
          const chip = document.createElement('div');
          const chipColor = ev.color || 'var(--c64-green)';
          chip.className = 'day-event-chip' + (ev.allDay ? ' all-day-chip' : '') + (i === 2 ? ' chip-3rd' : '');
          if (ev.allDay) {
            chip.style.background = chipColor;
          } else {
            chip.style.borderLeftColor = chipColor;
            chip.style.background = chipColor + '18';
          }
          chip.textContent = ev.title;
          chip.title = ev.title;
          chip.addEventListener('click', (e) => {
            e.stopPropagation();
            handleEventInteraction(ev, e);
          });
          // Drag-to-move (desktop only)
          if (!isMobile()) {
            chip.draggable = true;
            chip.addEventListener('dragstart', (e) => {
              draggedEventId = ev.id;
              e.dataTransfer.effectAllowed = 'move';
              e.dataTransfer.setData('text/plain', ev.id);
              requestAnimationFrame(() => chip.classList.add('dragging'));
            });
            chip.addEventListener('dragend', () => {
              chip.classList.remove('dragging');
              draggedEventId = null;
              document.querySelectorAll('.day-cell.drop-target').forEach((c) => c.classList.remove('drop-target'));
            });
          }
          chipsEl.appendChild(chip);
        }
        if (chipEvents.length > maxChips) {
          const more = document.createElement('div');
          more.className = 'day-more-link';
          more.textContent = `+${chipEvents.length - maxChips} more`;
          more.addEventListener('click', (e) => {
            e.stopPropagation();
            if (isMobile()) {
              currentYear = year; currentMonth = month; currentDay = day;
              selectedDate = key;
              switchView('daily');
            } else {
              selectedDate = key;
              document.querySelectorAll('.day-cell.selected').forEach((el) => el.classList.remove('selected'));
              cell.classList.add('selected');
              openPanel(key);
            }
          });
          chipsEl.appendChild(more);
        }
        cell.appendChild(chipsEl);
      }
    }

    // Drag-to-move: drop target on each day cell (desktop only)
    if (!isMobile()) {
      cell.addEventListener('dragover', (e) => {
        if (!draggedEventId) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        document.querySelectorAll('.day-cell.drop-target').forEach((c) => c.classList.remove('drop-target'));
        cell.classList.add('drop-target');
      });
      cell.addEventListener('dragleave', (e) => {
        if (!e.currentTarget.contains(e.relatedTarget)) {
          cell.classList.remove('drop-target');
        }
      });
      cell.addEventListener('drop', async (e) => {
        e.preventDefault();
        cell.classList.remove('drop-target');
        const evId = e.dataTransfer.getData('text/plain');
        if (!evId) return;
        const ev = monthEvents.find((x) => x.id === evId);
        if (!ev) return;
        const newKey = cell.dataset.key;
        const oldKey = tsToLocalDateStr(ev.startTs);
        if (oldKey === newKey) return;
        // date keys are always 'YYYY-MM-DD' (see toDateKey / tsToLocalDateStr)
        const oldDate = new Date(oldKey + 'T00:00:00');
        const newDate = new Date(newKey + 'T00:00:00');
        const deltaMs = newDate.getTime() - oldDate.getTime();
        if (deltaMs === 0) return;
        const newStartTs = ev.startTs + deltaMs;
        const newEndTs = ev.endTs + deltaMs;
        // Optimistic update
        ev.startTs = newStartTs;
        ev.endTs = newEndTs;
        buildEventsByDay();
        renderView();
        try {
          await NaimeanAPI.patchCalendarEvent(evId, { startTs: newStartTs, endTs: newEndTs });
          await loadViewEvents();
        } catch (err) {
          console.error('Failed to move event', err);
          await loadViewEvents(); // revert on failure
        }
      });
    }

    cell.addEventListener('click', () => {
      if (isMobile()) {
        currentYear = year; currentMonth = month; currentDay = day;
        selectedDate = key;
        switchView('daily');
      } else {
        selectedDate = key;
        document.querySelectorAll('.day-cell.selected').forEach((el) => el.classList.remove('selected'));
        cell.classList.add('selected');
        openPanel(key);
      }
    });

    return cell;
  }

  // ── Month agenda (list below grid) ────────────────────────────────
  function renderMonthAgenda() {
    const agendaEl = document.getElementById('month-agenda');
    agendaEl.innerHTML = '';

    const today = new Date();
    const todayKey = toDateKey(today.getFullYear(), today.getMonth(), today.getDate());
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

    let todaySection = null;
    let firstFutureSection = null;

    for (let day = 1; day <= daysInMonth; day++) {
      const key = toDateKey(currentYear, currentMonth, day);
      const events = eventsByDay.get(key) || [];
      const monthHoliday = getUSHoliday(currentYear, currentMonth, day);

      // Show days that have events, holidays, and always show today even if empty
      if (events.length === 0 && !monthHoliday && key !== todayKey) continue;

      const section = document.createElement('div');
      section.className = 'agenda-day';
      if (key === todayKey) {
        section.classList.add('is-today');
        section.id = 'agenda-today';
        todaySection = section;
      } else if (key < todayKey) {
        section.classList.add('is-past');
      } else if (!firstFutureSection) {
        firstFutureSection = section;
      }

      const header = document.createElement('div');
      header.className = 'agenda-day-header';
      const mhSuffix = monthHoliday ? `  ★ ${monthHoliday.toUpperCase()}` : '';
      header.textContent = formatDateLabel(key) + (key === todayKey ? '  ◀ TODAY' : '') + mhSuffix;
      section.appendChild(header);

      if (events.length === 0) {
        const noEv = document.createElement('div');
        noEv.className = 'agenda-no-events';
        noEv.textContent = monthHoliday ? 'HOLIDAY — NO EVENTS SCHEDULED' : 'NO EVENTS';
        section.appendChild(noEv);
      } else {
        // All-day events first, then timed events sorted by startTs
        const sorted = [...events].sort((a, b) => {
          if (a.allDay && !b.allDay) return -1;
          if (!a.allDay && b.allDay) return 1;
          return a.startTs - b.startTs;
        });
        for (const ev of sorted) {
          section.appendChild(makeAgendaRow(ev));
        }
      }

      agendaEl.appendChild(section);
    }

  }

  function makeAgendaRow(ev) {
    const row = document.createElement('div');
    row.className = 'agenda-event-row';

    const colorBar = document.createElement('span');
    colorBar.className = 'agenda-color-bar';
    colorBar.style.background = ev.color || 'var(--c64-green)';
    row.appendChild(colorBar);

    const time = document.createElement('span');
    time.className = 'agenda-event-time';
    time.textContent = ev.allDay ? 'ALL DAY' : formatTime(ev.startTs) + '\u2013' + formatTime(ev.endTs);
    row.appendChild(time);

    const title = document.createElement('span');
    title.className = 'agenda-event-title';
    title.textContent = ev.title;
    row.appendChild(title);

    if (ev.isRecurring) {
      const badge = document.createElement('span');
      badge.className = 'event-recurring-badge';
      badge.textContent = '↻';
      badge.title = 'Recurring event';
      row.appendChild(badge);
    }

    if (ev.eventType) {
      const tag = document.createElement('span');
      tag.className = 'agenda-event-type';
      tag.style.background = ev.color || 'var(--c64-green)';
      tag.textContent = labelDisplayName(ev.eventType).toUpperCase();
      row.appendChild(tag);
    }

    // Clicking an agenda row: on desktop show popover; on mobile open panel
    row.addEventListener('click', (e) => {
      handleEventInteraction(ev, e);
    });

    return row;
  }

  function renderDayPanel(dateKey) {
    panelDateTitle.textContent = formatDateLabel(dateKey);

    const doy  = getDayOfYear(py, pm - 1, pd);
    const wk   = getISOWeekNumber(py, pm - 1, pd);

    let existingMeta = document.getElementById('panel-day-meta');
    if (!existingMeta) {
      existingMeta = document.createElement('div');
      existingMeta.id = 'panel-day-meta';
      existingMeta.className = 'day-meta-row';
      panelDateTitle.insertAdjacentElement('afterend', existingMeta);
    }
    existingMeta.textContent = `WEEK ${wk}  ·  DAY ${doy} OF ${daysInYear}`;

    // ── Holiday banner ────────────────────────────────────────────
    let hBanner = document.getElementById('panel-holiday-banner');
    const holidayName = getUSHoliday(py, pm - 1, pd);
    if (holidayName) {
      if (!hBanner) {
        hBanner = document.createElement('div');
        hBanner.id = 'panel-holiday-banner';
        hBanner.className = 'holiday-banner';
        existingMeta.insertAdjacentElement('afterend', hBanner);

      hBanner.innerHTML = '';
      const hbStar = document.createElement('span');
      hbStar.className = 'hb-star';
      hbStar.textContent = '★';
      hBanner.appendChild(hbStar);
      const hbName = document.createElement('strong');
      hbName.textContent = holidayName.toUpperCase();
      hBanner.appendChild(hbName);
      hBanner.style.display = '';
    } else if (hBanner) {
      hBanner.style.display = 'none';

  function makeEventCard(ev) {
    const card = document.createElement('div');
    card.className = 'event-card';

    card.style.borderLeftColor = cardColor;
    card.style.borderLeftWidth = '4px';

    const header = document.createElement('div');
    header.className = 'event-card-header';

    const colorDot = document.createElement('span');
    colorDot.className = 'event-color-dot';
    colorDot.style.background = cardColor;
    header.appendChild(colorDot);

    const title = document.createElement('div');
    title.className = 'event-card-title';
    title.textContent = ev.title;
    header.appendChild(title);

    if (ev.isRecurring) {
      const badge = document.createElement('span');
      badge.className = 'event-recurring-badge';
      badge.textContent = '↻';
      badge.title = 'Recurring event';
      header.appendChild(badge);
    }

    card.appendChild(header);

    if (ev.eventType) {
      const typeTag = document.createElement('span');

      typeTag.style.background = cardColor;
      typeTag.textContent = labelDisplayName(ev.eventType).toUpperCase();

    card.appendChild(time);

      desc.className = 'event-card-desc';
      desc.textContent = ev.description;

  async function confirmDeleteEvent(ev) {
    const msg = ev.isRecurring
      ? `Delete ALL occurrences of "${ev.title}"?`
      : `Delete "${ev.title}"?`;

    const res = await deleteEvent(ev.id);

      await loadMonthEvents();

      alert('Error: ' + (body.error || res.status));

  formSaveBtn.addEventListener('click', async () => {
    formError.textContent = '';
    const dateStr = fDate.value;
    const endDateStr = fEndDate.value || dateStr;
    const allDay = fAllDay.checked;
    const startTs = localDateToTs(dateStr, allDay ? '00:00' : fStart.value);
    const endTs = localDateToTs(endDateStr, allDay ? '23:59' : fEnd.value);

    // Client-side validation — catch obvious problems before hitting the server.
    if (!fTitle.value.trim()) {
      formError.textContent = 'Title is required.';
      return;
    }
    if (!dateStr) {
      formError.textContent = 'Start date is required.';
      return;
    }
    if (!Number.isFinite(startTs)) {
      formError.textContent = 'Invalid start date or time.';
      return;
    }
    if (!Number.isFinite(endTs)) {
      formError.textContent = 'Invalid end date or time.';
      return;
    }
    if (endTs < startTs) {
      formError.textContent = 'End must be on or after the start.';
      return;
    }

    const recurrenceRule = getRecurrenceRule();

    const payload = {
      title: fTitle.value.trim(),
      description: fDesc.value || undefined,
      startTs,
      endTs,
      allDay,
      color: selectedColor || undefined,
      eventType: fEventType.value.trim() || undefined,
      recurrenceRule: recurrenceRule,
      calendarId: activeTab,
    };

    formSaveBtn.disabled = true;
    let res;
    try {
      if (editingEventId) {
        res = await updateEvent(editingEventId, payload);
      } else {
        res = await createEvent(payload);
      }
    } catch (err) {
      formError.textContent = 'Network error. Please try again.';
      formSaveBtn.disabled = false;
      return;
    }

    formSaveBtn.disabled = false;
    if (res.ok) {
      // Persist the color → type-name mapping for future form auto-fill
      saveColorTypeName(selectedColor, fEventType.value.trim());
      hideForm();
      await loadMonthEvents();
    } else {
      const body = await res.json().catch(() => ({}));
      formError.textContent = 'ERROR: ' + (body.error || res.status);

  function buildMonthPrint() {
    printArea.innerHTML = '';

    const title = document.createElement('div');
    title.className = 'print-title';
    title.textContent = `${MONTH_NAMES[currentMonth]} ${currentYear}`;
    printArea.appendChild(title);

    const gridEl = document.createElement('div');
    gridEl.className = 'print-grid';

    for (const dow of DOW_NAMES) {
      const h = document.createElement('div');
      h.className = 'print-dow';
      h.textContent = dow;
      gridEl.appendChild(h);
    }

    const firstDow = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const prevYear = currentMonth === 0 ? currentYear - 1 : currentYear;
    const prevMonth = currentMonth === 0 ? 11 : currentMonth - 1;
    const prevMonthDays = new Date(currentYear, currentMonth, 0).getDate();
    const nextYear = currentMonth === 11 ? currentYear + 1 : currentYear;
    const nextMonth = currentMonth === 11 ? 0 : currentMonth + 1;

    function appendPrintCell(year, month, day, isOther) {
      const key = toDateKey(year, month, day);
      const cell = document.createElement('div');
      cell.className = 'print-day-cell' + (isOther ? ' other-month' : '');

      const num = document.createElement('div');
      num.className = 'print-day-num';
      num.textContent = day;
      cell.appendChild(num);

      const events = eventsByDay.get(key) || [];
      const sorted = [...events].sort((a, b) => {
        if (a.allDay && !b.allDay) return -1;
        if (!a.allDay && b.allDay) return 1;
        return a.startTs - b.startTs;
      });
      for (const ev of sorted) {
        const evTitle = document.createElement('div');
        evTitle.className = 'print-event-title';
        const timePrefix = ev.allDay ? '' : formatTime(ev.startTs) + ' ';
        evTitle.textContent = timePrefix + ev.title;
        cell.appendChild(evTitle);
      }

      gridEl.appendChild(cell);
    }

    for (let i = 0; i < firstDow; i++) {
      appendPrintCell(prevYear, prevMonth, prevMonthDays - firstDow + 1 + i, true);
    }
    for (let d = 1; d <= daysInMonth; d++) {
      appendPrintCell(currentYear, currentMonth, d, false);
    }
    const totalCells = firstDow + daysInMonth;
    const remainder = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
    for (let i = 1; i <= remainder; i++) {
      appendPrintCell(nextYear, nextMonth, i, true);
    }

    printArea.appendChild(gridEl);
  }

  function buildDayPrint(dateKey) {
    printArea.innerHTML = '';

    const header = document.createElement('div');
    header.className = 'print-day-header';
    header.textContent = formatDateLabel(dateKey);
    printArea.appendChild(header);

    const events = eventsByDay.get(dateKey) || [];
    if (events.length === 0) {
      const noEv = document.createElement('div');
      noEv.className = 'print-no-events';
      noEv.textContent = 'No events scheduled for this day.';
      printArea.appendChild(noEv);
      return;
    }

    const sorted = [...events].sort((a, b) => {
      if (a.allDay && !b.allDay) return -1;
      if (!a.allDay && b.allDay) return 1;
      return a.startTs - b.startTs;
    });

    for (const ev of sorted) {
      const item = document.createElement('div');
      item.className = 'print-event-item';

      const itemTitle = document.createElement('div');
      itemTitle.className = 'print-event-item-title';
      itemTitle.textContent = ev.title;
      item.appendChild(itemTitle);

      const itemTime = document.createElement('div');
      itemTime.className = 'print-event-item-time';
      itemTime.textContent = ev.allDay ? 'ALL DAY' : `${formatTime(ev.startTs)} – ${formatTime(ev.endTs)}`;

        const itemDesc = document.createElement('div');

        item.appendChild(itemDesc);
      }

      printArea.appendChild(item);
    }
  }

  // ── Mini Calendar Sidebar (Google / Outlook / Yahoo style) ────────

  function renderMiniCal() {
    if (!miniCalGrid) return;
    miniCalGrid.innerHTML = '';
    miniMonthLabel.textContent = MONTH_NAMES[miniCalMonth].substring(0, 3) + ' ' + miniCalYear;

    const today = new Date();
    const miniCalTodayKey = toDateKey(today.getFullYear(), today.getMonth(), today.getDate());
    const firstDow = new Date(miniCalYear, miniCalMonth, 1).getDay();
    const daysInMonth = new Date(miniCalYear, miniCalMonth + 1, 0).getDate();
    const prevMonthDays = new Date(miniCalYear, miniCalMonth, 0).getDate();
    const miniPrevYear  = miniCalMonth === 0 ? miniCalYear - 1 : miniCalYear;
    const miniPrevMonth = miniCalMonth === 0 ? 11 : miniCalMonth - 1;
    const miniNextYear  = miniCalMonth === 11 ? miniCalYear + 1 : miniCalYear;
    const miniNextMonth = miniCalMonth === 11 ? 0 : miniCalMonth + 1;

    // DOW single-char headers
    for (const lbl of ['S','M','T','W','T','F','S']) {
      const h = document.createElement('div');
      h.className = 'mini-dow';
      h.textContent = lbl;
      miniCalGrid.appendChild(h);
    }

    function appendMiniCell(y, mo, d, isOther) {
      const k = toDateKey(y, mo, d);
      const hasEv = !isOther && eventsByDay.has(k) && eventsByDay.get(k).length > 0;
      const isHoliday = !isOther && getUSHoliday(y, mo, d);
      const cell = document.createElement('div');
      cell.className = 'mini-day' +
        (isOther ? ' other-month' : '') +
        (k === miniCalTodayKey ? ' today' : '') +
        (k === selectedDate ? ' selected' : '') +
        (hasEv ? ' has-events' : '');
      if (isHoliday) {
        const starSpan = document.createElement('span');
        starSpan.className = 'mini-day-star';
        starSpan.textContent = '★';
        cell.appendChild(starSpan);
        cell.appendChild(document.createTextNode(d));
        cell.title = isHoliday;
      } else {
        cell.textContent = d;
      }
      cell.setAttribute('role', 'gridcell');
      if (!isOther) {
        cell.addEventListener('click', () => {
          currentYear = y; currentMonth = mo; currentDay = d;
          selectedDate = k;
          if (currentView !== 'daily') { currentView = 'daily'; updateViewButtons(); updateBottomNav(); }
          loadViewEvents();
        });
      }
      miniCalGrid.appendChild(cell);
    }

    for (let i = 0; i < firstDow; i++)
      appendMiniCell(miniPrevYear, miniPrevMonth, prevMonthDays - firstDow + 1 + i, true);
    for (let d = 1; d <= daysInMonth; d++)
      appendMiniCell(miniCalYear, miniCalMonth, d, false);
    const rem = (firstDow + daysInMonth) % 7;
    for (let i = 1; i <= (rem === 0 ? 0 : 7 - rem); i++)
      appendMiniCell(miniNextYear, miniNextMonth, i, true);
    renderCalLabels();
  }

  // ── Calendar label color helper ────────────────────────────────────
  function labelColor(name) {
    if (LABEL_COLORS[name]) return LABEL_COLORS[name];
    // Deterministic color from label name hash
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = (hash * 31 + name.charCodeAt(i)) >>> 0;
    const hue = hash % 360;
    return `hsl(${hue},65%,55%)`;
  }

  // ── Calendar label display name (respects renames) ─────────────────
  function labelDisplayName(name) {
    return labelRenames[name] || name;
  }

  // ── Inline rename for a legend label (desktop only) ────────────────
  function startLabelRename(item, nameEl, originalLabel) {
    const input = document.createElement('input');
    input.type = 'text';
    input.value = labelDisplayName(originalLabel);
    input.className = 'cal-label-rename-input';
    input.setAttribute('aria-label', 'Rename label');
    item.replaceChild(input, nameEl);
    input.focus();
    input.select();

    let committed = false;
    const commit = () => {
      if (committed) return;
      committed = true;
      const newName = input.value.trim();
      if (newName && newName !== originalLabel) {
        labelRenames[originalLabel] = newName;
      } else if (!newName || newName === labelDisplayName(originalLabel)) {
        delete labelRenames[originalLabel];
      }
      localStorage.setItem('calendar_label_renames', JSON.stringify(labelRenames));
      renderCalLabels();
    };
    const cancel = () => {
      if (committed) return;
      committed = true;
      renderCalLabels();
    };
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); commit(); }
      if (e.key === 'Escape') { e.preventDefault(); cancel(); }
    });
  }

  // ── Render calendar labels / category toggles ─────────────────────
  function renderCalLabels() {
    const listEl = document.getElementById('cal-labels-list');
    if (!listEl) return;

    // Derive label set from defaults + unique eventTypes in loaded events
    const labelSet = new Set(DEFAULT_LABELS);
    for (const ev of monthEvents) {
      if (ev.eventType) labelSet.add(ev.eventType);
    }
    const labels = [...labelSet];

    // Count events per label (all loaded events, pre-filter)
    const countByLabel = new Map();
    for (const ev of monthEvents) {
      if (!ev.eventType) continue;
      countByLabel.set(ev.eventType, (countByLabel.get(ev.eventType) || 0) + 1);
    }

    listEl.innerHTML = '';

    // "All Events" master toggle
    const allHidden = labels.every((l) => hiddenLabels.has(l));
    const allItem = document.createElement('li');
    allItem.className = 'cal-label-item' + (allHidden ? ' hidden-label' : '');
    allItem.setAttribute('role', 'checkbox');
    allItem.setAttribute('aria-checked', String(!allHidden));
    allItem.setAttribute('tabindex', '0');
    const allDot = document.createElement('span');
    allDot.className = 'cal-label-dot';
    allDot.style.background = 'linear-gradient(135deg,#8B5CF6,#3B82F6)';
    const allName = document.createElement('span');
    allName.className = 'cal-label-name';
    allName.textContent = 'All Events';
    allItem.appendChild(allDot);
    allItem.appendChild(allName);
    const toggleAll = () => {
      // If any labels are hidden, restore all. If none are hidden, hide all.
      if (hiddenLabels.size > 0) {
        hiddenLabels.clear();
      } else {
        labels.forEach((l) => hiddenLabels.add(l));
        hiddenLabels.add(''); // also hide uncategorized events
      }
      localStorage.setItem('calendar_hidden_labels', JSON.stringify([...hiddenLabels]));
      buildEventsByDay();
      renderView();
    };
    allItem.addEventListener('click', toggleAll);
    allItem.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleAll(); } });
    listEl.appendChild(allItem);

    // Individual label items
    const isDesktop = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
    for (const label of labels) {
      const isHidden = hiddenLabels.has(label);
      const count = countByLabel.get(label) || 0;
      const item = document.createElement('li');
      item.className = 'cal-label-item' + (isHidden ? ' hidden-label' : '');
      item.setAttribute('role', 'checkbox');
      item.setAttribute('aria-checked', String(!isHidden));
      item.setAttribute('tabindex', '0');
      const dot = document.createElement('span');
      dot.className = 'cal-label-dot';
      dot.style.background = labelColor(label);
      const name = document.createElement('span');
      name.className = 'cal-label-name';
      name.textContent = labelDisplayName(label);
      if (isDesktop) {
        name.title = 'Click to rename';
        name.style.cursor = 'text';
        name.addEventListener('click', (e) => {
          e.stopPropagation();
          startLabelRename(item, name, label);
        });
      }
      item.appendChild(dot);
      item.appendChild(name);
      if (count > 0) {
        const cnt = document.createElement('span');
        cnt.className = 'cal-label-count';
        cnt.textContent = count;
        item.appendChild(cnt);
      }
      const toggleLabel = () => {
        if (hiddenLabels.has(label)) hiddenLabels.delete(label);
        else hiddenLabels.add(label);
        localStorage.setItem('calendar_hidden_labels', JSON.stringify([...hiddenLabels]));
        buildEventsByDay();
        renderView();
      };
      item.addEventListener('click', toggleLabel);
      item.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleLabel(); } });
      listEl.appendChild(item);
    }
  }

  miniPrevBtn.addEventListener('click', () => {
    if (miniCalMonth === 0) { miniCalMonth = 11; miniCalYear--; } else { miniCalMonth--; }
    renderMiniCal();
  });
  miniNextBtn.addEventListener('click', () => {
    if (miniCalMonth === 11) { miniCalMonth = 0; miniCalYear++; } else { miniCalMonth++; }
    renderMiniCal();
  });

  // ══════════════════════════════════════════════════════════════════
  // ── Event Search (all four platforms have search) ─────────────────
  // ══════════════════════════════════════════════════════════════════
  function setSearchVisible(on) {
    searchView.style.display = on ? '' : 'none';
    const showMain = !on;
    grid.style.display = showMain && currentView === 'monthly' ? '' : 'none';
    document.getElementById('month-agenda').style.display = showMain && currentView === 'monthly' ? '' : 'none';
    dailyView.style.display  = showMain && currentView === 'daily'   ? '' : 'none';
    weeklyView.style.display = showMain && currentView === 'weekly'  ? '' : 'none';
    const scheduleViewEl = document.getElementById('schedule-view');
    if (scheduleViewEl) scheduleViewEl.style.display = showMain && currentView === 'schedule' ? '' : 'none';
  }

  async function performSearch(query) {
    searchQuery = query.trim();
    if (!searchQuery) { setSearchVisible(false); return; }
    setSearchVisible(true);
    searchView.innerHTML = '<div class="search-empty">SEARCHING...</div>';

    const now = Date.now();
    const from = now - 365 * 24 * 60 * 60 * 1000;
    const to   = now + 365 * 24 * 60 * 60 * 1000;
    let all = [];
    try {
      const res = await NaimeanAPI.getCalendarEvents(from, to);
      if (res.ok) { const d = await res.json(); all = d.events || []; }
    } catch (_) { /* ignore */ }

    const q = searchQuery.toLowerCase();
    renderSearchResults(all.filter((ev) =>
      (ev.title       && ev.title.toLowerCase().includes(q)) ||
      (ev.description && ev.description.toLowerCase().includes(q)) ||
      (ev.eventType   && ev.eventType.toLowerCase().includes(q))
    ));
  }

  function renderSearchResults(events) {
    searchView.innerHTML = '';
    if (!events.length) {
      const m = document.createElement('div');
      m.className = 'search-empty';
      m.textContent = `NO EVENTS MATCHING "${searchQuery.toUpperCase()}".`;
      searchView.appendChild(m);
      return;
    }
    const c = document.createElement('div');
    c.className = 'search-count';
    c.textContent = `${events.length} RESULT${events.length !== 1 ? 'S' : ''} FOR "${searchQuery.toUpperCase()}"`;
    searchView.appendChild(c);

    const sorted = [...events].sort((a, b) => a.startTs - b.startTs);
    const byDay = new Map();
    for (const ev of sorted) {
      const k = dateKeyFromTs(ev.startTs);
      if (!byDay.has(k)) byDay.set(k, []);
      byDay.get(k).push(ev);
    }
    const todayK = toDateKey(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());
    for (const [k, evs] of byDay) {
      const sec = document.createElement('div');
      sec.className = 'agenda-day' + (k === todayK ? ' is-today' : k < todayK ? ' is-past' : '');
      const hdr = document.createElement('div');
      hdr.className = 'agenda-day-header';
      hdr.textContent = formatDateLabel(k) + (k === todayK ? '  ◀ TODAY' : '');
      sec.appendChild(hdr);
      for (const ev of evs) sec.appendChild(makeAgendaRow(ev));
      searchView.appendChild(sec);
    }
  }

  // ── Schedule view (infinite-scroll agenda from today) ────────────
  function renderScheduleView() {
    const schedEl = document.getElementById('schedule-view');
    if (!schedEl) return;
    schedEl.innerHTML = '';
    monthLabel.textContent = 'UPCOMING';

    const today = new Date();
    const todayKey = toDateKey(today.getFullYear(), today.getMonth(), today.getDate());

    // Collect all date keys that have events or are today, >= today, sorted
    const allKeys = [...eventsByDay.keys()].filter((k) => k >= todayKey).sort();
    if (!allKeys.includes(todayKey)) allKeys.unshift(todayKey);
    allKeys.sort();

    if (allKeys.length === 0) {
      const m = document.createElement('div');
      m.className = 'search-empty';
      m.textContent = 'NO UPCOMING EVENTS.';
      schedEl.appendChild(m);
      return;
    }

    for (const key of allKeys) {
      const [ky, km1, kd] = key.split('-').map(Number);
      const holiday = getUSHoliday(ky, km1 - 1, kd);
      const events = eventsByDay.get(key) || [];
      const isToday = key === todayKey;

      if (events.length === 0 && !holiday && !isToday) continue;

      const section = document.createElement('div');
      section.className = 'agenda-day' + (isToday ? ' is-today' : '');

      const header = document.createElement('div');
      header.className = 'agenda-day-header';
      const hSuffix = holiday ? `  \u2605 ${holiday.toUpperCase()}` : '';
      header.textContent = formatDateLabel(key) + (isToday ? '  \u25c4 TODAY' : '') + hSuffix;
      header.style.cursor = 'pointer';
      header.addEventListener('click', () => {
        currentYear = ky; currentMonth = km1 - 1; currentDay = kd;
        selectedDate = key;
        switchView('daily');
      });
      section.appendChild(header);

      if (events.length === 0) {
        const noEv = document.createElement('div');
        noEv.className = 'agenda-no-events';
        noEv.textContent = holiday ? 'HOLIDAY \u2014 NO EVENTS SCHEDULED' : 'NO EVENTS';
        section.appendChild(noEv);
      } else {
        const sorted = [...events].sort((a, b) => {
          if (a.allDay && !b.allDay) return -1;
          if (!a.allDay && b.allDay) return 1;
          return a.startTs - b.startTs;
        });
        for (const ev of sorted) {
          section.appendChild(makeAgendaRow(ev));
        }
      }

      schedEl.appendChild(section);
    }
  }

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim();
    searchClearBtn.style.display = q ? 'inline-block' : 'none';
    clearTimeout(searchDebounceTimer);
    searchDebounceTimer = setTimeout(() => performSearch(q), 360);
  });
  searchClearBtn.addEventListener('click', () => {
    searchInput.value = ''; searchClearBtn.style.display = 'none'; performSearch('');
  });

  function isMobile() { return window.innerWidth <= MOBILE_BREAKPOINT; }

  function handleEventInteraction(ev, e) {
    if (isMobile()) {
      // Mobile: open existing side panel (bottom-sheet on mobile via CSS)
      const key = tsToLocalDateStr(ev.startTs);
      selectedDate = key;
      document.querySelectorAll('.day-cell.selected').forEach((el) => el.classList.remove('selected'));
      const cell = document.querySelector(`.day-cell[data-key="${CSS.escape(key)}"]`);
      if (cell) cell.classList.add('selected');
      openPanel(key);

      // Desktop: floating popover (Google / Outlook / Yahoo style)
      showEventPopover(ev, e);

  // ══════════════════════════════════════════════════════════════════
  // ── Desktop Event Popover (Google Calendar / Outlook / Yahoo) ─────
  // ══════════════════════════════════════════════════════════════════
  function showEventPopover(ev, e) {
    dismissEventPopover();
    popoverBackdrop.classList.add('visible');

    // Build content
    popoverContent.innerHTML = '';

    const hdr = document.createElement('div');
    hdr.className = 'po-header';

    const bar = document.createElement('div');
    bar.className = 'po-color-bar';
    bar.style.background = ev.color || 'var(--c64-green)';
    hdr.appendChild(bar);

    const titleEl = document.createElement('div');
    titleEl.className = 'po-title';
    titleEl.textContent = ev.title;
    hdr.appendChild(titleEl);

    const closeBtn = document.createElement('button');
    closeBtn.className = 'po-close';
    closeBtn.textContent = '✕';
    closeBtn.setAttribute('aria-label', 'Close');
    closeBtn.addEventListener('click', dismissEventPopover);
    hdr.appendChild(closeBtn);

    popoverContent.appendChild(hdr);

    const timeEl = document.createElement('div');
    timeEl.className = 'po-time';
    if (ev.allDay) {
      timeEl.textContent = 'ALL DAY · ' + formatDateLabel(tsToLocalDateStr(ev.startTs));
    } else {
      timeEl.textContent = formatTime(ev.startTs) + ' – ' + formatTime(ev.endTs) +
        ' · ' + formatDateLabel(tsToLocalDateStr(ev.startTs));
    }
    popoverContent.appendChild(timeEl);

    if (ev.eventType) {
      const tag = document.createElement('div');
      tag.className = 'po-type-tag';
      tag.style.background = ev.color || 'var(--c64-green)';
      tag.textContent = labelDisplayName(ev.eventType).toUpperCase();
      popoverContent.appendChild(tag);
    }
    if (ev.isRecurring) {
      const rb = document.createElement('div');
      rb.style.cssText = 'font-size:13px;color:var(--c64-cyan);margin-bottom:5px;';
      rb.textContent = '↻ RECURRING EVENT';
      popoverContent.appendChild(rb);
    }
    if (ev.description) {
      const desc = document.createElement('div');
      desc.className = 'po-desc';
      desc.textContent = ev.description;
      popoverContent.appendChild(desc);
    }
    const meta = document.createElement('div');
    meta.className = 'po-meta';
    meta.textContent = 'by ' + (ev.updatedByName || ev.createdByName || '');
    popoverContent.appendChild(meta);

    const actions = document.createElement('div');
    actions.className = 'po-actions';

    const editBtn = document.createElement('button');
    editBtn.className = 'btn btn-sm';
    editBtn.textContent = ev.isRecurring ? 'EDIT SERIES' : 'EDIT';
    editBtn.addEventListener('click', () => { dismissEventPopover(); showEditForm(ev); });
    actions.appendChild(editBtn);

    const openBtn = document.createElement('button');
    openBtn.className = 'btn btn-sm btn-view';
    openBtn.textContent = 'OPEN DAY';
    openBtn.addEventListener('click', () => {
      dismissEventPopover();
      const key = tsToLocalDateStr(ev.startTs);
      selectedDate = key;
      openPanel(key);
    });
    actions.appendChild(openBtn);

    const delBtn = document.createElement('button');
    delBtn.className = 'btn btn-sm btn-red';
    delBtn.textContent = 'DELETE';
    delBtn.addEventListener('click', () => { dismissEventPopover(); confirmDeleteEvent(ev); });
    actions.appendChild(delBtn);

    popoverContent.appendChild(actions);

    // Position popover near click, keeping within viewport
    eventPopover.classList.add('visible');
    const pw = 288, ph = eventPopover.offsetHeight || 240;
    const vw = window.innerWidth, vh = window.innerHeight;
    let x = e.clientX + 12;
    let y = e.clientY - 12;
    if (x + pw > vw - 8) x = e.clientX - pw - 12;
    if (y + ph > vh - 8) y = vh - ph - 8;
    if (y < 8) y = 8;
    if (x < 8) x = 8;
    eventPopover.style.left = x + 'px';
    eventPopover.style.top  = y + 'px';
  }

  function dismissEventPopover() {
    eventPopover.classList.remove('visible');
    popoverBackdrop.classList.remove('visible');
  }

  popoverBackdrop.addEventListener('click', dismissEventPopover);

  // ══════════════════════════════════════════════════════════════════
  // ── Touch Swipe Gestures (Google/Yahoo/Outlook mobile style) ──────
  //    Swipe left  → next period
  //    Swipe right → previous period
  // ══════════════════════════════════════════════════════════════════
  (function setupSwipe() {
    const calArea = document.getElementById('calendar-area');
    if (!calArea) return;
    let tx = 0, ty = 0, dragging = false;
    calArea.addEventListener('touchstart', (e) => {
      if (e.touches.length !== 1) return;
      tx = e.touches[0].clientX;
      ty = e.touches[0].clientY;
      dragging = true;
    }, { passive: true });
    calArea.addEventListener('touchend', (e) => {
      if (!dragging) return;
      dragging = false;
      const dx = e.changedTouches[0].clientX - tx;
      const dy = e.changedTouches[0].clientY - ty;
      // Only trigger on predominantly horizontal swipe (>50px, less vertical than horizontal)
      if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
        if (dx < 0) nextBtn.click(); // swipe left = forward
        else        prevBtn.click(); // swipe right = backward
      }
    }, { passive: true });
  })();

  // ══════════════════════════════════════════════════════════════════
  // ── Mobile bottom-sheet drag-to-dismiss (Google/Yahoo style) ─────
  // ══════════════════════════════════════════════════════════════════
  (function setupBottomSheetDrag() {
    const handle = document.getElementById('bottom-sheet-handle');
    if (!handle) return;
    let startY = 0;
    handle.addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; }, { passive: true });
    handle.addEventListener('touchend', (e) => {
      if (e.changedTouches[0].clientY - startY > 60) closePanel();
    }, { passive: true });
  })();

  // ── Mountain peak stars ───────────────────────────────────────────
  // Positions the 3 glowing stars (#nc-sigil) so they sit right on the tip
  // of the highest mountain peak in the calendar-grid backdrop.
  // Mountain SVG peak is at x=50%, y=64% of #calendar-grid
  // (path point 50,8 inside viewBox 0 0 100 40; background covers bottom 45%).
  // Star arrangement: 1 tip star above, 2 base stars flanking the peak so
  // the mountain tip is centered between the 2 bottom stars.
  function positionMountainStars() {
    const sigil   = document.getElementById('nc-sigil');
    const calGrid = document.getElementById('calendar-grid');
    if (!sigil || !calGrid) return;

    const rect   = calGrid.getBoundingClientRect();
    if (rect.width === 0 || rect.height === 0) return;

    // Mountain peak viewport coordinates
    const peakX = rect.left + rect.width  * 0.50;
    const peakY = rect.top  + rect.height * 0.64;

    // #nc-sigil is position:fixed top:0 left:0, so offsets equal viewport coords
    const cx = Math.round(peakX);
    const cy = Math.round(peakY);

    // Triangle: tip star 55px above peak (centered), 2 base stars ±42px wide
    // and 12px above the peak so the mountain tip shows between them
    const spread = 42;
    const lift   = 12;
    const above  = 55;

    sigil.style.boxShadow = [
      `${cx}px ${cy - lift - above}px 5px 2px rgba(255,255,255,1.00)`,
      `${cx - spread}px ${cy - lift}px 5px 2px rgba(255,255,255,1.00)`,
      `${cx + spread}px ${cy - lift}px 5px 2px rgba(220,235,255,1.00)`,
    ].join(', ');
  }

  window.addEventListener('resize', positionMountainStars);
  window.addEventListener('scroll', positionMountainStars, { passive: true });

  // ── Init ──────────────────────────────────────────────────────────
