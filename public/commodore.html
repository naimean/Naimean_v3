<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commodore 64</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100svh;
      display: grid;
      place-items: center;
      background: #000;
      padding: 12px;
    }

    #scene {
      position: relative;
      width: min(100%, 444px);
      max-height: calc(100svh - 24px);
    }

    #scene img {
      display: block;
      width: 100%;
      height: auto;
      max-height: calc(100svh - 24px);
      border-radius: 8px;
      user-select: none;
      -webkit-user-drag: none;
    }

    #overlay-layer {
      position: absolute;
      inset: 0;
      border-radius: 8px;
    }

    .editable {
      position: absolute;
    }

    .shadow-layer {
      background: #000;
      box-shadow: inset 0 0 24px rgba(0, 0, 0, 0.9);
      border-radius: 16px;
      pointer-events: none;
      transform-origin: center;
      overflow: hidden;
    }

    .shadow-layer::after {
      content: '';
      position: absolute;
      left: 10%;
      right: 10%;
      top: 50%;
      height: 10%;
      border-radius: 999px;
      background:
        radial-gradient(circle, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.72) 45%, rgba(255, 255, 255, 0) 100%);
      box-shadow:
        0 0 14px rgba(255, 255, 255, 0.72),
        0 0 28px rgba(255, 255, 255, 0.45);
      opacity: 0;
      transform: translateY(-50%) scaleX(0.08) scaleY(0.08);
      pointer-events: none;
    }

    .shadow-layer.is-powering-on {
      animation: commodore-monitor-power-on 1.5s cubic-bezier(0.2, 0.7, 0.2, 1) forwards;
    }

    .shadow-layer.is-powering-on::after {
      animation: commodore-monitor-scanline 1.5s ease-out forwards;
    }

    .shadow-layer.is-powered-on {
      opacity: 0;
      transform: scale(1.04);
      box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.22);
    }

    .shadow-layer.is-powering-off {
      animation: commodore-monitor-power-off 500ms ease-in forwards;
    }

    .hotspot {
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .greenscreen-text {
      position: absolute;
      display: grid;
      align-content: flex-start;
      justify-items: flex-start;
      gap: 2px;
      padding: 8px;
      color: #72ff72;
      font-family: "Courier New", Courier, monospace;
      font-size: calc(4px * 3);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: 0.35px;
      text-shadow:
        0 0 2px rgba(120, 255, 120, 0.8),
        0 0 6px rgba(64, 190, 64, 0.55);
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms ease;
      overflow: hidden;
      z-index: 1;
    }

    .greenscreen-text.is-powered-on {
      opacity: 1;
    }

    .power-button-visual {
      overflow: hidden;
      border-radius: 999px;
      border: 1px solid rgba(110, 78, 43, 0.55);
      background:
        linear-gradient(180deg, rgba(126, 96, 63, 0.96) 0%, rgba(77, 51, 28, 0.96) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255, 233, 192, 0.34),
        inset 0 -2px 3px rgba(0, 0, 0, 0.42),
        0 1px 3px rgba(0, 0, 0, 0.3);
      pointer-events: none;
      transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
    }

    .power-button-visual.is-powered-on {
      transform: translateY(1px);
      filter: brightness(1.08);
      box-shadow:
        inset 0 2px 3px rgba(0, 0, 0, 0.36),
        inset 0 -1px 1px rgba(255, 233, 192, 0.2),
        0 0 2px rgba(255, 161, 70, 0.42);
    }

    .power-button-visual::before {
      content: '';
      position: absolute;
      inset: 17% 13%;
      border-radius: 999px;
      background:
        radial-gradient(circle at 30% 28%, rgba(255, 245, 214, 0.9) 0%, rgba(255, 245, 214, 0) 26%),
        radial-gradient(circle at center, rgba(255, 194, 106, 0.98) 0%, rgba(241, 112, 45, 0.95) 48%, rgba(139, 19, 12, 0.7) 74%, rgba(139, 19, 12, 0) 100%);
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.25),
        inset 0 -1px 1px rgba(0, 0, 0, 0.45),
        0 0 10px 2px rgba(255, 116, 29, 0.7),
        0 0 16px 4px rgba(255, 102, 0, 0.28);
      transition: box-shadow 180ms ease, filter 180ms ease;
      animation: commodore-power-glow 3.4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    .power-button-visual::after {
      content: '';
      position: absolute;
      inset: 31% 35%;
      border-radius: 999px;
      background:
        radial-gradient(circle at 35% 28%, rgba(228, 255, 232, 0.95) 0%, rgba(228, 255, 232, 0) 35%),
        linear-gradient(180deg, #96ff9a 0%, #2ce45c 55%, #0d6817 100%);
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.28),
        inset 0 -1px 1px rgba(0, 0, 0, 0.35),
        0 0 7px 1px rgba(74, 255, 118, 0.55);
      pointer-events: none;
      animation: commodore-led-flicker 5.5s steps(1, end) infinite;
    }

    .power-button-visual.is-powered-on::before {
      animation: none;
    }

    .power-button-visual.is-powered-on::after {
      animation: none;
    }

    @keyframes commodore-power-glow {
      0%,
      100% {
        box-shadow:
          inset 0 1px 1px rgba(255, 255, 255, 0.25),
          inset 0 -1px 1px rgba(0, 0, 0, 0.45),
          0 0 11px 2px rgba(255, 124, 44, 0.72),
          0 0 18px 5px rgba(255, 108, 17, 0.26);
        transform: scale(0.98);
        filter: brightness(1) saturate(1);
      }

      35% {
        box-shadow:
          inset 0 1px 1px rgba(255, 255, 255, 0.25),
          inset 0 -1px 1px rgba(0, 0, 0, 0.45),
          0 0 15px 4px rgba(255, 149, 67, 0.92),
          0 0 24px 7px rgba(255, 126, 38, 0.44);
        transform: scale(1.02);
        filter: brightness(1.14) saturate(1.1);
      }

      65% {
        box-shadow:
          inset 0 1px 1px rgba(255, 255, 255, 0.25),
          inset 0 -1px 1px rgba(0, 0, 0, 0.45),
          0 0 13px 3px rgba(255, 172, 90, 0.82),
          0 0 22px 6px rgba(255, 140, 54, 0.36);
        transform: scale(1);
        filter: brightness(1.08) saturate(1.04);
      }
    }

    @keyframes commodore-led-flicker {
      0%,
      20%,
      26%,
      59%,
      63%,
      100% {
        opacity: 1;
        filter: brightness(1);
      }

      22% {
        opacity: 0.88;
        filter: brightness(1.16);
      }

      24% {
        opacity: 0.94;
        filter: brightness(0.94);
      }

      61% {
        opacity: 0.9;
        filter: brightness(1.12);
      }
    }

    @keyframes commodore-monitor-power-on {
      0% {
        opacity: 1;
        transform: scale(1);
        filter: brightness(0.55) contrast(1.2);
        box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.96);
      }

      32% {
        opacity: 1;
        transform: scaleX(1.01) scaleY(0.06);
        filter: brightness(2.3) contrast(1.7);
        box-shadow:
          inset 0 0 8px rgba(255, 255, 255, 0.85),
          0 0 24px rgba(255, 255, 255, 0.45);
      }

      58% {
        opacity: 0.92;
        transform: scaleX(1.03) scaleY(0.12);
        filter: brightness(1.55) contrast(1.4);
      }

      100% {
        opacity: 0;
        transform: scale(1.04);
        filter: brightness(1) contrast(1);
        box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.22);
      }
    }

    @keyframes commodore-monitor-scanline {
      0% {
        opacity: 0;
        transform: translateY(-50%) scaleX(0.08) scaleY(0.08);
      }

      @keyframes commodore-monitor-power-off {
        0% {
          opacity: 0;
          transform: scale(1.04);
          filter: brightness(1.28) contrast(1.12);
        }

        100% {
          opacity: 1;
          transform: scale(1);
          filter: brightness(1) contrast(1);
        }
      }

      30% {
        opacity: 0.95;
        transform: translateY(-50%) scaleX(1.02) scaleY(1);
      }

      56% {
        opacity: 0.42;
        transform: translateY(-50%) scaleX(0.92) scaleY(0.24);
      }

      100% {
        opacity: 0;
        transform: translateY(-50%) scaleX(0.5) scaleY(0.02);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .shadow-layer.is-powering-on {
        animation: commodore-monitor-fade 1.5s linear forwards;
      }

      .shadow-layer.is-powering-on::after {
        animation: none;
      }

      .power-button-visual::before {
        animation: none;
      }
    }

    @keyframes commodore-monitor-fade {
      from {
        opacity: 1;
      }

      to {
        opacity: 0;
        transform: scale(1.04);
        box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.22);
      }
    }

    .label {
      display: none;
      position: absolute;
      top: -20px;
      left: 0;
      font: 600 11px/1.2 system-ui, sans-serif;
      padding: 2px 6px;
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      border-radius: 999px;
      white-space: nowrap;
      pointer-events: none;
    }

    .resize-handle {
      display: none;
      position: absolute;
      width: 10px;
      height: 10px;
      background: #00d1ff;
      border: 1px solid #002633;
      border-radius: 2px;
      pointer-events: auto;
    }

    .resize-handle[data-dir="nw"] { top: -5px; left: -5px; cursor: nwse-resize; }
    .resize-handle[data-dir="ne"] { top: -5px; right: -5px; cursor: nesw-resize; }
    .resize-handle[data-dir="sw"] { bottom: -5px; left: -5px; cursor: nesw-resize; }
    .resize-handle[data-dir="se"] { right: -5px; bottom: -5px; cursor: nwse-resize; }

    #debug-controls {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 30;
      display: flex;
      gap: 8px;
    }

    #debug-toggle-btn,
    #debug-save-btn {
      border: 1px solid rgba(255, 255, 255, 0.4);
      background: rgba(0, 0, 0, 0.72);
      color: #fff;
      border-radius: 999px;
      padding: 8px 14px;
      font: 600 13px/1 system-ui, sans-serif;
      cursor: pointer;
    }

    #debug-save-btn {
      display: none;
      border-color: rgba(0, 209, 255, 0.65);
      color: #aef3ff;
    }

    body.debug #debug-save-btn {
      display: inline-block;
    }

    #debug-save-btn[data-state="saved"] {
      border-color: rgba(123, 255, 187, 0.85);
      color: #d9ffe8;
    }

    #debug-save-btn[data-state="error"] {
      border-color: rgba(255, 111, 111, 0.9);
      color: #ffd4d4;
    }

    body.debug .editable {
      outline: 1px dashed rgba(255, 255, 255, 0.9);
      cursor: move;
      pointer-events: auto;
      touch-action: none;
    }

    body.debug .shadow-layer {
      background: rgba(0, 0, 0, 0.55);
    }

    body.debug .hotspot {
      background: rgba(0, 255, 128, 0.2);
    }

    body.debug .power-button-visual {
      background:
        linear-gradient(180deg, rgba(126, 96, 63, 0.96) 0%, rgba(77, 51, 28, 0.96) 100%);
      pointer-events: auto;
    }

    body.debug .label,
    body.debug .resize-handle {
      display: block;
    }

    @media (pointer: coarse) {
      .resize-handle {
        width: 16px;
        height: 16px;
      }

      .resize-handle[data-dir="nw"] { top: -8px; left: -8px; }
      .resize-handle[data-dir="ne"] { top: -8px; right: -8px; }
      .resize-handle[data-dir="sw"] { bottom: -8px; left: -8px; }
      .resize-handle[data-dir="se"] { right: -8px; bottom: -8px; }
    }

    @media (min-width: 900px) {
      body {
        padding: 24px;
      }

      #scene {
        max-height: calc(100svh - 48px);
      }

      #scene img {
        max-height: calc(100svh - 48px);
      }

      #debug-controls {
        top: 20px;
        right: 20px;
      }
    }
  </style>
</head>
<body>
  <div id="debug-controls">
    <button id="debug-toggle-btn" type="button" aria-pressed="false">Debug</button>
    <button id="debug-save-btn" type="button" aria-label="Save current debug layout">Save</button>
  </div>
  <main id="scene">
    <img id="scene-image" src="assets/images/commodore64.v20260424.jpg" alt="Commodore 64" />
    <div id="overlay-layer" aria-label="Commodore hotspots and overlays"></div>
  </main>
  <script>
    (() => {
      const DESIGN_WIDTH = 444;
      const DESIGN_HEIGHT = 557;
      const MIN_SIZE = 12;
      const STORAGE_KEY = 'commodore.editor.layout.v1';
      const POWER_STATE_STORAGE_KEY = 'commodore.screen.poweredOn.v1';
      const COMMODORE_NAV_SOURCE_STORAGE_KEY = 'commodore.navigation.source.v1';
      const COMMODORE_NAV_SOURCE_DEN = 'den';
      const COMMODORE_HISTORY_SOURCE_KEY = 'commodoreSource';
      const COMMODORE_HISTORY_DEN_BACK_GUARD_KEY = 'commodoreDenBackGuard';
      const SAVE_FEEDBACK_DURATION_MS = 1400;
      const DEBUG_SAVE_PASSWORD_KEY = 'naimean-debug';
      const DEBUG_SAVE_PASSWORD_CIPHER = [90, 87, 91, 84, 85];
      const CHAPEL_URL = '/chapel';
      const DEN_URL = '/';
      const COMMODORE_POWER_OFF_SFX_URL = 'assets/audio/fronbondi_skegs-sfx-cinematic-slow-subdown-sound-effect-238489.mp3';
      const COMMODORE_BOOT_TEXT = [
        '**** COMMODORE 64 BASIC V2 ****',
        '64K RAM SYSTEM  38911 BASIC BYTES FREE',
        '',
        'READY.'
      ];
      const DEFAULT_LAYOUT = {
        'monitor-shadow': { x: 146, y: 118, w: 150, h: 70, kind: 'shadow', label: 'Monitor Shadow' },
        'return-key': { x: 283, y: 403, w: 58, h: 30, kind: 'hotspot', label: 'Return Key' },
        'power-button': { x: 376, y: 472, w: 34, h: 24, kind: 'hotspot', label: 'Power Button', variant: 'power-button' }
      };
      const HANDLE_DIRS = ['nw', 'ne', 'sw', 'se'];

      const overlayLayer = document.getElementById('overlay-layer');
      const debugButton = document.getElementById('debug-toggle-btn');
      const saveButton = document.getElementById('debug-save-btn');
      const layout = loadLayout();
      let monitorShadowEl = null;
      let powerButtonEl = null;
      let greenscreenTextEl = null;
      let editState = null;
      let saveButtonResetTimer = null;
      let hasDebugSaveAccess = false;
      let isPoweredOn = loadPowerState();
      let shouldRouteBackToDen = consumeCommodoreEntrySource() === COMMODORE_NAV_SOURCE_DEN;
      let isPoweringOff = false;
      let powerOffNavigationTimeoutId = null;
      const powerOffAudioEl = new Audio(COMMODORE_POWER_OFF_SFX_URL);
      powerOffAudioEl.preload = 'auto';

      function clamp(value, min, max) {
        return Math.max(min, Math.min(value, max));
      }

      function encodeDebugSavePassword(value) {
        const source = String(value ?? '');
        return Array.from(source, (char, index) => (
          char.charCodeAt(0) ^ DEBUG_SAVE_PASSWORD_KEY.charCodeAt(index % DEBUG_SAVE_PASSWORD_KEY.length)
        ));
      }

      function hasMatchingDebugSaveCipher(encodedValue) {
        if (encodedValue.length !== DEBUG_SAVE_PASSWORD_CIPHER.length) {
          return false;
        }
        return encodedValue.every((byte, index) => byte === DEBUG_SAVE_PASSWORD_CIPHER[index]);
      }

      function ensureDebugSaveAccess() {
        if (!document.body.classList.contains('debug')) {
          return true;
        }
        if (hasDebugSaveAccess) {
          return true;
        }
        const attempt = window.prompt('Debug save password required.');
        if (attempt === null) {
          return false;
        }
        const isValid = hasMatchingDebugSaveCipher(encodeDebugSavePassword(attempt.trim()));
        if (!isValid) {
          return false;
        }
        hasDebugSaveAccess = true;
        return true;
      }

      function sanitizeRect(rect, fallback) {
        const x = Number.isFinite(rect?.x) ? rect.x : fallback.x;
        const y = Number.isFinite(rect?.y) ? rect.y : fallback.y;
        const w = Number.isFinite(rect?.w) ? rect.w : fallback.w;
        const h = Number.isFinite(rect?.h) ? rect.h : fallback.h;
        const safeX = clamp(Math.round(x), 0, DESIGN_WIDTH - MIN_SIZE);
        const safeY = clamp(Math.round(y), 0, DESIGN_HEIGHT - MIN_SIZE);
        return {
          x: safeX,
          y: safeY,
          w: clamp(Math.round(w), MIN_SIZE, DESIGN_WIDTH - safeX),
          h: clamp(Math.round(h), MIN_SIZE, DESIGN_HEIGHT - safeY),
          kind: fallback.kind,
          label: fallback.label,
          variant: fallback.variant || null
        };
      }

      function loadLayout() {
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
          const next = {};
          Object.entries(DEFAULT_LAYOUT).forEach(([id, fallback]) => {
            next[id] = sanitizeRect(saved[id], fallback);
          });
          return next;
        } catch {
          const next = {};
          Object.entries(DEFAULT_LAYOUT).forEach(([id, fallback]) => {
            next[id] = { ...fallback };
          });
          return next;
        }
      }

      function loadPowerState() {
        try {
          return sessionStorage.getItem(POWER_STATE_STORAGE_KEY) === 'true';
        } catch {
          return false;
        }
      }

      function consumeCommodoreEntrySource() {
        try {
          const source = sessionStorage.getItem(COMMODORE_NAV_SOURCE_STORAGE_KEY);
          sessionStorage.removeItem(COMMODORE_NAV_SOURCE_STORAGE_KEY);
          return source;
        } catch {
          return null;
        }
      }

      function primeBackNavigationToDen() {
        if (!shouldRouteBackToDen) return;
        try {
          const currentState =
            history.state && typeof history.state === 'object' ? history.state : {};
          if (currentState[COMMODORE_HISTORY_DEN_BACK_GUARD_KEY]) return;
          const denSourceState = {
            ...currentState,
            [COMMODORE_HISTORY_SOURCE_KEY]: COMMODORE_NAV_SOURCE_DEN
          };
          history.replaceState(denSourceState, '', window.location.href);
          history.pushState(
            {
              ...denSourceState,
              [COMMODORE_HISTORY_DEN_BACK_GUARD_KEY]: true
            },
            '',
            window.location.href
          );
        } catch (error) {
          console.warn('Unable to prime Commodore back navigation source.', error);
          shouldRouteBackToDen = false;
        }
      }

      function savePowerState() {
        try {
          sessionStorage.setItem(POWER_STATE_STORAGE_KEY, String(isPoweredOn));
        } catch (error) {
          console.warn('Unable to save Commodore power state.', error);
        }
      }

      function togglePowerState() {
        isPoweredOn = !isPoweredOn;
        applyPowerState({ animate: isPoweredOn });
        savePowerState();
      }

      function navigateToChapel() {
        window.location.assign(CHAPEL_URL);
      }

      function schedulePowerOffNavigation() {
        if (powerOffNavigationTimeoutId) {
          clearTimeout(powerOffNavigationTimeoutId);
        }
        powerOffNavigationTimeoutId = window.setTimeout(() => {
          powerOffNavigationTimeoutId = null;
          navigateToChapel();
        }, 1300);
      }

      async function powerOffAndReturnToChapel() {
        if (!isPoweredOn || isPoweringOff) return;
        isPoweringOff = true;
        isPoweredOn = false;
        applyPowerState({ animateOff: true });
        savePowerState();
        powerOffAudioEl.currentTime = 0;
        schedulePowerOffNavigation();
        const complete = () => {
          if (powerOffNavigationTimeoutId) {
            clearTimeout(powerOffNavigationTimeoutId);
            powerOffNavigationTimeoutId = null;
          }
          navigateToChapel();
        };
        powerOffAudioEl.addEventListener('ended', complete, { once: true });
        try {
          await powerOffAudioEl.play();
        } catch (error) {
          console.warn('Unable to play Commodore power-off audio.', error);
        }
      }

      function resetSaveButtonLabel() {
        saveButton.dataset.state = '';
        saveButton.textContent = 'Save';
      }

      function setSaveButtonState(state, text) {
        if (saveButtonResetTimer) {
          clearTimeout(saveButtonResetTimer);
          saveButtonResetTimer = null;
        }
        saveButton.dataset.state = state;
        saveButton.textContent = text;
        if (state) {
          saveButtonResetTimer = setTimeout(resetSaveButtonLabel, SAVE_FEEDBACK_DURATION_MS);
        }
      }

      function saveLayout(showFeedback = false) {
        if (!ensureDebugSaveAccess()) {
          if (showFeedback) setSaveButtonState('error', 'Password Required');
          return false;
        }
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(layout));
          if (showFeedback) setSaveButtonState('saved', 'Saved');
          return true;
        } catch (error) {
          console.warn('Unable to save Commodore debug layout.', error);
          if (showFeedback) setSaveButtonState('error', 'Save Failed: Check Storage');
          return false;
        }
      }

      function makeEditable(id, config) {
        const el = document.createElement(config.kind === 'hotspot' ? 'button' : 'div');
        el.className = `editable ${config.kind === 'shadow' ? 'shadow-layer' : 'hotspot'}`;
        el.dataset.id = id;
        if (config.kind === 'hotspot') {
          el.type = 'button';
          el.ariaLabel = config.label;
        }
        if (config.variant === 'power-button') {
          el.classList.add('power-button-visual');
          el.tabIndex = -1;
        }

        const label = document.createElement('span');
        label.className = 'label';
        label.textContent = config.label;
        el.appendChild(label);

        HANDLE_DIRS.forEach((dir) => {
          const handle = document.createElement('span');
          handle.className = 'resize-handle';
          handle.dataset.dir = dir;
          el.appendChild(handle);
        });

        overlayLayer.appendChild(el);
      }

      function renderLayout() {
        Object.entries(layout).forEach(([id, rect]) => {
          const el = overlayLayer.querySelector(`[data-id="${id}"]`);
          if (!el) return;
          el.style.left = `${(rect.x / DESIGN_WIDTH) * 100}%`;
          el.style.top = `${(rect.y / DESIGN_HEIGHT) * 100}%`;
          el.style.width = `${(rect.w / DESIGN_WIDTH) * 100}%`;
          el.style.height = `${(rect.h / DESIGN_HEIGHT) * 100}%`;
        });
        if (greenscreenTextEl) {
          const screenRect = layout['monitor-shadow'];
          greenscreenTextEl.style.left = `${(screenRect.x / DESIGN_WIDTH) * 100}%`;
          greenscreenTextEl.style.top = `${(screenRect.y / DESIGN_HEIGHT) * 100}%`;
          greenscreenTextEl.style.width = `${(screenRect.w / DESIGN_WIDTH) * 100}%`;
          greenscreenTextEl.style.height = `${(screenRect.h / DESIGN_HEIGHT) * 100}%`;
        }
      }

      function startEdit(event, type, dir, editableEl) {
        event.preventDefault();
        const id = editableEl.dataset.id;
        const rect = layout[id];
        const scale = overlayLayer.clientWidth / DESIGN_WIDTH;
        if (!rect || scale <= 0) return;
        if (editableEl.setPointerCapture) {
          editableEl.setPointerCapture(event.pointerId);
        }
        editState = {
          id,
          type,
          dir,
          scale,
          pointerId: event.pointerId,
          sourceEl: editableEl,
          startX: event.clientX,
          startY: event.clientY,
          rect: { ...rect }
        };
      }

      function updateDrag(event) {
        if (!editState) return;
        if (event.pointerId !== editState.pointerId) return;
        const dx = (event.clientX - editState.startX) / editState.scale;
        const dy = (event.clientY - editState.startY) / editState.scale;
        const next = { ...editState.rect };

        if (editState.type === 'move') {
          next.x = clamp(Math.round(next.x + dx), 0, DESIGN_WIDTH - next.w);
          next.y = clamp(Math.round(next.y + dy), 0, DESIGN_HEIGHT - next.h);
        } else {
          if (editState.dir.includes('e')) {
            next.w = clamp(Math.round(editState.rect.w + dx), MIN_SIZE, DESIGN_WIDTH - next.x);
          }
          if (editState.dir.includes('s')) {
            next.h = clamp(Math.round(editState.rect.h + dy), MIN_SIZE, DESIGN_HEIGHT - next.y);
          }
          if (editState.dir.includes('w')) {
            const maxX = editState.rect.x + editState.rect.w - MIN_SIZE;
            next.x = clamp(Math.round(editState.rect.x + dx), 0, maxX);
            next.w = clamp(Math.round(editState.rect.w - (next.x - editState.rect.x)), MIN_SIZE, DESIGN_WIDTH - next.x);
          }
          if (editState.dir.includes('n')) {
            const maxY = editState.rect.y + editState.rect.h - MIN_SIZE;
            next.y = clamp(Math.round(editState.rect.y + dy), 0, maxY);
            next.h = clamp(Math.round(editState.rect.h - (next.y - editState.rect.y)), MIN_SIZE, DESIGN_HEIGHT - next.y);
          }
        }

        layout[editState.id] = next;
        renderLayout();
      }

      function endEdit(event) {
        if (!editState) return;
        if (event && event.pointerId !== editState.pointerId) return;
        if (editState.sourceEl?.hasPointerCapture?.(editState.pointerId)) {
          editState.sourceEl.releasePointerCapture(editState.pointerId);
        }
        editState = null;
        saveLayout();
      }

      function setDebug(enabled) {
        document.body.classList.toggle('debug', enabled);
        debugButton.setAttribute('aria-pressed', String(enabled));
        debugButton.textContent = enabled ? 'Debug On' : 'Debug';
      }

      function applyPowerState({ animate = false, animateOff = false } = {}) {
        if (monitorShadowEl) {
          monitorShadowEl.classList.remove('is-powering-on', 'is-powered-on', 'is-powering-off');
          if (isPoweredOn) {
            monitorShadowEl.classList.add(animate ? 'is-powering-on' : 'is-powered-on');
          } else if (animateOff) {
            monitorShadowEl.classList.add('is-powering-off');
          }
        }
        greenscreenTextEl?.classList.toggle('is-powered-on', isPoweredOn);
        powerButtonEl?.classList.toggle('is-powered-on', isPoweredOn);
      }

      Object.entries(layout).forEach(([id, config]) => makeEditable(id, config));
      primeBackNavigationToDen();
      monitorShadowEl = overlayLayer.querySelector('[data-id="monitor-shadow"]');
      powerButtonEl = overlayLayer.querySelector('[data-id="power-button"]');
      greenscreenTextEl = document.createElement('div');
      greenscreenTextEl.className = 'greenscreen-text';
      COMMODORE_BOOT_TEXT.forEach((line) => {
        const lineEl = document.createElement('span');
        lineEl.textContent = line;
        greenscreenTextEl.appendChild(lineEl);
      });
      overlayLayer.appendChild(greenscreenTextEl);
      renderLayout();
      applyPowerState();
      monitorShadowEl?.addEventListener('animationend', (event) => {
        if (event.animationName === 'commodore-monitor-power-off') {
          monitorShadowEl.classList.remove('is-powering-off');
          isPoweringOff = false;
          return;
        }
        if (event.animationName !== 'commodore-monitor-power-on' && event.animationName !== 'commodore-monitor-fade') return;
        if (!isPoweredOn) return;
        monitorShadowEl.classList.remove('is-powering-on');
        monitorShadowEl.classList.add('is-powered-on');
      });

      overlayLayer.addEventListener('pointerdown', (event) => {
        if (!document.body.classList.contains('debug')) return;
        if (event.button !== 0) return;
        const handle = event.target.closest('.resize-handle');
        if (handle) {
          startEdit(event, 'resize', handle.dataset.dir, handle.closest('.editable'));
          return;
        }
        const editable = event.target.closest('.editable');
        if (editable) {
          startEdit(event, 'move', null, editable);
        }
      });
      window.addEventListener('pointermove', updateDrag);
      window.addEventListener('pointerup', endEdit);
      window.addEventListener('pointercancel', endEdit);
      window.addEventListener('popstate', (event) => {
        if (!shouldRouteBackToDen) return;
        const state = event.state;
        if (!state || typeof state !== 'object') return;
        if (state[COMMODORE_HISTORY_SOURCE_KEY] !== COMMODORE_NAV_SOURCE_DEN) return;
        if (state[COMMODORE_HISTORY_DEN_BACK_GUARD_KEY]) return;
        shouldRouteBackToDen = false;
        window.location.replace(DEN_URL);
      });
      overlayLayer.addEventListener('click', (event) => {
        if (document.body.classList.contains('debug')) return;
        const hotspot = event.target.closest('.hotspot');
        if (!hotspot) return;
        if (hotspot.dataset.id === 'return-key') {
          event.preventDefault();
          navigateToChapel();
          return;
        }
        if (hotspot.dataset.id === 'power-button') {
          event.preventDefault();
          if (isPoweredOn) {
            void powerOffAndReturnToChapel();
            return;
          }
          togglePowerState();
        }
      });
      debugButton.addEventListener('click', () => setDebug(!document.body.classList.contains('debug')));
      saveButton.addEventListener('click', () => saveLayout(true));
    })();
  </script>
</body>
</html>
