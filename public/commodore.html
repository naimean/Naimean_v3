<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commodore 64</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100svh;
      display: grid;
      place-items: center;
      background: #000;
      padding: 12px;
    }

    img {
      display: block;
      width: min(100%, 1200px);
      height: auto;
      max-height: calc(100svh - 24px);
      object-fit: contain;
      border-radius: 8px;
    }

    @media (min-width: 900px) {
      body {
        padding: 24px;
      }

      img {
        max-height: calc(100svh - 48px);
      }
    }
  </style>
</head>
<body>
  <img src="assets/images/commodore64.v20260424.jpg" alt="Commodore 64" />
</body>
</html>
