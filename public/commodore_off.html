<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commodore 64 - Off</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100svh;
      display: grid;
      place-items: center;
      background: #000;
      padding: 12px;
    }
    #scene {
      position: relative;
      width: min(100%, 444px);
      max-height: calc(100svh - 24px);
    }
    #scene-image {
      display: block;
      width: 100%;
      height: auto;
      max-height: calc(100svh - 24px);
      border-radius: 8px;
      user-select: none;
      -webkit-user-drag: none;
    }
    #overlay-layer {
      position: absolute;
      inset: 0;
      border-radius: 8px;
    }
    .monitor-shadow,
    .power-button {
      position: absolute;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
    }
    .monitor-shadow {
      left: 32.883%;
      top: 21.185%;
      width: 33.784%;
      height: 12.567%;
      background: #000;
      box-shadow: inset 0 0 24px rgba(0, 0, 0, 0.9);
      border-radius: 16px;
      opacity: 1;
      transition: opacity 320ms ease, box-shadow 320ms ease;
    }
    .monitor-shadow.is-powering-on {
      opacity: 0;
      box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.22);
    }
    .power-button {
      left: 84.685%;
      top: 84.74%;
      width: 7.658%;
      height: 4.309%;
      border-radius: 999px;
      border: 1px solid rgba(110, 78, 43, 0.55);
      background: linear-gradient(180deg, rgba(126, 96, 63, 0.96) 0%, rgba(77, 51, 28, 0.96) 100%);
      box-shadow: inset 0 1px 0 rgba(255, 233, 192, 0.34), inset 0 -2px 3px rgba(0, 0, 0, 0.42), 0 1px 3px rgba(0, 0, 0, 0.3);
    }
    .power-button::before {
      content: '';
      position: absolute;
      inset: 18%;
      border-radius: inherit;
      background: radial-gradient(circle at 35% 30%, rgba(255, 208, 152, 0.95) 0%, rgba(255, 147, 36, 0.88) 45%, rgba(224, 92, 16, 0.9) 100%);
      box-shadow: 0 0 5px rgba(255, 150, 37, 0.62), 0 0 10px rgba(255, 119, 0, 0.48);
      animation: power-pulse-off 1.6s ease-in-out infinite;
    }
    .power-button.is-powering-on::before {
      background: radial-gradient(circle at 35% 30%, rgba(190, 255, 190, 0.96) 0%, rgba(87, 255, 123, 0.9) 45%, rgba(28, 214, 70, 0.95) 100%);
      box-shadow: 0 0 6px rgba(95, 255, 132, 0.7), 0 0 12px rgba(28, 214, 70, 0.5);
      animation: power-pulse-on 1.2s ease-in-out infinite;
    }
    @keyframes power-pulse-off {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.18); }
    }
    @keyframes power-pulse-on {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.22); }
    }
  </style>
</head>
<body>
  <main id="scene">
    <img id="scene-image" src="assets/images/commodore.png" alt="Commodore 64" />
    <div id="overlay-layer" aria-label="Commodore state overlays">
      <button id="monitor-shadow" class="monitor-shadow" type="button" aria-label="Commodore monitor shadow"></button>
      <button id="power-button" class="power-button" type="button" aria-label="Commodore power button"></button>
    </div>
  </main>
  <script>
    (() => {
      const NAV_DELAY_MS = 320;
      const ON_URL = '/commodore_on.html';
      const powerButton = document.getElementById('power-button');
      const monitorShadow = document.getElementById('monitor-shadow');
      let isNavigating = false;

      function navigateToOnState() {
        if (isNavigating) return;
        isNavigating = true;
        powerButton.classList.add('is-powering-on');
        monitorShadow.classList.add('is-powering-on');
        window.setTimeout(() => {
          window.location.assign(ON_URL);
        }, NAV_DELAY_MS);
      }

      powerButton.addEventListener('click', navigateToOnState);
      monitorShadow.addEventListener('click', navigateToOnState);
    })();
  </script>
</body>
</html>
