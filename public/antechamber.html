      body {
        margin: 0;
        width: 100%;

      body {

      img {
        display: block;
        max-width: 100vw;
        max-height: 100vh;

        width: 11.34%;

      .chapel-hotspot:focus-visible {

        outline-offset: 1px;
      }

  <body>
    <div class="scene">
