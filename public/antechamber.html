<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Antechamber | Naimean</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      body {
        display: grid;
        place-items: center;
        background: #000;
        overflow: hidden;
      }

      .antechamber-hero {
        --cursor-x: 67.2%;
        --cursor-y: 65.8%;
        --cursor-offset-x: -20px;
        --cursor-offset-y: -190px;
        position: relative;
        display: inline-block;
      }

      .antechamber-image {
        display: block;
        max-width: 100vw;
        max-height: 100vh;
        width: auto;
        height: auto;
      }

      .scan-shadow {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(
          circle at var(--cursor-x) var(--cursor-y),
          rgba(0, 0, 0, 0.2) 0%,
          rgba(0, 0, 0, 0.45) 22%,
          rgba(0, 0, 0, 0.68) 70%,
          rgba(0, 0, 0, 0.84) 100%
        );
      }

      .cursor-light {
        position: absolute;
        left: var(--cursor-x);
        top: var(--cursor-y);
        width: clamp(34px, 4vw, 72px);
        aspect-ratio: 1;
        pointer-events: none;
        background: radial-gradient(
          circle at center,
          rgba(255, 126, 126, 0.58) 0%,
          rgba(255, 102, 102, 0.24) 35%,
          rgba(255, 90, 90, 0) 72%
        );
        transform: translate(
          calc(-50% + var(--cursor-offset-x)),
          calc(-50% + var(--cursor-offset-y))
        );
        opacity: 0.2;
        animation: cursor-light-flicker 1.6s steps(1, end) infinite;
        mix-blend-mode: screen;
        filter: blur(10px);
      }

      .colicofusion-cursor {
        position: absolute;
        left: var(--cursor-x);
        top: var(--cursor-y);
        transform: translate(
          calc(-50% + var(--cursor-offset-x)),
          calc(-50% + var(--cursor-offset-y))
        );
        font-family: "Courier New", monospace;
        font-size: clamp(14.4px, 1.8vw, 33.6px);
        line-height: 1;
        color: rgba(255, 184, 184, 0.98);
        text-shadow: 0 0 6px rgba(255, 120, 120, 0.55);
        animation: cursor-blink 1.6s steps(1, end) infinite;
        pointer-events: none;
      }

      .chapel-hotspot {
        position: absolute;
        left: 14.66%;
        top: 2.93%;
        width: 11.34%;
        height: 12.04%;
        border-radius: 999px;
        cursor: pointer;
        z-index: 1;
      }

      .chapel-hotspot:focus-visible {
        outline: 2px solid #4ea9ff;
        outline-offset: 1px;
      }

      #back-to-den-btn {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 100;
        padding: 0 12px;
        min-width: 44px;
        min-height: 44px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.35);
        background: rgba(0, 0, 0, 0.55);
        color: rgba(255, 255, 255, 0.9);
        font-size: 11px;
        letter-spacing: 0.05em;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
      }

      #back-to-den-btn:hover,
      #back-to-den-btn:focus-visible {
        background: rgba(0, 0, 0, 0.75);
        outline: 2px solid rgba(65, 229, 255, 0.95);
        outline-offset: 2px;
      }

      @keyframes cursor-blink {
        0%,
        44%,
        100% {
          opacity: 1;
          text-shadow:
            0 0 6px rgba(255, 120, 120, 0.55),
            0 0 18px rgba(255, 86, 86, 0.45);
        }
        45%,
        80% {
          opacity: 0;
          text-shadow: none;
        }
      }

      @keyframes cursor-light-flicker {
        0%,
        44%,
        100% {
          opacity: 0.42;
        }
        45%,
        80% {
          opacity: 0.08;
        }
      }
    </style>
  </head>
  <body>
    <div class="antechamber-hero">
      <img
        class="antechamber-image"
        src="/assets/images/antechamber.v20260424.png"
        alt="Antechamber"
      />
      <div class="scan-shadow" aria-hidden="true"></div>
      <div class="cursor-light" aria-hidden="true"></div>
      <span class="colicofusion-cursor" aria-hidden="true">_</span>
      <a class="chapel-hotspot" href="/chapel.html" aria-label="Go to chapel"></a>
    </div>
    <a id="back-to-den-btn" href="/" aria-label="Back to den">&#8592; DEN</a>
  </body>
</html>
