<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapel</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100svh;
      background: #000;
      color: #fff;
      font-family: system-ui, sans-serif;
    }

    main {
      height: 100svh;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      scrollbar-gutter: stable both-edges;
      background: #000;
    }

    img {
      display: block;
      width: min(100%, 960px);
      height: auto;
      margin: 0 auto;
      user-select: none;
      -webkit-user-drag: none;
    }
  </style>
</head>
<body>
  <main aria-label="Chapel stacked image scroller">
    <picture>
      <source srcset="assets/images/chapel_stacked.v20260424.webp" type="image/webp" />
      <img src="assets/images/chapel_stacked.v20260424.png" alt="Chapel stacked web image" />
    </picture>
  </main>
</body>
</html>
