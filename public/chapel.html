<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapel</title>
  <style>
    :root {
      color-scheme: dark;
      --chapel-monitor-turn-off-duration: 0.45s;
      --sauce-drip-impact-offset-fallback: 0%;
      --sauce-drip-end-offset-fallback: 0%;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100svh;
      background: #000;
      color: #fff;
      font-family: system-ui, sans-serif;
    }

    main {
      height: 100svh;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      scrollbar-gutter: stable both-edges;
      background: #000;
    }

    #scene {
      position: relative;
      width: min(100%, 960px);
      margin: 0 auto;
    }

    #scene picture {
      display: block;
      line-height: 0;
    }

    #scene-image {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    #overlay-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .chapel-monitor-shadow-layer {
      position: absolute;
      background: rgba(0, 0, 0, 0.92);
      box-shadow:
        inset 0 0 22px rgba(0, 0, 0, 0.95),
        0 0 8px rgba(0, 0, 0, 0.55);
      border-radius: 4px;
      pointer-events: auto;
      z-index: 0;
      clip-path: inset(0%);
      cursor: pointer;
    }

    .chapel-monitor-shadow-layer.is-powered-on {
      opacity: 0;
      clip-path: inset(50%);
    }

    @keyframes commodore-tv-turn-on {
      0% {
        clip-path: inset(0%);
        filter: brightness(1);
        background: #000;
        opacity: 1;
      }

      40% {
        clip-path: inset(47% 0);
        filter: brightness(1.2);
        background: #000;
        opacity: 1;
      }

      65% {
        clip-path: inset(49.2% 0);
        filter: brightness(4);
        background: #fff;
        opacity: 1;
      }

      80% {
        clip-path: inset(49.7% 0);
        filter: brightness(8);
        background: #fff;
        opacity: 1;
      }

      92% {
        clip-path: inset(49.9% 0);
        filter: brightness(12);
        background: #fff;
        opacity: 0.85;
      }

      100% {
        clip-path: inset(50%);
        filter: brightness(1);
        background: #fff;
        opacity: 0;
      }
    }

    @keyframes sauce-drip-splatter-droplet {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.62);
      }
      18% {
        opacity: var(--sauce-splatter-droplet-alpha, 0.82);
      }
      55% {
        opacity: calc(var(--sauce-splatter-droplet-alpha, 0.82) * 0.78);
        transform: translate(
          calc(-50% + (var(--sauce-splatter-droplet-x, 0px) * 0.55)),
          calc(-50% + (var(--sauce-splatter-droplet-y, 0px) * 0.55) - (var(--sauce-splatter-droplet-arc, 12px) * 1.3))
        ) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(
          calc(-50% + var(--sauce-splatter-droplet-x, 0px)),
          calc(-50% + var(--sauce-splatter-droplet-y, 0px))
        ) scale(0.78);
      }
    }

    @keyframes commodore-tv-shadow-takeover {
      0% {
        opacity: 0;
        filter: brightness(1.35);
      }

      35% {
        opacity: 0.35;
        filter: brightness(1.2);
      }

      100% {
        opacity: 1;
        filter: brightness(1);
      }
    }

    @keyframes commodore-tv-turn-off-line {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scaleX(0.08);
      }

      20% {
        opacity: 1;
        transform: translate(-50%, -50%) scaleX(1);
      }

      72% {
        opacity: 1;
        transform: translate(-50%, -50%) scaleX(0.1);
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scaleX(0.02);
      }
    }

    @keyframes commodore-tv-turn-off-dot {
      0%,
      68% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0);
      }

      82% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.1);
      }
    }

    .chapel-monitor-shadow-layer.tv-turning-on {
      animation: commodore-tv-turn-on 1s ease-in forwards;
      pointer-events: none;
    }

    .chapel-monitor-shadow-layer.tv-turning-off {
      animation: commodore-tv-shadow-takeover var(--chapel-monitor-turn-off-duration) ease-out forwards;
      pointer-events: none;
    }

    .chapel-monitor-shadow-layer.tv-turning-off::before,
    .chapel-monitor-shadow-layer.tv-turning-off::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      pointer-events: none;
    }

    .chapel-monitor-shadow-layer.tv-turning-off::before {
      width: 92%;
      height: 2px;
      border-radius: 999px;
      background: #fff;
      box-shadow: 0 0 24px rgba(255, 255, 255, 0.95);
      transform-origin: center;
      animation: commodore-tv-turn-off-line var(--chapel-monitor-turn-off-duration) ease-out forwards;
    }

    .chapel-monitor-shadow-layer.tv-turning-off::after {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 28px rgba(255, 255, 255, 1);
      animation: commodore-tv-turn-off-dot var(--chapel-monitor-turn-off-duration) ease-out forwards;
    }

    .hotspot {
      position: absolute;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
      pointer-events: auto;
    }

    .power-button-visual {
      border: 2px solid #555;
      border-radius: 50%;
      background: #222;
      box-shadow: 0 0 8px rgb(0 0 0 / 66%);
      overflow: visible;
      outline: none;
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    .power-button-visual::before {
      content: '';
      position: absolute;
      inset: 25%;
      border-radius: 50%;
      background: radial-gradient(circle, #ffb347 60%, #ff6600 100%);
      box-shadow: 0 0 18px 8px #ff6600, 0 0 2px 1px #fff;
      transition: background 0.3s ease, box-shadow 0.3s ease;
      animation: commodore-power-pulse 1.6s infinite ease-in-out;
      pointer-events: none;
    }

    .power-button-visual.is-powered-on {
      background: #16bf39;
      border-color: #16bf39;
    }

    .power-button-visual.is-powered-on::before {
      background: radial-gradient(circle, #8cff91 60%, #1cd646 100%);
      box-shadow: 0 0 18px 8px #1cd646, 0 0 2px 1px #d4ffd7;
      animation: commodore-power-pulse-on 1.6s infinite ease-in-out;
    }

    .power-button-visual:active {
      transform: translateY(1px);
      filter: brightness(1.08);
      box-shadow:
        inset 0 2px 3px rgba(0, 0, 0, 0.36),
        inset 0 -1px 1px rgba(255, 233, 192, 0.2),
        0 0 2px rgba(255, 161, 70, 0.42);
    }

    @keyframes commodore-power-pulse {
      0% {
        box-shadow: 0 0 18px 8px #ff6600, 0 0 2px 1px #fff;
        filter: brightness(1);
      }

      50% {
        box-shadow: 0 0 24px 12px #ff6600, 0 0 2px 1px #fff;
        filter: brightness(1.12);
      }

      100% {
        box-shadow: 0 0 18px 8px #ff6600, 0 0 2px 1px #fff;
        filter: brightness(1);
      }
    }

    @keyframes commodore-power-pulse-on {
      0% {
        box-shadow: 0 0 18px 8px #1cd646, 0 0 2px 1px #d4ffd7;
        filter: brightness(1);
      }

      50% {
        box-shadow: 0 0 24px 12px #1cd646, 0 0 2px 1px #d4ffd7;
        filter: brightness(1.12);
      }

      100% {
        box-shadow: 0 0 18px 8px #1cd646, 0 0 2px 1px #d4ffd7;
        filter: brightness(1);
      }
    }

    body.debug .hotspot,
    body.debug .chapel-monitor-shadow-layer,
    body.debug .sauce-drop-track {
      cursor: move;
      outline: 1px dashed rgba(65, 229, 255, 0.95);
      outline-offset: 0;
      touch-action: none;
    }

    body.debug .chapel-monitor-shadow-layer,
    body.debug .sauce-drop-track {
      pointer-events: auto;
    }

    body.debug .power-button-visual {
      overflow: visible;
    }

    .sauce-drop-track {
      position: absolute;
      pointer-events: none;
      overflow: visible;
      z-index: 6;
    }

    .sauce-drop-droplet {
      position: absolute;
      top: 0;
      left: 50%;
      width: 10px;
      height: 18px;
      border-radius: 50% 50% 65% 65%;
      background: radial-gradient(circle at 35% 26%, rgba(255, 196, 150, 0.78) 0%, rgba(167, 24, 15, 0.94) 65%, rgba(105, 10, 7, 0.98) 100%);
      opacity: 0;
      transform: translate(-50%, 0) scale(0.6);
    }

    .sauce-drop-splatter {
      position: absolute;
      left: 50%;
      top: calc(100% - var(--sauce-drip-end-offset, var(--sauce-drip-end-offset-fallback)));
      width: 100%;
      height: clamp(24px, 3.8vw, 44px);
      transform: translate(-50%, -40%) rotate(var(--sauce-splatter-rotation, 0deg)) skewX(var(--sauce-splatter-skew, 0deg)) scale(var(--sauce-splatter-width-scale, 1), var(--sauce-splatter-height-scale, 1));
      transform-origin: 50% 56%;
      opacity: 0;
      pointer-events: none;
      z-index: 1;
      filter: saturate(1.12);
    }

    .sauce-drop-splatter::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 56%;
      width: 36%;
      height: 62%;
      transform: translate(-50%, -50%);
    }

    .sauce-drop-splatter-droplet {
      position: absolute;
      left: 50%;
      top: 56%;
      width: var(--sauce-splatter-droplet-size, 4px);
      height: var(--sauce-splatter-droplet-size, 4px);
      opacity: 0;
      transform: translate(-50%, -50%);
      pointer-events: none;
      border-radius: 52% 48% 56% 44% / 50% 56% 44% 50%;
      background: radial-gradient(circle at 35% 26%, rgba(255, 192, 150, 0.66) 0%, rgba(157, 19, 13, 0.94) 62%, rgba(92, 7, 6, 0.98) 100%);
      box-shadow: 0 0 1px rgba(255, 174, 136, 0.42);
    }

    .sauce-drop-splatter-dot {
      position: absolute;
      left: var(--dot-x, 50%);
      top: var(--dot-y, 56%);
      width: var(--dot-size, 10px);
      height: var(--dot-size, 10px);
      transform: translate(-50%, -50%) scale(var(--dot-scale-x, 1.2), var(--dot-scale-y, 0.85)) rotate(var(--dot-rotate, 0deg));
      transform-origin: center;
      border-radius: 50%;
      opacity: var(--dot-alpha, 0.95);
      background: radial-gradient(circle at 34% 24%, rgba(255, 178, 133, 0.58) 0%, rgba(151, 16, 11, 0.95) 64%, rgba(84, 6, 6, 0.99) 100%);
      filter: blur(0.15px);
    }

    @keyframes sauce-drip-fall {
      0% {
        opacity: 0;
        top: 0;
        transform: translate(-50%, 0) scale(0.5);
      }
      10% {
        opacity: 0.95;
        top: 2%;
        transform: translate(-50%, 0) scale(0.82, 1.2);
      }
      80% {
        opacity: 0.98;
        top: calc(100% - var(--sauce-drip-impact-offset, var(--sauce-drip-impact-offset-fallback)));
        transform: translate(-50%, 0) scale(0.9, 1.26);
      }
      100% {
        opacity: 0;
        top: calc(100% - var(--sauce-drip-end-offset, var(--sauce-drip-end-offset-fallback)));
        transform: translate(-50%, 0) scale(1.02, 0.82);
      }
    }

    @keyframes sauce-drip-splatter {
      0% {
        opacity: 0;
      }
      18% {
        opacity: var(--sauce-splatter-alpha, 0.98);
      }
      72% {
        opacity: calc(var(--sauce-splatter-alpha, 0.98) * 0.68);
      }
      100% {
        opacity: 0;
      }
    }

    @media (max-width: 899px) {
      .sauce-drop-droplet {
        width: 5px;
        height: 9px;
      }
    }

    .hotspot-label {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 8px);
      transform: translateX(-50%);
      min-width: max-content;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(2, 9, 17, 0.88);
      border: 1px solid rgba(65, 229, 255, 0.7);
      color: rgba(232, 251, 255, 0.98);
      font-size: 11px;
      line-height: 1.2;
      pointer-events: none;
      opacity: 0;
      z-index: 3;
      white-space: nowrap;
    }

    body.debug .hotspot-label {
      opacity: 1;
    }

    .resize-handle {
      position: absolute;
      background: rgba(65, 229, 255, 0.18);
      border: 1px solid rgba(65, 229, 255, 0.65);
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      touch-action: none;
      z-index: 2;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.45);
    }

    body.debug .resize-handle {
      opacity: 1;
      pointer-events: auto;
    }

    .resize-n,
    .resize-s {
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 20px;
    }

    .resize-e,
    .resize-w {
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 40px;
    }

    .resize-ne,
    .resize-nw,
    .resize-se,
    .resize-sw {
      width: 24px;
      height: 24px;
    }

    .resize-n { top: -10px; cursor: n-resize; }
    .resize-s { bottom: -10px; cursor: s-resize; }
    .resize-e { right: -10px; cursor: e-resize; }
    .resize-w { left: -10px; cursor: w-resize; }
    .resize-ne { top: -12px; right: -12px; cursor: ne-resize; }
    .resize-nw { top: -12px; left: -12px; cursor: nw-resize; }
    .resize-se { right: -12px; bottom: -12px; cursor: se-resize; }
    .resize-sw { left: -12px; bottom: -12px; cursor: sw-resize; }

    #debug-toggle-btn,
    #save-hotspots-btn {
      position: fixed;
      bottom: 12px;
      z-index: 1000;
      min-width: 44px;
      min-height: 44px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(0, 0, 0, 0.55);
      color: rgba(255, 255, 255, 0.9);
      font-size: 11px;
      letter-spacing: 0.05em;
      cursor: pointer;
    }

    #debug-toggle-btn {
      right: 12px;
    }

    #save-hotspots-btn {
      right: 68px;
    }

    #debug-toggle-btn:focus-visible,
    #save-hotspots-btn:focus-visible,
    .save-modal-btn:focus-visible {
      outline: 2px solid rgba(65, 229, 255, 0.95);
      outline-offset: 2px;
    }

    #save-modal {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.75);
    }

    #save-modal.hidden {
      display: none;
    }

    #save-modal-inner {
      background: #0e1520;
      border: 1px solid rgba(65, 229, 255, 0.5);
      border-radius: 10px;
      padding: 20px;
      max-width: 90vw;
      width: 640px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #save-modal-title {
      font-size: 14px;
      font-weight: 600;
      color: rgba(65, 229, 255, 0.95);
      margin: 0;
    }

    #save-modal-textarea {
      flex: 1;
      min-height: 260px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      color: #cce8ff;
      font-family: "Courier New", monospace;
      font-size: 12px;
      line-height: 1.4;
      padding: 10px;
      resize: vertical;
    }

    #save-modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .save-modal-btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 12px;
      cursor: pointer;
    }

    .save-modal-btn.primary {
      background: rgba(65, 229, 255, 0.2);
      border-color: rgba(65, 229, 255, 0.6);
      color: rgba(65, 229, 255, 1);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <main aria-label="Chapel stacked image scroller">
    <div id="scene">
      <picture>
        <source srcset="assets/images/chapel_stacked.v20260424.webp" type="image/webp" />
        <!-- Keep width/height aligned with DESIGN_IMAGE_WIDTH/HEIGHT in the script. -->
        <img
          id="scene-image"
          src="assets/images/chapel_stacked.v20260424.png"
          alt="Chapel stacked web image"
          width="993"
          height="3709"
        />
      </picture>
      <div id="overlay-layer" aria-label="Chapel hotspots"></div>
    </div>
  </main>
  <button id="debug-toggle-btn" type="button" aria-label="Toggle debug mode">Debug</button>
  <button id="save-hotspots-btn" type="button" aria-label="Save chapel hotspot positions">Save</button>
  <div id="save-modal" class="hidden" role="dialog" aria-modal="true" aria-labelledby="save-modal-title">
    <div id="save-modal-inner">
      <h2 id="save-modal-title">Copy the updated Chapel hotspot config below</h2>
      <textarea id="save-modal-textarea" aria-label="Chapel hotspot config" readonly spellcheck="false"></textarea>
      <div id="save-modal-actions">
        <button type="button" class="save-modal-btn primary" id="save-modal-copy-btn">Copy to clipboard</button>
        <button type="button" class="save-modal-btn" id="save-modal-close-btn">Close</button>
      </div>
    </div>
  </div>
  <div id="debug-status" class="sr-only" role="status" aria-live="polite"></div>
  <script>
    (() => {
      const HOTSPOT_API_PATH = '/api/chapel-hotspots';
      const API_TIMEOUT_MS = 5000;
      const SAVE_RETRY_ATTEMPTS = 3;
      const SAVE_RETRY_DELAY_MS = 350;
      const SAVE_RETRY_BACKOFF_FACTOR = 2;

      const INITIAL_SCROLL_POSITION_RATIO = 0.5; // Start halfway through scrollable scene height.
      const SAUCE_DRIP_MIN_INTERVAL_MS = 10_000;

      const SAUCE_DRIP_ANIMATION_MS = 1_600;
      const SAUCE_DRIP_RESET_BUFFER_MS = 200;
      const SAUCE_DRIP_IMPACT_OFFSET_DESIGN_PX = 124;
      const SAUCE_DRIP_END_OFFSET_DESIGN_PX = 140;
      const SAUCE_SPLATTER_DOT_COUNT = 8;
      const SAUCE_SPLATTER_DROPLET_MIN_COUNT = 2;
      const SAUCE_SPLATTER_DROPLET_MAX_COUNT = 5;
      const SAUCE_SPLATTER_DROPLET_MIN_DISTANCE_PX = 15;
      const SAUCE_SPLATTER_DROPLET_MAX_DISTANCE_PX = 150;
      const SAUCE_SPLATTER_ANIMATION_MS = 620;
      const SAUCE_SPLATTER_START_RATIO = 0.72;
      const COMMODORE_NAV_SOURCE_STORAGE_KEY = 'commodore.navigation.source.v1';

      const COMMODORE_NAV_SOURCE_CHAPEL = 'chapel';
      const COMMODORE_OFF_URL = '/commodore_off.html';

      const COMMODORE_POWER_TRANSITION_MS = 320;
      const ANCHOR_POINTS = {

        chapelMonitorShadowTopLeft: { x: 456, y: 2091 },
        chapelMonitorShadowBottomRight: { x: 530, y: 2145 },
        commodoreButtonsTopLeft: { x: 531, y: 2171 },
        commodoreButtonsBottomRight: { x: 543, y: 2183 },
        antechamberTopLeft: { x: 305, y: 2928 },
        antechamberBottomRight: { x: 775, y: 3400 },
        sauceDropTopLeft: { x: 536, y: 370 },
        sauceDropBottomRight: { x: 604, y: 2990 }
      };
      const CHAPEL_MONITOR_SHADOW = {
        id: 'chapel-commodore-monitor-shadow',
        label: 'Commodore monitor shadow',
        anchors: ['chapelMonitorShadowTopLeft', 'chapelMonitorShadowBottomRight'],
        padding: 0
      };
      const HOTSPOTS = [
        {
          id: 'chapel-ace-ventura',
          label: 'Ace Ventura',
          audioFolder: 'ace_ventura',
          anchors: ['aceVenturaTopLeft', 'aceVenturaBottomRight']
        },
        {
          id: 'chapel-silly-goose',
          label: 'Silly Goose',
          audioFolder: 'silly_goose',
          anchors: ['sillyGooseTopLeft', 'sillyGooseBottomRight']
        },
        {
          id: 'chapel-crusty-the-clown',

      function wait(ms) {
        return new Promise((resolve) => {
          window.setTimeout(resolve, ms);
        });

      function encodeDebugSavePassword(value) {
        const source = String(value ?? '');
        return Array.from(source, (char, index) => (
          char.charCodeAt(0) ^ DEBUG_SAVE_PASSWORD_KEY.charCodeAt(index % DEBUG_SAVE_PASSWORD_KEY.length)
        ));
      }

      function hasMatchingDebugSaveCipher(encodedValue) {
        if (encodedValue.length !== DEBUG_SAVE_PASSWORD_CIPHER.length) {
          return false;
        }
        return encodedValue.every((byte, index) => byte === DEBUG_SAVE_PASSWORD_CIPHER[index]);
      }

      function ensureDebugSaveAccess() {
        if (!document.body.classList.contains('debug')) {
          return true;
        }
        if (hasDebugSaveAccess) {
          return true;
        }
        const attempt = window.prompt('Debug save password required.');
        if (attempt === null) {
          if (debugStatus) debugStatus.textContent = 'Debug save cancelled.';
          return false;
        }
        const isValid = hasMatchingDebugSaveCipher(encodeDebugSavePassword(attempt.trim()));
        if (!isValid) {
          if (debugStatus) debugStatus.textContent = 'Debug save password incorrect.';
          return false;
        }
        hasDebugSaveAccess = true;
        if (debugStatus) debugStatus.textContent = 'Debug save unlocked.';
        return true;
      }

      function syncImageDimensions() {
        imageDimensions.width = DESIGN_IMAGE_WIDTH;
        imageDimensions.height = DESIGN_IMAGE_HEIGHT;
      }

      function rectFromAnchors(anchorStart, anchorEnd, padding = 0) {
        const start = ANCHOR_POINTS[anchorStart];
        const end = ANCHOR_POINTS[anchorEnd];
        if (!start || !end) {
          console.warn(`Missing hotspot anchor(s): ${anchorStart}, ${anchorEnd}`);
          return null;
        }
        const left = Math.max(0, Math.min(start.x, end.x) - padding);
        const top = Math.max(0, Math.min(start.y, end.y) - padding);
        const width = Math.abs(end.x - start.x) + (padding * 2);
        const height = Math.abs(end.y - start.y) + (padding * 2);
        return { left, top, width, height };
      }

      function toPercentX(value) {
        return (value / imageDimensions.width) * 100;
      }

      function toPercentY(value) {
        return (value / imageDimensions.height) * 100;
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(value, max));
      }

      function calculateSauceDripOffsetPercent(designOffsetPx, trackHeightPx) {
        if (!Number.isFinite(designOffsetPx) || !Number.isFinite(trackHeightPx) || trackHeightPx <= 0) {
          return 0;
        }
        return clamp((designOffsetPx / trackHeightPx) * 100, 0, 100);
      }

        try {
          sessionStorage.setItem(COMMODORE_POWER_STATE_STORAGE_KEY, String(isPoweredOn));
        } catch (error) {

        }

      function navigateToCommodoreState(isPoweredOn) {
        if (isCommodoreNavigationPending) return;
        isCommodoreNavigationPending = true;
        if (commodoreNavigationTimerId) {

        const targetUrl = isPoweredOn ? COMMODORE_ON_URL : COMMODORE_OFF_URL;
        commodoreNavigationTimerId = window.setTimeout(() => {

        }, COMMODORE_POWER_TRANSITION_MS);
      }

      function navigateToCurrentCommodoreState() {
        if (isCommodoreNavigationPending) return;
        const nextPowerState = loadCommodorePowerState();
        saveCommodoreNavSource();
        syncChapelPowerButtonState();
        navigateToCommodoreState(nextPowerState);
      }

      function toggleCommodorePowerState() {
        if (isCommodoreNavigationPending) return;
        const nextPowerState = !loadCommodorePowerState();
        saveCommodorePowerState(nextPowerState);
        syncChapelPowerButtonState();
      }

      function getRandomAudioUrl(folder) {
        const audioUrls = AUDIO_FOLDERS[folder];
        if (!Array.isArray(audioUrls) || !audioUrls.length) {
          return null;
        }
        if (audioUrls.length === 1) {
          lastPlayedAudioByFolder.set(folder, audioUrls[0]);
          return audioUrls[0];
        }
        const lastPlayedUrl = lastPlayedAudioByFolder.get(folder);
        const candidates = audioUrls.filter((audioUrl) => audioUrl !== lastPlayedUrl);
        const nextPool = candidates.length ? candidates : audioUrls;
        const nextUrl = nextPool[Math.floor(Math.random() * nextPool.length)];
        lastPlayedAudioByFolder.set(folder, nextUrl);
        return nextUrl;
      }

      function getAudioElement(audioUrl) {
        let audioEl = audioElsByUrl.get(audioUrl);
        if (!audioEl) {
          audioEl = new Audio(audioUrl);
          audioEl.preload = 'auto';
          audioElsByUrl.set(audioUrl, audioEl);
        }
        return audioEl;
      }

      async function playRandomFolderAudio(folder) {
        const audioUrl = getRandomAudioUrl(folder);
        if (!audioUrl) {
          console.warn(`No audio assets configured for chapel hotspot folder: ${folder}`);
          return;
        }

        if (activeAudio && activeAudioUrl !== audioUrl) {
          activeAudio.pause();
          activeAudio.currentTime = 0;
        }

        const audioEl = getAudioElement(audioUrl);
        audioEl.currentTime = 0;
        activeAudio = audioEl;
        activeAudioUrl = audioUrl;

        try {
          await audioEl.play();
        } catch (error) {
          console.warn(`Unable to play chapel hotspot audio from ${audioUrl}.`, error);
        }
      }

      function centerInitialViewport() {
        if (!mainScroller || hasInitializedViewport) {
          return;
        }

        const viewportHeight = mainScroller.clientHeight;
        const sceneHeight = sceneImage?.clientHeight || imageDimensions.height || 0;
        if (viewportHeight <= 0 || sceneHeight <= 0) {
          return;
        }

        const maxScrollTop = Math.max(0, sceneHeight - viewportHeight);
        if (maxScrollTop > 0) {
          mainScroller.scrollTop = Math.round(maxScrollTop * INITIAL_SCROLL_POSITION_RATIO);
        }
        hasInitializedViewport = true;
      }

      function clearSauceDripTimers() {
        if (sauceDripTimerId) {
          window.clearTimeout(sauceDripTimerId);
          sauceDripTimerId = null;
        }
        if (sauceDripResetTimerId) {
          window.clearTimeout(sauceDripResetTimerId);
          sauceDripResetTimerId = null;
        }
      }

      function getNextSauceDripDelayMs() {
        const spread = SAUCE_DRIP_MAX_INTERVAL_MS - SAUCE_DRIP_MIN_INTERVAL_MS;
        return SAUCE_DRIP_MIN_INTERVAL_MS + Math.round(Math.random() * spread);
      }

      function randomBetween(min, max) {
        return min + Math.random() * (max - min);
      }

      function randomIntegerBetween(min, max) {
        return Math.floor(randomBetween(min, max + 1));
      }

      function configureSauceSplatter(splatter) {
        if (!splatter) {
          return;
        }
        splatter.style.setProperty('--sauce-splatter-width-scale', `${randomBetween(0.88, 1.04).toFixed(3)}`);
        splatter.style.setProperty('--sauce-splatter-height-scale', `${randomBetween(0.86, 1.08).toFixed(3)}`);
        splatter.style.setProperty('--sauce-splatter-rotation', `${randomBetween(-7, 7).toFixed(2)}deg`);
        splatter.style.setProperty('--sauce-splatter-skew', `${randomBetween(-4, 4).toFixed(2)}deg`);
        splatter.style.setProperty('--sauce-splatter-alpha', `${randomBetween(0.9, 1).toFixed(3)}`);
        const dots = splatter.querySelectorAll('.sauce-drop-splatter-dot');
        dots.forEach((dot) => {
          dot.style.setProperty('--dot-x', `${randomBetween(15, 85).toFixed(2)}%`);
          dot.style.setProperty('--dot-y', `${randomBetween(38, 74).toFixed(2)}%`);
          dot.style.setProperty('--dot-size', `${randomBetween(6.5, 12.5).toFixed(2)}px`);
          dot.style.setProperty('--dot-scale-x', `${randomBetween(0.95, 1.75).toFixed(3)}`);
          dot.style.setProperty('--dot-scale-y', `${randomBetween(0.5, 1.05).toFixed(3)}`);
          dot.style.setProperty('--dot-rotate', `${randomBetween(-40, 40).toFixed(2)}deg`);
          dot.style.setProperty('--dot-alpha', `${randomBetween(0.8, 1).toFixed(3)}`);
        });
        const droplets = splatter.querySelectorAll('.sauce-drop-splatter-droplet');
        const sprayCount = randomIntegerBetween(
          SAUCE_SPLATTER_DROPLET_MIN_COUNT,
          SAUCE_SPLATTER_DROPLET_MAX_COUNT
        );
        droplets.forEach((droplet, index) => {
          droplet.style.animation = 'none';
          if (index >= sprayCount) {
            droplet.style.opacity = '0';
            return;
          }
          droplet.style.opacity = '';
          const angle = randomBetween(0, 360) * (Math.PI / 180);
          const distance = randomBetween(SAUCE_SPLATTER_DROPLET_MIN_DISTANCE_PX, SAUCE_SPLATTER_DROPLET_MAX_DISTANCE_PX);
          const travelX = Math.cos(angle) * distance;
          const travelY = Math.sin(angle) * distance;
          droplet.style.setProperty('--sauce-splatter-droplet-x', `${travelX.toFixed(2)}px`);
          droplet.style.setProperty('--sauce-splatter-droplet-y', `${travelY.toFixed(2)}px`);
          droplet.style.setProperty('--sauce-splatter-droplet-arc', `${randomBetween(24, 60).toFixed(2)}px`);
          droplet.style.setProperty('--sauce-splatter-droplet-size', `${randomBetween(2.4, 5.4).toFixed(2)}px`);
          droplet.style.setProperty('--sauce-splatter-droplet-alpha', `${randomBetween(0.52, 0.9).toFixed(3)}`);
          const duration = Math.round(randomBetween(300, 540));
          const delay = Math.round(randomBetween(0, 60));
          droplet.getBoundingClientRect();
          droplet.style.animation = `sauce-drip-splatter-droplet ${duration}ms cubic-bezier(0.18, 0.6, 0.3, 1) ${delay}ms forwards`;
        });
      }

      function scheduleNextSauceDrip() {
        if (!overlayLayer) {
          return;
        }
        if (sauceDripTimerId) {
          window.clearTimeout(sauceDripTimerId);
        }
        sauceDripTimerId = window.setTimeout(() => {
          triggerSauceDrip();
        }, getNextSauceDripDelayMs());
      }

      function triggerSauceDrip() {
        const droplet = overlayLayer.querySelector('.sauce-drop-droplet');
        const splatter = overlayLayer.querySelector('.sauce-drop-splatter');
        if (!droplet || !splatter) {
          scheduleNextSauceDrip();
          return;
        }
        droplet.style.animation = 'none';
        splatter.style.animation = 'none';
        configureSauceSplatter(splatter);
        droplet.getBoundingClientRect();
        droplet.style.animation = `sauce-drip-fall ${SAUCE_DRIP_ANIMATION_MS}ms ease-in forwards`;
        splatter.style.animation = `sauce-drip-splatter ${SAUCE_SPLATTER_ANIMATION_MS}ms ease-out ${Math.round(SAUCE_DRIP_ANIMATION_MS * SAUCE_SPLATTER_START_RATIO)}ms forwards`;
        if (sauceDripResetTimerId) {
          window.clearTimeout(sauceDripResetTimerId);
        }
        let hasResetDrip = false;
        const resetSauceDrip = () => {
          if (hasResetDrip) {
            return;
          }
          hasResetDrip = true;
          if (sauceDripResetTimerId) {
            window.clearTimeout(sauceDripResetTimerId);
            sauceDripResetTimerId = null;
          }
          droplet.style.animation = 'none';
          splatter.style.animation = 'none';
          splatter.querySelectorAll('.sauce-drop-splatter-droplet').forEach((splatterDroplet) => {
            splatterDroplet.style.animation = 'none';
          });
          scheduleNextSauceDrip();
        };
        droplet.addEventListener('animationend', resetSauceDrip, { once: true });
        sauceDripResetTimerId = window.setTimeout(() => {
          droplet.removeEventListener('animationend', resetSauceDrip);
          resetSauceDrip();
        }, SAUCE_DRIP_ANIMATION_MS + SAUCE_DRIP_RESET_BUFFER_MS);
      }

      function getDefinitionRect(definition) {
        return rectFromAnchors(
          definition.anchors[0],
          definition.anchors[1],
          Number.isFinite(definition.padding) ? definition.padding : HOTSPOT_PADDING_DESIGN_PX
        );
      }

      function formatRectLabel(definition, rect) {
        return `${definition.label} (${Math.round(rect.left)}, ${Math.round(rect.top)}) ${Math.round(rect.width)}×${Math.round(rect.height)}`;
      }

      function applyRectToElement(element, definition, rect) {
        element.style.left = `${toPercentX(rect.left)}%`;
        element.style.top = `${toPercentY(rect.top)}%`;
        element.style.width = `${toPercentX(rect.width)}%`;
        element.style.height = `${toPercentY(rect.height)}%`;
        if (definition.id === SAUCE_DROP_TRACK.id) {
          const trackHeight = Number(rect.height);
          if (Number.isFinite(trackHeight) && trackHeight > 0) {
            const impactOffset = calculateSauceDripOffsetPercent(SAUCE_DRIP_IMPACT_OFFSET_DESIGN_PX, trackHeight);
            const endOffset = calculateSauceDripOffsetPercent(SAUCE_DRIP_END_OFFSET_DESIGN_PX, trackHeight);
            element.style.setProperty('--sauce-drip-impact-offset', `${impactOffset}%`);
            element.style.setProperty('--sauce-drip-end-offset', `${endOffset}%`);
          }
        }
        const label = element.querySelector('.hotspot-label');
        if (label) {
          label.textContent = formatRectLabel(definition, rect);
        }
      }

      function addResizeHandles(element) {
        RESIZE_HANDLE_DIRECTIONS.forEach((direction) => {
          const handle = document.createElement('span');
          handle.className = `resize-handle resize-${direction}`;
          handle.dataset.direction = direction;
          element.appendChild(handle);
        });
      }

      function renderHotspots() {
        overlayLayer.replaceChildren();
        const sauceDropRect = getDefinitionRect(SAUCE_DROP_TRACK);
        if (sauceDropRect) {
          const fallbackImpactOffset = calculateSauceDripOffsetPercent(SAUCE_DRIP_IMPACT_OFFSET_DESIGN_PX, sauceDropRect.height);
          const fallbackEndOffset = calculateSauceDripOffsetPercent(SAUCE_DRIP_END_OFFSET_DESIGN_PX, sauceDropRect.height);
          document.documentElement.style.setProperty('--sauce-drip-impact-offset-fallback', `${fallbackImpactOffset}%`);
          document.documentElement.style.setProperty('--sauce-drip-end-offset-fallback', `${fallbackEndOffset}%`);
        }
        const monitorShadowRect = getDefinitionRect(CHAPEL_MONITOR_SHADOW);
        if (monitorShadowRect) {
          const shadowLayer = document.createElement('div');
          shadowLayer.className = 'chapel-monitor-shadow-layer';
          shadowLayer.dataset.id = CHAPEL_MONITOR_SHADOW.id;
          shadowLayer.setAttribute('role', 'button');
          shadowLayer.setAttribute('tabindex', '0');
          shadowLayer.setAttribute('aria-label', 'Commodore monitor shadow');
          shadowLayer.title = 'Commodore monitor shadow';
          shadowLayer.addEventListener('click', () => {
            if (document.body.classList.contains('debug')) return;
            navigateToCurrentCommodoreState();
          });
          shadowLayer.addEventListener('keydown', (event) => {
            if (document.body.classList.contains('debug')) return;
            if (event.key !== 'Enter' && event.key !== ' ') return;
            event.preventDefault();
            navigateToCurrentCommodoreState();
          });
          const label = document.createElement('span');
          label.className = 'hotspot-label';
          shadowLayer.appendChild(label);
          addResizeHandles(shadowLayer);
          applyRectToElement(shadowLayer, CHAPEL_MONITOR_SHADOW, monitorShadowRect);
          overlayLayer.appendChild(shadowLayer);
        }
        const track = document.createElement('div');
        track.className = 'sauce-drop-track';
        track.dataset.id = SAUCE_DROP_TRACK.id;
        track.setAttribute('aria-hidden', 'true');
        const splatter = document.createElement('div');
        splatter.className = 'sauce-drop-splatter';
        for (let index = 0; index < SAUCE_SPLATTER_DOT_COUNT; index += 1) {
          const splatterDot = document.createElement('span');
          splatterDot.className = 'sauce-drop-splatter-dot';
          splatter.appendChild(splatterDot);
        }
        for (let index = 0; index < SAUCE_SPLATTER_DROPLET_MAX_COUNT; index += 1) {
          const splatterDroplet = document.createElement('span');
          splatterDroplet.className = 'sauce-drop-splatter-droplet';
          splatter.appendChild(splatterDroplet);
        }
        track.appendChild(splatter);
        const droplet = document.createElement('div');
        droplet.className = 'sauce-drop-droplet';
        track.appendChild(droplet);
        if (sauceDropRect) {
          const label = document.createElement('span');
          label.className = 'hotspot-label';
          label.textContent = formatRectLabel(SAUCE_DROP_TRACK, sauceDropRect);
          track.appendChild(label);
          addResizeHandles(track);
          applyRectToElement(track, SAUCE_DROP_TRACK, sauceDropRect);
        }
        overlayLayer.appendChild(track);
        HOTSPOTS.forEach((definition) => {
          const rect = getDefinitionRect(definition);
          if (!rect) return;
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'hotspot';
          button.dataset.id = definition.id;
          button.setAttribute('aria-label', definition.label);
          button.title = definition.label;
          if (definition.variant === 'power-button') {
            button.classList.add('power-button-visual');
          }
          const label = document.createElement('span');
          label.className = 'hotspot-label';
          label.textContent = formatRectLabel(definition, rect);
          button.appendChild(label);
          addResizeHandles(button);
          applyRectToElement(button, definition, rect);
          if (definition.audioFolder) {
            button.addEventListener('click', () => {
              playRandomFolderAudio(definition.audioFolder);
            });
          } else if (definition.href) {
            button.addEventListener('click', () => {
              if (definition.commodoreNav) {
                toggleCommodorePowerState();
                return;
              }
              window.location.assign(definition.href);
            });
          }
          overlayLayer.appendChild(button);
        });
        syncChapelPowerButtonState();
      }

      function syncChapelPowerButtonState() {
        const powerButton = overlayLayer.querySelector('[data-id="chapel-commodore-power-button"]');
        const monitorShadow = overlayLayer.querySelector('[data-id="chapel-commodore-monitor-shadow"]');
        const isPoweredOn = loadCommodorePowerState();
        powerButton?.classList.toggle('is-powered-on', isPoweredOn);
        if (!monitorShadow) {
          return;
        }
        if (lastCommodorePowerState === null) {
          monitorShadow.classList.remove('tv-turning-on', 'tv-turning-off');
          monitorShadow.classList.toggle('is-powered-on', isPoweredOn);
          lastCommodorePowerState = isPoweredOn;
          return;
        }
        if (isPoweredOn !== lastCommodorePowerState) {
          if (isPoweredOn) {
            animateChapelMonitorShadowOn(monitorShadow);
          } else {
            animateChapelMonitorShadowOff(monitorShadow);
          }
        }
        lastCommodorePowerState = isPoweredOn;
      }

      function animateChapelMonitorShadowOn(element) {
        if (!element) return;
        if (
          element.classList.contains('is-powered-on') &&
          !element.classList.contains('tv-turning-off') &&
          !element.classList.contains('tv-turning-on')
        ) return;
        element.classList.remove('is-powered-on', 'tv-turning-off', 'tv-turning-on');
        // Force reflow so the browser restarts the animation timeline.
        void element.offsetHeight;
        runMonitorShadowAnimation(element, 'tv-turning-on', () => {
          element.classList.remove('tv-turning-on');
          element.classList.add('is-powered-on');
        });
      }

      function animateChapelMonitorShadowOff(element) {
        if (!element) return;
        const wasPoweredOn = element.classList.contains('is-powered-on');
        element.classList.remove('tv-turning-on', 'tv-turning-off');
        if (!wasPoweredOn) {
          element.classList.add('is-powered-on');
        }
        // Force reflow so the browser restarts the animation timeline.
        void element.offsetHeight;
        element.classList.remove('is-powered-on');
        runMonitorShadowAnimation(element, 'tv-turning-off', () => {
          element.classList.remove('tv-turning-off');
        });
      }

      function runMonitorShadowAnimation(element, animationClass, onDone) {
        const activeController = monitorShadowAnimationControllers.get(element);
        activeController?.abort();
        const controller = new AbortController();
        monitorShadowAnimationControllers.set(element, controller);
        const finish = () => {
          if (monitorShadowAnimationControllers.get(element) !== controller) return;
          controller.abort();
          monitorShadowAnimationControllers.delete(element);
          onDone?.();
        };
        element.addEventListener('animationend', finish, { signal: controller.signal });
        element.addEventListener('animationcancel', finish, { signal: controller.signal });
        element.classList.add(animationClass);
      }

      function getOverlayMetrics() {
        const rect = overlayLayer.getBoundingClientRect();
        return {
          width: rect.width || sceneImage?.clientWidth || overlayLayer.offsetWidth || 0,
          height: rect.height || sceneImage?.clientHeight || overlayLayer.offsetHeight || 0
        };
      }

      function beginDebugEdit(event, definition, element, type, direction = null) {
        event.preventDefault();
        event.stopPropagation();
        element.setPointerCapture(event.pointerId);
        debugEditPointerId = event.pointerId;
        const rect = getDefinitionRect(definition);
        if (!rect) return;
        debugEditType = type;
        debugEditDir = direction;
        debugEditEl = element;
        debugEditDefinition = definition;
        debugEditStartX = event.clientX;
        debugEditStartY = event.clientY;
        debugEditOrigRect = rect;
      }

      function updateDebugEdit(event) {
        if (!debugEditType || !debugEditEl || !debugEditDefinition || !debugEditOrigRect) {
          return;
        }
        const metrics = getOverlayMetrics();
        if (!metrics.width || !metrics.height) {
          return;
        }
        const dx = ((event.clientX - debugEditStartX) / metrics.width) * imageDimensions.width;
        const dy = ((event.clientY - debugEditStartY) / metrics.height) * imageDimensions.height;
        const rect = { ...debugEditOrigRect };

        if (debugEditType === 'move') {
          rect.left = clamp(rect.left + dx, 0, imageDimensions.width - rect.width);
          rect.top = clamp(rect.top + dy, 0, imageDimensions.height - rect.height);
        } else {
          const right = rect.left + rect.width;
          const bottom = rect.top + rect.height;
          let nextLeft = rect.left;
          let nextTop = rect.top;
          let nextRight = right;
          let nextBottom = bottom;
          const direction = debugEditDir || '';

          if (direction.includes('w')) {
            nextLeft = clamp(rect.left + dx, 0, right - MIN_HOTSPOT_SIZE);
          }
          if (direction.includes('e')) {
            nextRight = clamp(right + dx, rect.left + MIN_HOTSPOT_SIZE, imageDimensions.width);
          }
          if (direction.includes('n')) {
            nextTop = clamp(rect.top + dy, 0, bottom - MIN_HOTSPOT_SIZE);
          }
          if (direction.includes('s')) {
            nextBottom = clamp(bottom + dy, rect.top + MIN_HOTSPOT_SIZE, imageDimensions.height);
          }

          rect.left = nextLeft;
          rect.top = nextTop;
          rect.width = nextRight - nextLeft;
          rect.height = nextBottom - nextTop;
        }

        applyRectToElement(debugEditEl, debugEditDefinition, rect);
        debugEditEl.dataset.pendingRect = JSON.stringify(rect);
      }

      function commitDebugEdit() {
        if (!debugEditDefinition || !debugEditEl) {
          return;
        }
        const pendingRect = debugEditEl.dataset.pendingRect;
        if (!pendingRect) {
          return;
        }
        const rect = JSON.parse(pendingRect);
        const anchorStart = ANCHOR_POINTS[debugEditDefinition.anchors[0]];
        const anchorEnd = ANCHOR_POINTS[debugEditDefinition.anchors[1]];
        const padding = Number.isFinite(debugEditDefinition.padding)
          ? debugEditDefinition.padding
          : HOTSPOT_PADDING_DESIGN_PX;
        const innerLeft = clamp(Math.round(rect.left + padding), 0, imageDimensions.width);
        const innerTop = clamp(Math.round(rect.top + padding), 0, imageDimensions.height);
        const innerRight = clamp(Math.round(rect.left + rect.width - padding), 0, imageDimensions.width);
        const innerBottom = clamp(Math.round(rect.top + rect.height - padding), 0, imageDimensions.height);

        if (anchorStart) {
          anchorStart.x = innerLeft;
          anchorStart.y = innerTop;
        }
        if (anchorEnd) {
          anchorEnd.x = innerRight;
          anchorEnd.y = innerBottom;
        }
        delete debugEditEl.dataset.pendingRect;
        renderHotspots();
      }

      function endDebugEdit() {
        if (!debugEditType) {
          return;
        }
        commitDebugEdit();
        debugEditType = null;
        debugEditDir = null;
        debugEditEl = null;
        debugEditDefinition = null;
        debugEditPointerId = null;
        debugEditOrigRect = null;
      }

      function serializeHotspotConfig() {
        const anchorEntries = Object.entries(ANCHOR_POINTS)
          .map(([name, point]) => `  ${name}: { x: ${Math.round(point.x)}, y: ${Math.round(point.y)} }`)
          .join(',\n');
        const hotspotEntries = HOTSPOTS
          .map((definition) => {
            const lines = [
              '  {',
              `    id: '${definition.id}',`,
              `    label: '${definition.label}',`
            ];
            if (definition.variant) {
              lines.push(`    variant: '${definition.variant}',`);
            }
            if (definition.audioFolder) {
              lines.push(`    audioFolder: '${definition.audioFolder}',`);
            }
            lines.push(
              definition.href
                ? `    anchors: ['${definition.anchors[0]}', '${definition.anchors[1]}'],`
                : `    anchors: ['${definition.anchors[0]}', '${definition.anchors[1]}']`
            );
            if (definition.href) {
              lines.push(`    href: '${definition.href}'`);
            }
            lines.push('  }');
            return lines.join('\n');
          })
          .join(',\n');

        return `const ANCHOR_POINTS = {\n${anchorEntries}\n};\n\nconst HOTSPOTS = [\n${hotspotEntries}\n];`;
      }

      function hideSaveModal() {
        saveModalTitle.textContent = DEFAULT_SAVE_MODAL_TITLE;
        saveModal.classList.add('hidden');
      }

      function showSaveModal(message = DEFAULT_SAVE_MODAL_TITLE) {
        saveModalTitle.textContent = message;
        saveModalTextarea.value = serializeHotspotConfig();
        saveModal.classList.remove('hidden');
        saveModalTextarea.focus();
        saveModalTextarea.select();
        debugStatus.textContent = 'Chapel hotspot config ready to copy.';
      }

      function getSerializedHotspotPayload() {
        return {
          anchorPoints: Object.fromEntries(
            Object.entries(ANCHOR_POINTS).map(([name, point]) => [
              name,
              { x: Math.round(point.x), y: Math.round(point.y) }
            ])
          ),
          hotspots: HOTSPOTS.map((definition) => ({
            id: definition.id,
            label: definition.label,
            variant: definition.variant,
            anchors: [...definition.anchors],
            ...(definition.href ? { href: definition.href } : {})
          }))
        };
      }

      function applyServerConfig(payload) {
        const anchorPoints = payload?.anchorPoints;
        if (!anchorPoints || typeof anchorPoints !== 'object') {
          return false;
        }
        Object.entries(anchorPoints).forEach(([name, point]) => {
          if (!ANCHOR_POINTS[name] || typeof point !== 'object') {
            return;
          }
          if (Number.isFinite(point.x)) {
            ANCHOR_POINTS[name].x = point.x;
          }
          if (Number.isFinite(point.y)) {
            ANCHOR_POINTS[name].y = point.y;
          }
        });

        if (Array.isArray(payload.hotspots)) {
          const definitionsById = new Map(payload.hotspots
            .filter((definition) => definition && typeof definition.id === 'string')
            .map((definition) => [definition.id, definition]));
          HOTSPOTS.forEach((definition) => {
            const savedDefinition = definitionsById.get(definition.id);
            if (savedDefinition && typeof savedDefinition.href === 'string') {
              definition.href = savedDefinition.href;
            }
          });
        }
        return true;
      }

      async function loadHotspotsFromServer() {
        let timeoutId = null;
        try {
          const controller = new AbortController();
          timeoutId = window.setTimeout(() => controller.abort(), API_TIMEOUT_MS);
          const response = await fetch(HOTSPOT_API_PATH, { cache: 'no-store', signal: controller.signal });
          if (!response.ok) {
            return false;
          }
          const payload = await response.json();
          return applyServerConfig(payload);
        } catch (_) {
          return false;
        } finally {
          if (timeoutId !== null) {
            window.clearTimeout(timeoutId);
          }
        }
      }

      async function saveHotspots() {
        if (!ensureDebugSaveAccess()) {
          saveButton.textContent = 'Password required';
          saveButton.disabled = false;
          window.setTimeout(() => {
            saveButton.textContent = 'Save';
          }, 1500);
          return;
        }
        endDebugEdit();
        hideSaveModal();
        saveButton.textContent = 'Saving...';
        saveButton.disabled = true;
        const payload = getSerializedHotspotPayload();
        let lastError = null;

        for (let attempt = 1; attempt <= SAVE_RETRY_ATTEMPTS; attempt += 1) {
          try {
            const response = await fetch(HOTSPOT_API_PATH, {
              method: 'POST',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify(payload),
              cache: 'no-store'
            });
            if (!response.ok) {
              const errorText = await response.text();
              throw new Error(errorText || `Server save failed (${response.status})`);
            }
            const savedPayload = await response.json();
            applyServerConfig(savedPayload);
            renderHotspots();
            saveButton.textContent = 'Saved!';
            window.setTimeout(() => {
              saveButton.textContent = 'Save';
              saveButton.disabled = false;
            }, 1500);
            setDebugMode(false);
            debugStatus.textContent = 'Chapel hotspots saved to the server.';
            return;
          } catch (error) {
            lastError = error;
            if (attempt < SAVE_RETRY_ATTEMPTS) {
              await wait(SAVE_RETRY_DELAY_MS * (SAVE_RETRY_BACKOFF_FACTOR ** (attempt - 1)));
            }
          }
        }

        saveButton.textContent = 'Save failed';
        saveButton.disabled = false;
        showSaveModal(
          `Unable to save to the server (${lastError?.message || 'Unknown error'}) — copy the config below to update the source manually`
        );
      }

      function setDebugMode(enabled) {
        document.body.classList.toggle('debug', enabled);
        hideSaveModal();
        debugStatus.textContent = enabled
          ? 'Debug mode enabled.'
          : 'Debug mode disabled.';
      }

      function toggleDebugMode() {
        setDebugMode(!document.body.classList.contains('debug'));
      }

      function getEditableDefinitionById(id) {
        if (id === CHAPEL_MONITOR_SHADOW.id) {
          return CHAPEL_MONITOR_SHADOW;
        }
        if (id === SAUCE_DROP_TRACK.id) {
          return SAUCE_DROP_TRACK;
        }
        return HOTSPOTS.find((entry) => entry.id === id) || null;
      }

      function onPointerDown(event) {
        if (!document.body.classList.contains('debug')) return;
        const handle = event.target.closest('.resize-handle');
        if (handle) {
          const editableElement = handle.closest('.hotspot, .chapel-monitor-shadow-layer, .sauce-drop-track');
          const definition = getEditableDefinitionById(editableElement?.dataset.id);
          if (definition && editableElement) {
            beginDebugEdit(event, definition, editableElement, 'resize', handle.dataset.direction || null);
          }
          return;
        }

        const editableElement = event.target.closest('.hotspot, .chapel-monitor-shadow-layer, .sauce-drop-track');
        if (!editableElement) return;
        const definition = getEditableDefinitionById(editableElement.dataset.id);
        if (!definition) return;
        beginDebugEdit(event, definition, editableElement, 'move');
      }

      function onPointerMove(event) {
        updateDebugEdit(event);
      }

      function onPointerUp() {
        endDebugEdit();
      }

      function onKeyDown(event) {
        const debugComboPressed =
          event.code === 'KeyD' &&
          (event.ctrlKey || event.metaKey) &&
          event.shiftKey;

        if (event.code === 'Backquote' || debugComboPressed) {
          event.preventDefault();
          toggleDebugMode();
        }

        if (event.key === 'Escape') {
          hideSaveModal();
        }
      }

      async function initializeScene() {
        await loadHotspotsFromServer();
        syncImageDimensions();
        renderHotspots();
        clearSauceDripTimers();
        scheduleNextSauceDrip();
        window.requestAnimationFrame(centerInitialViewport);
      }

      if (sceneImage?.complete && sceneImage.naturalWidth && sceneImage.naturalHeight) {
        initializeScene();
      } else {
        sceneImage?.addEventListener('load', () => {
          initializeScene();
        }, { once: true });
        sceneImage?.addEventListener('error', () => {
          initializeScene();
        }, { once: true });
      }

      overlayLayer.addEventListener('pointerdown', onPointerDown);
      window.addEventListener('pointermove', onPointerMove);
      window.addEventListener('pointerup', onPointerUp);
      window.addEventListener('pointercancel', onPointerUp);
      window.addEventListener('pageshow', () => {
        isCommodoreNavigationPending = false;
        if (commodoreNavigationTimerId) {
          window.clearTimeout(commodoreNavigationTimerId);
          commodoreNavigationTimerId = null;
        }
        syncChapelPowerButtonState();
      });
      window.addEventListener('keydown', onKeyDown);
      debugToggleButton.addEventListener('click', toggleDebugMode);
      saveButton.addEventListener('click', saveHotspots);
      document.getElementById('save-modal-close-btn').addEventListener('click', hideSaveModal);
      saveModal.addEventListener('click', (event) => {
        if (event.target === saveModal) {
          hideSaveModal();
        }
      });
      saveModalCopyButton.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(saveModalTextarea.value);
          saveModalCopyButton.textContent = 'Copied!';
          debugStatus.textContent = 'Chapel hotspot config copied to clipboard.';
          window.setTimeout(() => {
            saveModalCopyButton.textContent = 'Copy to clipboard';
          }, 1500);
        } catch (error) {
          debugStatus.textContent = `Clipboard copy failed: ${error?.message || 'Please copy manually.'}`;
        }
      });
    })();
  </script>
</body>
</html>
