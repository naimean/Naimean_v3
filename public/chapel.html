<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapel</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100svh;
      background: #000;
      color: #fff;
      font-family: system-ui, sans-serif;
    }

    main {
      height: 100svh;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      scrollbar-gutter: stable both-edges;
      background: #000;
    }

    #scene {
      position: relative;
      width: min(100%, 960px);
      margin: 0 auto;
    }

    #scene-image {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    #overlay-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .chapel-monitor-shadow-layer {
      position: absolute;
      background: rgba(0, 0, 0, 0.92);
      box-shadow:
        inset 0 0 22px rgba(0, 0, 0, 0.95),
        0 0 8px rgba(0, 0, 0, 0.55);
      border-radius: 4px;
      pointer-events: none;
      z-index: 0;
    }

    .hotspot {
      position: absolute;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
      pointer-events: auto;
    }

    .power-button-visual {
      overflow: hidden;
      border-radius: 999px;
      border: 1px solid rgba(110, 78, 43, 0.55);
      background:
        linear-gradient(180deg, rgba(126, 96, 63, 0.96) 0%, rgba(77, 51, 28, 0.96) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255, 233, 192, 0.34),
        inset 0 -2px 3px rgba(0, 0, 0, 0.42),
        0 1px 3px rgba(0, 0, 0, 0.3);
      transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
    }

    .power-button-visual::before {
      content: '';
      position: absolute;
      inset: 17% 13%;
      border-radius: 999px;
      background:
        radial-gradient(circle at 30% 28%, rgba(255, 245, 214, 0.9) 0%, rgba(255, 245, 214, 0) 26%),
        radial-gradient(circle at center, rgba(255, 194, 106, 0.98) 0%, rgba(241, 112, 45, 0.95) 48%, rgba(139, 19, 12, 0.7) 74%, rgba(139, 19, 12, 0) 100%);
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.25),
        inset 0 -1px 1px rgba(0, 0, 0, 0.45),
        0 0 10px 2px rgba(255, 116, 29, 0.7),
        0 0 16px 4px rgba(255, 102, 0, 0.28);
      animation: chapel-power-glow 3.4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    .power-button-visual::after {
      content: '';
      position: absolute;
      inset: 31% 35%;
      border-radius: 999px;
      background:
        radial-gradient(circle at 35% 28%, rgba(228, 255, 232, 0.95) 0%, rgba(228, 255, 232, 0) 35%),
        linear-gradient(180deg, #96ff9a 0%, #2ce45c 55%, #0d6817 100%);
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.28),
        inset 0 -1px 1px rgba(0, 0, 0, 0.35),
        0 0 7px 1px rgba(74, 255, 118, 0.55);
    }

    .power-button-visual:active {
      transform: translateY(1px);
      filter: brightness(1.08);
      box-shadow:
        inset 0 2px 3px rgba(0, 0, 0, 0.36),
        inset 0 -1px 1px rgba(255, 233, 192, 0.2),
        0 0 2px rgba(255, 161, 70, 0.42);
    }

    @keyframes chapel-power-glow {
      0%,
      100% {
        box-shadow:
          inset 0 1px 1px rgba(255, 255, 255, 0.25),
          inset 0 -1px 1px rgba(0, 0, 0, 0.45),
          0 0 11px 2px rgba(255, 124, 44, 0.72),
          0 0 18px 5px rgba(255, 108, 17, 0.26);
        transform: scale(0.98);
      }

      35% {
        box-shadow:
          inset 0 1px 1px rgba(255, 255, 255, 0.25),
          inset 0 -1px 1px rgba(0, 0, 0, 0.45),
          0 0 15px 4px rgba(255, 149, 67, 0.92),
          0 0 24px 7px rgba(255, 126, 38, 0.44);
        transform: scale(1.02);
      }

      65% {
        box-shadow:
          inset 0 1px 1px rgba(255, 255, 255, 0.25),
          inset 0 -1px 1px rgba(0, 0, 0, 0.45),
          0 0 13px 3px rgba(255, 172, 90, 0.82),
          0 0 22px 6px rgba(255, 140, 54, 0.36);
      }
    }

    body.debug .hotspot,
    body.debug .chapel-monitor-shadow-layer,
    body.debug .sauce-drop-track {
      cursor: move;
      outline: 1px dashed rgba(65, 229, 255, 0.95);
      outline-offset: 0;
      touch-action: none;
    }

    body.debug .chapel-monitor-shadow-layer,
    body.debug .sauce-drop-track {
      pointer-events: auto;
    }

    body.debug .power-button-visual {
      overflow: visible;
    }

    .sauce-drop-track {
      position: absolute;
      left: calc(50% + 50px);
      top: calc(12% - 50px);
      width: 18px;
      height: 72%;
      transform: translateX(-50%);
      pointer-events: none;
      overflow: visible;
      z-index: 6;
    }

    .sauce-drop-droplet {
      position: absolute;
      top: 0;
      left: 50%;
      width: 10px;
      height: 18px;
      border-radius: 50% 50% 65% 65%;
      background: radial-gradient(circle at 35% 26%, rgba(255, 196, 150, 0.78) 0%, rgba(167, 24, 15, 0.94) 65%, rgba(105, 10, 7, 0.98) 100%);
      opacity: 0;
      transform: translate(-50%, 0) scale(0.6);
    }

    @keyframes sauce-drip-fall {
      0% {
        opacity: 0;
        top: 0;
        transform: translate(-50%, 0) scale(0.5);
      }
      10% {
        opacity: 0.95;
        top: 2%;
        transform: translate(-50%, 0) scale(0.82, 1.2);
      }
      80% {
        opacity: 0.98;
        top: calc(100% - 124px);
        transform: translate(-50%, 0) scale(0.9, 1.26);
      }
      100% {
        opacity: 0;
        top: calc(100% - 150px);
        transform: translate(-50%, 0) scale(1.02, 0.82);
      }
    }

    @media (max-width: 899px) {
      .sauce-drop-track {
        left: calc(50% + 18px);
      }

      .sauce-drop-droplet {
        width: 5px;
        height: 9px;
      }
    }

    .hotspot-label {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 8px);
      transform: translateX(-50%);
      min-width: max-content;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(2, 9, 17, 0.88);
      border: 1px solid rgba(65, 229, 255, 0.7);
      color: rgba(232, 251, 255, 0.98);
      font-size: 11px;
      line-height: 1.2;
      pointer-events: none;
      opacity: 0;
      z-index: 3;
      white-space: nowrap;
    }

    body.debug .hotspot-label {
      opacity: 1;
    }

    .resize-handle {
      position: absolute;
      background: rgba(65, 229, 255, 0.18);
      border: 1px solid rgba(65, 229, 255, 0.65);
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      touch-action: none;
      z-index: 2;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.45);
    }

    body.debug .resize-handle {
      opacity: 1;
      pointer-events: auto;
    }

    .resize-n,
    .resize-s {
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 20px;
    }

    .resize-e,
    .resize-w {
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 40px;
    }

    .resize-ne,
    .resize-nw,
    .resize-se,
    .resize-sw {
      width: 24px;
      height: 24px;
    }

    .resize-n { top: -10px; cursor: n-resize; }
    .resize-s { bottom: -10px; cursor: s-resize; }
    .resize-e { right: -10px; cursor: e-resize; }
    .resize-w { left: -10px; cursor: w-resize; }
    .resize-ne { top: -12px; right: -12px; cursor: ne-resize; }
    .resize-nw { top: -12px; left: -12px; cursor: nw-resize; }
    .resize-se { right: -12px; bottom: -12px; cursor: se-resize; }
    .resize-sw { left: -12px; bottom: -12px; cursor: sw-resize; }

    #debug-toggle-btn,
    #save-hotspots-btn {
      position: fixed;
      bottom: 12px;
      z-index: 1000;
      min-width: 44px;
      min-height: 44px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(0, 0, 0, 0.55);
      color: rgba(255, 255, 255, 0.9);
      font-size: 11px;
      letter-spacing: 0.05em;
      cursor: pointer;
    }

    #debug-toggle-btn {
      right: 12px;
    }

    #save-hotspots-btn {
      right: 68px;
    }

    #debug-toggle-btn:focus-visible,
    #save-hotspots-btn:focus-visible,
    .save-modal-btn:focus-visible {
      outline: 2px solid rgba(65, 229, 255, 0.95);
      outline-offset: 2px;
    }

    body:not(.debug) #save-hotspots-btn {
      display: none;
    }

    #save-modal {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.75);
    }

    #save-modal.hidden {
      display: none;
    }

    #save-modal-inner {
      background: #0e1520;
      border: 1px solid rgba(65, 229, 255, 0.5);
      border-radius: 10px;
      padding: 20px;
      max-width: 90vw;
      width: 640px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #save-modal-title {
      font-size: 14px;
      font-weight: 600;
      color: rgba(65, 229, 255, 0.95);
      margin: 0;
    }

    #save-modal-textarea {
      flex: 1;
      min-height: 260px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      color: #cce8ff;
      font-family: "Courier New", monospace;
      font-size: 12px;
      line-height: 1.4;
      padding: 10px;
      resize: vertical;
    }

    #save-modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .save-modal-btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 12px;
      cursor: pointer;
    }

    .save-modal-btn.primary {
      background: rgba(65, 229, 255, 0.2);
      border-color: rgba(65, 229, 255, 0.6);
      color: rgba(65, 229, 255, 1);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <main aria-label="Chapel stacked image scroller">
    <div id="scene">
      <picture>
        <source srcset="assets/images/chapel_stacked.v20260424.webp" type="image/webp" />
        <img id="scene-image" src="assets/images/chapel_stacked.v20260424.png" alt="Chapel stacked web image" />
      </picture>
      <div id="overlay-layer" aria-label="Chapel hotspots"></div>
    </div>
  </main>
  <button id="debug-toggle-btn" type="button" aria-label="Toggle debug mode">Debug</button>
  <button id="save-hotspots-btn" type="button" aria-label="Save chapel hotspot positions">Save</button>
  <div id="save-modal" class="hidden" role="dialog" aria-modal="true" aria-labelledby="save-modal-title">
    <div id="save-modal-inner">
      <h2 id="save-modal-title">Copy the updated Chapel hotspot config below</h2>
      <textarea id="save-modal-textarea" aria-label="Chapel hotspot config" readonly spellcheck="false"></textarea>
      <div id="save-modal-actions">
        <button type="button" class="save-modal-btn primary" id="save-modal-copy-btn">Copy to clipboard</button>
        <button type="button" class="save-modal-btn" id="save-modal-close-btn">Close</button>
      </div>
    </div>
  </div>
  <div id="debug-status" class="sr-only" role="status" aria-live="polite"></div>
  <script>
    (() => {
      const HOTSPOT_API_PATH = '/api/chapel-hotspots';
      const API_TIMEOUT_MS = 5000;
      const SAVE_RETRY_ATTEMPTS = 3;
      const SAVE_RETRY_DELAY_MS = 350;
      const SAVE_RETRY_BACKOFF_FACTOR = 2;
      const DEFAULT_SAVE_MODAL_TITLE = 'Copy the updated Chapel hotspot config below';
      const DESIGN_IMAGE_WIDTH = 993;
      const DESIGN_IMAGE_HEIGHT = 3709;
      const HOTSPOT_PADDING_DESIGN_PX = 4;
      const MIN_HOTSPOT_SIZE = 20;
      const RESIZE_HANDLE_DIRECTIONS = ['n', 'ne', 'e', 'se', 's', 'sw', 'w', 'nw'];
      const INITIAL_SCROLL_POSITION_RATIO = 0.5; // Start halfway through scrollable scene height.
      const SAUCE_DRIP_MIN_INTERVAL_MS = 10_000;
      const SAUCE_DRIP_MAX_INTERVAL_MS = 15_000;
      const SAUCE_DRIP_ANIMATION_MS = 1_600;
      const COMMODORE_NAV_SOURCE_STORAGE_KEY = 'commodore.navigation.source.v1';
      const COMMODORE_POWER_STATE_STORAGE_KEY = 'commodore.screen.poweredOn.v1';
      const COMMODORE_NAV_SOURCE_CHAPEL = 'chapel';
      const ANCHOR_POINTS = {
        aceVenturaTopLeft: { x: 359, y: 2215 },
        aceVenturaBottomRight: { x: 457, y: 2355 },
        sillyGooseTopLeft: { x: 289, y: 2303 },
        sillyGooseBottomRight: { x: 349, y: 2381 },
        crustyTheClownTopLeft: { x: 4, y: 2285 },
        crustyTheClownBottomRight: { x: 118, y: 2512 },
        caseyJonesTopLeft: { x: 129, y: 2230 },
        caseyJonesBottomRight: { x: 278, y: 2410 },
        rickTopLeft: { x: 773, y: 2268 },
        rickBottomRight: { x: 844, y: 2401 },
        mortyTopLeft: { x: 697, y: 2321 },
        mortyBottomRight: { x: 762, y: 2401 },
        scroogeMcduckTopLeft: { x: 855, y: 2249 },
        scroogeMcduckBottomRight: { x: 989, y: 2511 },
        chapelMonitorShadowTopLeft: { x: 456, y: 2091 },
        chapelMonitorShadowBottomRight: { x: 530, y: 2145 },
        commodoreButtonsTopLeft: { x: 531, y: 2171 },
        commodoreButtonsBottomRight: { x: 543, y: 2183 },
        antechamberTopLeft: { x: 305, y: 2928 },
        antechamberBottomRight: { x: 775, y: 3400 },
        sauceDropTopLeft: { x: 536, y: 370 },
        sauceDropBottomRight: { x: 604, y: 2858 }
      };
      const CHAPEL_MONITOR_SHADOW = {
        id: 'chapel-commodore-monitor-shadow',
        label: 'Commodore monitor shadow',
        anchors: ['chapelMonitorShadowTopLeft', 'chapelMonitorShadowBottomRight'],
        padding: 0
      };
      const HOTSPOTS = [
        {
          id: 'chapel-ace-ventura',
          label: 'Ace Ventura',
          audioFolder: 'ace_ventura',
          anchors: ['aceVenturaTopLeft', 'aceVenturaBottomRight']
        },
        {
          id: 'chapel-silly-goose',
          label: 'Silly Goose',
          audioFolder: 'silly_goose',
          anchors: ['sillyGooseTopLeft', 'sillyGooseBottomRight']
        },
        {
          id: 'chapel-crusty-the-clown',
          label: 'Crusty the Clown',
          audioFolder: 'crusty_the_clown',
          anchors: ['crustyTheClownTopLeft', 'crustyTheClownBottomRight']
        },
        {
          id: 'chapel-casey-jones',
          label: 'Casey Jones',
          audioFolder: 'casey_jones',
          anchors: ['caseyJonesTopLeft', 'caseyJonesBottomRight']
        },
        {
          id: 'chapel-rick',
          label: 'Rick',
          audioFolder: 'rick',
          anchors: ['rickTopLeft', 'rickBottomRight']
        },
        {
          id: 'chapel-morty',
          label: 'Morty',
          audioFolder: 'morty',
          anchors: ['mortyTopLeft', 'mortyBottomRight']
        },
        {
          id: 'chapel-scrooge-mcduck',
          label: 'Scrooge McDuck',
          audioFolder: 'scrooge_mcduck',
          anchors: ['scroogeMcduckTopLeft', 'scroogeMcduckBottomRight']
        },
        {
          id: 'chapel-commodore-power-button',
          label: 'Commodore power button',
          variant: 'power-button',
          anchors: ['commodoreButtonsTopLeft', 'commodoreButtonsBottomRight'],
          href: '/commodore.html',
          commodoreNav: true
        },
        {
          id: 'chapel-antechamber',
          label: 'Antechamber',
          anchors: ['antechamberTopLeft', 'antechamberBottomRight'],
          href: '/antechamber.html'
        }
      ];
      const SAUCE_DROP_TRACK = {
        id: 'chapel-sauce-drop-track',
        label: 'Sauce drop',
        anchors: ['sauceDropTopLeft', 'sauceDropBottomRight'],
        padding: 0
      };
      const AUDIO_FOLDERS = {
        ace_ventura: [
          'assets/audio/ace_ventura/let-s-see-that-in-instant-replay-ace-ventura-jim-carrey-replay-rewind.mp3',
          'assets/audio/ace_ventura/im ready to go in coach.m4a'
        ],
        silly_goose: [
          'assets/audio/silly_goose/goose_honk.v20260424.mp3'
        ],
        crusty_the_clown: [
          'assets/audio/crusty_the_clown/krusty_laugh.v20260424.mp3'
        ],
        casey_jones: [
          'assets/audio/casey_jones/god_i_hate_punkers.m4a',
          'assets/audio/casey_jones/you were fired.m4a'
        ],
        rick: [
          'assets/audio/rick/rick_nope.v20260424.mp3'
        ],
        morty: [
          'assets/audio/morty/morty_aw_jeez.v20260424.mp3'
        ],
        scrooge_mcduck: [
          'assets/audio/scrooge_mcduck/zelda-secret.v20260424.mp3',
          'assets/audio/scrooge_mcduck/1-billion-one-1-billion-two-1-billion-three-1-billion-four.mp3',
          'assets/audio/scrooge_mcduck/ah-it-s-a-priceless-ruby.mp3',
          'assets/audio/scrooge_mcduck/children-and-billionaires-first.mp3',
          'assets/audio/scrooge_mcduck/jackpot.mp3',
          'assets/audio/scrooge_mcduck/me-money.mp3',
          'assets/audio/scrooge_mcduck/would-you-look-at-the-size-of-this-diamond.mp3'
        ]
      };
      const overlayLayer = document.getElementById('overlay-layer');
      const mainScroller = document.querySelector('main');
      const sceneImage = document.getElementById('scene-image');
      const debugStatus = document.getElementById('debug-status');
      const debugToggleButton = document.getElementById('debug-toggle-btn');
      const saveButton = document.getElementById('save-hotspots-btn');
      const saveModal = document.getElementById('save-modal');
      const saveModalTitle = document.getElementById('save-modal-title');
      const saveModalTextarea = document.getElementById('save-modal-textarea');
      const saveModalCopyButton = document.getElementById('save-modal-copy-btn');
      const imageDimensions = {
        width: sceneImage?.naturalWidth || DESIGN_IMAGE_WIDTH,
        height: sceneImage?.naturalHeight || DESIGN_IMAGE_HEIGHT
      };
      let debugEditType = null;
      let debugEditDir = null;
      let debugEditEl = null;
      let debugEditDefinition = null;
      let debugEditPointerId = null;
      let debugEditStartX = 0;
      let debugEditStartY = 0;
      let debugEditOrigRect = null;
      let activeAudio = null;
      let activeAudioUrl = '';
      const audioElsByUrl = new Map();
      const lastPlayedAudioByFolder = new Map();
      let hasInitializedViewport = false;
      let sauceDripTimerId = null;
      let sauceDripResetTimerId = null;

      function wait(ms) {
        return new Promise((resolve) => {
          window.setTimeout(resolve, ms);
        });
      }

      function syncImageDimensions() {
        imageDimensions.width = sceneImage?.naturalWidth || DESIGN_IMAGE_WIDTH;
        imageDimensions.height = sceneImage?.naturalHeight || DESIGN_IMAGE_HEIGHT;
      }

      function rectFromAnchors(anchorStart, anchorEnd, padding = 0) {
        const start = ANCHOR_POINTS[anchorStart];
        const end = ANCHOR_POINTS[anchorEnd];
        if (!start || !end) {
          console.warn(`Missing hotspot anchor(s): ${anchorStart}, ${anchorEnd}`);
          return null;
        }
        const left = Math.max(0, Math.min(start.x, end.x) - padding);
        const top = Math.max(0, Math.min(start.y, end.y) - padding);
        const width = Math.abs(end.x - start.x) + (padding * 2);
        const height = Math.abs(end.y - start.y) + (padding * 2);
        return { left, top, width, height };
      }

      function toPercentX(value) {
        return (value / imageDimensions.width) * 100;
      }

      function toPercentY(value) {
        return (value / imageDimensions.height) * 100;
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(value, max));
      }

      function getRandomAudioUrl(folder) {
        const audioUrls = AUDIO_FOLDERS[folder];
        if (!Array.isArray(audioUrls) || !audioUrls.length) {
          return null;
        }
        if (audioUrls.length === 1) {
          lastPlayedAudioByFolder.set(folder, audioUrls[0]);
          return audioUrls[0];
        }
        const lastPlayedUrl = lastPlayedAudioByFolder.get(folder);
        const candidates = audioUrls.filter((audioUrl) => audioUrl !== lastPlayedUrl);
        const nextPool = candidates.length ? candidates : audioUrls;
        const nextUrl = nextPool[Math.floor(Math.random() * nextPool.length)];
        lastPlayedAudioByFolder.set(folder, nextUrl);
        return nextUrl;
      }

      function getAudioElement(audioUrl) {
        let audioEl = audioElsByUrl.get(audioUrl);
        if (!audioEl) {
          audioEl = new Audio(audioUrl);
          audioEl.preload = 'auto';
          audioElsByUrl.set(audioUrl, audioEl);
        }
        return audioEl;
      }

      async function playRandomFolderAudio(folder) {
        const audioUrl = getRandomAudioUrl(folder);
        if (!audioUrl) {
          console.warn(`No audio assets configured for chapel hotspot folder: ${folder}`);
          return;
        }

        if (activeAudio && activeAudioUrl !== audioUrl) {
          activeAudio.pause();
          activeAudio.currentTime = 0;
        }

        const audioEl = getAudioElement(audioUrl);
        audioEl.currentTime = 0;
        activeAudio = audioEl;
        activeAudioUrl = audioUrl;

        try {
          await audioEl.play();
        } catch (error) {
          console.warn(`Unable to play chapel hotspot audio from ${audioUrl}.`, error);
        }
      }

      function centerInitialViewport() {
        if (!mainScroller || hasInitializedViewport) {
          return;
        }

        const viewportHeight = mainScroller.clientHeight;
        const sceneHeight = sceneImage?.clientHeight || imageDimensions.height || 0;
        if (viewportHeight <= 0 || sceneHeight <= 0) {
          return;
        }

        const maxScrollTop = Math.max(0, sceneHeight - viewportHeight);
        if (maxScrollTop > 0) {
          mainScroller.scrollTop = Math.round(maxScrollTop * INITIAL_SCROLL_POSITION_RATIO);
        }
        hasInitializedViewport = true;
      }

      function clearSauceDripTimers() {
        if (sauceDripTimerId) {
          window.clearTimeout(sauceDripTimerId);
          sauceDripTimerId = null;
        }
        if (sauceDripResetTimerId) {
          window.clearTimeout(sauceDripResetTimerId);
          sauceDripResetTimerId = null;
        }
      }

      function getNextSauceDripDelayMs() {
        const spread = SAUCE_DRIP_MAX_INTERVAL_MS - SAUCE_DRIP_MIN_INTERVAL_MS;
        return SAUCE_DRIP_MIN_INTERVAL_MS + Math.floor(Math.random() * (spread + 1));
      }

      function scheduleNextSauceDrip() {
        if (!overlayLayer) {
          return;
        }
        if (sauceDripTimerId) {
          window.clearTimeout(sauceDripTimerId);
        }
        sauceDripTimerId = window.setTimeout(() => {
          triggerSauceDrip();
        }, getNextSauceDripDelayMs());
      }

      function triggerSauceDrip() {
        const droplet = overlayLayer.querySelector('.sauce-drop-droplet');
        if (!droplet) {
          scheduleNextSauceDrip();
          return;
        }
        droplet.style.animation = 'none';
        void droplet.offsetHeight;
        droplet.style.animation = `sauce-drip-fall ${SAUCE_DRIP_ANIMATION_MS}ms ease-in forwards`;
        if (sauceDripResetTimerId) {
          window.clearTimeout(sauceDripResetTimerId);
        }
        sauceDripResetTimerId = window.setTimeout(() => {
          droplet.style.animation = 'none';
          scheduleNextSauceDrip();
        }, SAUCE_DRIP_ANIMATION_MS);
      }

      function getDefinitionRect(definition) {
        return rectFromAnchors(
          definition.anchors[0],
          definition.anchors[1],
          Number.isFinite(definition.padding) ? definition.padding : HOTSPOT_PADDING_DESIGN_PX
        );
      }

      function formatRectLabel(definition, rect) {
        return `${definition.label} (${Math.round(rect.left)}, ${Math.round(rect.top)}) ${Math.round(rect.width)}×${Math.round(rect.height)}`;
      }

      function applyRectToElement(element, definition, rect) {
        element.style.left = `${toPercentX(rect.left)}%`;
        element.style.top = `${toPercentY(rect.top)}%`;
        element.style.width = `${toPercentX(rect.width)}%`;
        element.style.height = `${toPercentY(rect.height)}%`;
        const label = element.querySelector('.hotspot-label');
        if (label) {
          label.textContent = formatRectLabel(definition, rect);
        }
      }

      function addResizeHandles(element) {
        RESIZE_HANDLE_DIRECTIONS.forEach((direction) => {
          const handle = document.createElement('span');
          handle.className = `resize-handle resize-${direction}`;
          handle.dataset.direction = direction;
          element.appendChild(handle);
        });
      }

      function renderHotspots() {
        overlayLayer.replaceChildren();
        const monitorShadowRect = getDefinitionRect(CHAPEL_MONITOR_SHADOW);
        if (monitorShadowRect) {
          const shadowLayer = document.createElement('div');
          shadowLayer.className = 'chapel-monitor-shadow-layer';
          shadowLayer.dataset.id = CHAPEL_MONITOR_SHADOW.id;
          const label = document.createElement('span');
          label.className = 'hotspot-label';
          shadowLayer.appendChild(label);
          addResizeHandles(shadowLayer);
          applyRectToElement(shadowLayer, CHAPEL_MONITOR_SHADOW, monitorShadowRect);
          overlayLayer.appendChild(shadowLayer);
        }
        const track = document.createElement('div');
        track.className = 'sauce-drop-track';
        track.dataset.id = SAUCE_DROP_TRACK.id;
        track.setAttribute('aria-hidden', 'true');
        const droplet = document.createElement('div');
        droplet.className = 'sauce-drop-droplet';
        track.appendChild(droplet);
        const sauceDropRect = getDefinitionRect(SAUCE_DROP_TRACK);
        if (document.body.classList.contains('debug') && sauceDropRect) {
          const label = document.createElement('span');
          label.className = 'hotspot-label';
          label.textContent = formatRectLabel(SAUCE_DROP_TRACK, sauceDropRect);
          track.appendChild(label);
          addResizeHandles(track);
          applyRectToElement(track, SAUCE_DROP_TRACK, sauceDropRect);
        }
        overlayLayer.appendChild(track);
        HOTSPOTS.forEach((definition) => {
          const rect = getDefinitionRect(definition);
          if (!rect) return;
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'hotspot';
          button.dataset.id = definition.id;
          button.setAttribute('aria-label', definition.label);
          button.title = definition.label;
          if (definition.variant === 'power-button') {
            button.classList.add('power-button-visual');
          }
          const label = document.createElement('span');
          label.className = 'hotspot-label';
          label.textContent = formatRectLabel(definition, rect);
          button.appendChild(label);
          addResizeHandles(button);
          applyRectToElement(button, definition, rect);
          if (definition.audioFolder) {
            button.addEventListener('click', () => {
              playRandomFolderAudio(definition.audioFolder);
            });
          } else if (definition.href) {
            button.addEventListener('click', () => {
              if (definition.commodoreNav) {
                try {
                  sessionStorage.setItem(COMMODORE_NAV_SOURCE_STORAGE_KEY, COMMODORE_NAV_SOURCE_CHAPEL);
                  sessionStorage.setItem(COMMODORE_POWER_STATE_STORAGE_KEY, String(false));
                } catch (error) {
                  console.warn('Unable to persist Commodore chapel navigation state.', error);
                }
              }
              window.location.assign(definition.href);
            });
          }
          overlayLayer.appendChild(button);
        });
      }

      function getOverlayMetrics() {
        const rect = overlayLayer.getBoundingClientRect();
        return {
          width: rect.width || sceneImage?.clientWidth || overlayLayer.offsetWidth || 0,
          height: rect.height || sceneImage?.clientHeight || overlayLayer.offsetHeight || 0
        };
      }

      function beginDebugEdit(event, definition, element, type, direction = null) {
        event.preventDefault();
        event.stopPropagation();
        element.setPointerCapture(event.pointerId);
        debugEditPointerId = event.pointerId;
        const rect = getDefinitionRect(definition);
        if (!rect) return;
        debugEditType = type;
        debugEditDir = direction;
        debugEditEl = element;
        debugEditDefinition = definition;
        debugEditStartX = event.clientX;
        debugEditStartY = event.clientY;
        debugEditOrigRect = rect;
      }

      function updateDebugEdit(event) {
        if (!debugEditType || !debugEditEl || !debugEditDefinition || !debugEditOrigRect) {
          return;
        }
        const metrics = getOverlayMetrics();
        if (!metrics.width || !metrics.height) {
          return;
        }
        const dx = ((event.clientX - debugEditStartX) / metrics.width) * imageDimensions.width;
        const dy = ((event.clientY - debugEditStartY) / metrics.height) * imageDimensions.height;
        const rect = { ...debugEditOrigRect };

        if (debugEditType === 'move') {
          rect.left = clamp(rect.left + dx, 0, imageDimensions.width - rect.width);
          rect.top = clamp(rect.top + dy, 0, imageDimensions.height - rect.height);
        } else {
          const right = rect.left + rect.width;
          const bottom = rect.top + rect.height;
          let nextLeft = rect.left;
          let nextTop = rect.top;
          let nextRight = right;
          let nextBottom = bottom;
          const direction = debugEditDir || '';

          if (direction.includes('w')) {
            nextLeft = clamp(rect.left + dx, 0, right - MIN_HOTSPOT_SIZE);
          }
          if (direction.includes('e')) {
            nextRight = clamp(right + dx, rect.left + MIN_HOTSPOT_SIZE, imageDimensions.width);
          }
          if (direction.includes('n')) {
            nextTop = clamp(rect.top + dy, 0, bottom - MIN_HOTSPOT_SIZE);
          }
          if (direction.includes('s')) {
            nextBottom = clamp(bottom + dy, rect.top + MIN_HOTSPOT_SIZE, imageDimensions.height);
          }

          rect.left = nextLeft;
          rect.top = nextTop;
          rect.width = nextRight - nextLeft;
          rect.height = nextBottom - nextTop;
        }

        applyRectToElement(debugEditEl, debugEditDefinition, rect);
        debugEditEl.dataset.pendingRect = JSON.stringify(rect);
      }

      function commitDebugEdit() {
        if (!debugEditDefinition || !debugEditEl) {
          return;
        }
        const pendingRect = debugEditEl.dataset.pendingRect;
        if (!pendingRect) {
          return;
        }
        const rect = JSON.parse(pendingRect);
        const anchorStart = ANCHOR_POINTS[debugEditDefinition.anchors[0]];
        const anchorEnd = ANCHOR_POINTS[debugEditDefinition.anchors[1]];
        const padding = Number.isFinite(debugEditDefinition.padding)
          ? debugEditDefinition.padding
          : HOTSPOT_PADDING_DESIGN_PX;
        const innerLeft = clamp(Math.round(rect.left + padding), 0, imageDimensions.width);
        const innerTop = clamp(Math.round(rect.top + padding), 0, imageDimensions.height);
        const innerRight = clamp(Math.round(rect.left + rect.width - padding), 0, imageDimensions.width);
        const innerBottom = clamp(Math.round(rect.top + rect.height - padding), 0, imageDimensions.height);

        if (anchorStart) {
          anchorStart.x = innerLeft;
          anchorStart.y = innerTop;
        }
        if (anchorEnd) {
          anchorEnd.x = innerRight;
          anchorEnd.y = innerBottom;
        }
        delete debugEditEl.dataset.pendingRect;
        renderHotspots();
      }

      function endDebugEdit() {
        if (!debugEditType) {
          return;
        }
        commitDebugEdit();
        debugEditType = null;
        debugEditDir = null;
        debugEditEl = null;
        debugEditDefinition = null;
        debugEditPointerId = null;
        debugEditOrigRect = null;
      }

      function serializeHotspotConfig() {
        const anchorEntries = Object.entries(ANCHOR_POINTS)
          .map(([name, point]) => `  ${name}: { x: ${Math.round(point.x)}, y: ${Math.round(point.y)} }`)
          .join(',\n');
        const hotspotEntries = HOTSPOTS
          .map((definition) => {
            const lines = [
              '  {',
              `    id: '${definition.id}',`,
              `    label: '${definition.label}',`
            ];
            if (definition.variant) {
              lines.push(`    variant: '${definition.variant}',`);
            }
            if (definition.audioFolder) {
              lines.push(`    audioFolder: '${definition.audioFolder}',`);
            }
            lines.push(
              definition.href
                ? `    anchors: ['${definition.anchors[0]}', '${definition.anchors[1]}'],`
                : `    anchors: ['${definition.anchors[0]}', '${definition.anchors[1]}']`
            );
            if (definition.href) {
              lines.push(`    href: '${definition.href}'`);
            }
            lines.push('  }');
            return lines.join('\n');
          })
          .join(',\n');

        return `const ANCHOR_POINTS = {\n${anchorEntries}\n};\n\nconst HOTSPOTS = [\n${hotspotEntries}\n];`;
      }

      function hideSaveModal() {
        saveModalTitle.textContent = DEFAULT_SAVE_MODAL_TITLE;
        saveModal.classList.add('hidden');
      }

      function showSaveModal(message = DEFAULT_SAVE_MODAL_TITLE) {
        saveModalTitle.textContent = message;
        saveModalTextarea.value = serializeHotspotConfig();
        saveModal.classList.remove('hidden');
        saveModalTextarea.focus();
        saveModalTextarea.select();
        debugStatus.textContent = 'Chapel hotspot config ready to copy.';
      }

      function getSerializedHotspotPayload() {
        return {
          anchorPoints: Object.fromEntries(
            Object.entries(ANCHOR_POINTS).map(([name, point]) => [
              name,
              { x: Math.round(point.x), y: Math.round(point.y) }
            ])
          ),
          hotspots: HOTSPOTS.map((definition) => ({
            id: definition.id,
            label: definition.label,
            variant: definition.variant,
            anchors: [...definition.anchors],
            ...(definition.href ? { href: definition.href } : {})
          }))
        };
      }

      function applyServerConfig(payload) {
        const anchorPoints = payload?.anchorPoints;
        if (!anchorPoints || typeof anchorPoints !== 'object') {
          return false;
        }
        Object.entries(anchorPoints).forEach(([name, point]) => {
          if (!ANCHOR_POINTS[name] || typeof point !== 'object') {
            return;
          }
          if (Number.isFinite(point.x)) {
            ANCHOR_POINTS[name].x = point.x;
          }
          if (Number.isFinite(point.y)) {
            ANCHOR_POINTS[name].y = point.y;
          }
        });

        if (Array.isArray(payload.hotspots)) {
          const definitionsById = new Map(payload.hotspots
            .filter((definition) => definition && typeof definition.id === 'string')
            .map((definition) => [definition.id, definition]));
          HOTSPOTS.forEach((definition) => {
            const savedDefinition = definitionsById.get(definition.id);
            if (savedDefinition && typeof savedDefinition.href === 'string') {
              definition.href = savedDefinition.href;
            }
          });
        }
        return true;
      }

      async function loadHotspotsFromServer() {
        let timeoutId = null;
        try {
          const controller = new AbortController();
          timeoutId = window.setTimeout(() => controller.abort(), API_TIMEOUT_MS);
          const response = await fetch(HOTSPOT_API_PATH, { cache: 'no-store', signal: controller.signal });
          if (!response.ok) {
            return false;
          }
          const payload = await response.json();
          return applyServerConfig(payload);
        } catch (_) {
          return false;
        } finally {
          if (timeoutId !== null) {
            window.clearTimeout(timeoutId);
          }
        }
      }

      async function saveHotspots() {
        endDebugEdit();
        hideSaveModal();
        saveButton.textContent = 'Saving...';
        saveButton.disabled = true;
        const payload = getSerializedHotspotPayload();
        let lastError = null;

        for (let attempt = 1; attempt <= SAVE_RETRY_ATTEMPTS; attempt += 1) {
          try {
            const response = await fetch(HOTSPOT_API_PATH, {
              method: 'POST',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify(payload),
              cache: 'no-store'
            });
            if (!response.ok) {
              const errorText = await response.text();
              throw new Error(errorText || `Server save failed (${response.status})`);
            }
            const savedPayload = await response.json();
            applyServerConfig(savedPayload);
            renderHotspots();
            saveButton.textContent = 'Saved!';
            window.setTimeout(() => {
              saveButton.textContent = 'Save';
              saveButton.disabled = false;
            }, 1500);
            setDebugMode(false);
            debugStatus.textContent = 'Chapel hotspots saved to the server.';
            return;
          } catch (error) {
            lastError = error;
            if (attempt < SAVE_RETRY_ATTEMPTS) {
              await wait(SAVE_RETRY_DELAY_MS * (SAVE_RETRY_BACKOFF_FACTOR ** (attempt - 1)));
            }
          }
        }

        saveButton.textContent = 'Save failed';
        saveButton.disabled = false;
        showSaveModal(
          `Unable to save to the server (${lastError?.message || 'Unknown error'}) — copy the config below to update the source manually`
        );
      }

      function setDebugMode(enabled) {
        document.body.classList.toggle('debug', enabled);
        hideSaveModal();
        debugStatus.textContent = enabled
          ? 'Debug mode enabled.'
          : 'Debug mode disabled.';
      }

      function toggleDebugMode() {
        setDebugMode(!document.body.classList.contains('debug'));
      }

      function getEditableDefinitionById(id) {
        if (id === CHAPEL_MONITOR_SHADOW.id) {
          return CHAPEL_MONITOR_SHADOW;
        }
        if (id === SAUCE_DROP_TRACK.id) {
          return SAUCE_DROP_TRACK;
        }
        return HOTSPOTS.find((entry) => entry.id === id) || null;
      }

      function onPointerDown(event) {
        if (!document.body.classList.contains('debug')) return;
        const handle = event.target.closest('.resize-handle');
        if (handle) {
          const editableElement = handle.closest('.hotspot, .chapel-monitor-shadow-layer, .sauce-drop-track');
          const definition = getEditableDefinitionById(editableElement?.dataset.id);
          if (definition && editableElement) {
            beginDebugEdit(event, definition, editableElement, 'resize', handle.dataset.direction || null);
          }
          return;
        }

        const editableElement = event.target.closest('.hotspot, .chapel-monitor-shadow-layer, .sauce-drop-track');
        if (!editableElement) return;
        const definition = getEditableDefinitionById(editableElement.dataset.id);
        if (!definition) return;
        beginDebugEdit(event, definition, editableElement, 'move');
      }

      function onPointerMove(event) {
        updateDebugEdit(event);
      }

      function onPointerUp() {
        endDebugEdit();
      }

      function onKeyDown(event) {
        const debugComboPressed =
          event.code === 'KeyD' &&
          (event.ctrlKey || event.metaKey) &&
          event.shiftKey;

        if (event.code === 'Backquote' || debugComboPressed) {
          event.preventDefault();
          toggleDebugMode();
        }

        if (event.key === 'Escape') {
          hideSaveModal();
        }
      }

      async function initializeScene() {
        await loadHotspotsFromServer();
        syncImageDimensions();
        renderHotspots();
        clearSauceDripTimers();
        scheduleNextSauceDrip();
        window.requestAnimationFrame(centerInitialViewport);
      }

      if (sceneImage?.complete && sceneImage.naturalWidth && sceneImage.naturalHeight) {
        initializeScene();
      } else {
        sceneImage?.addEventListener('load', () => {
          initializeScene();
        }, { once: true });
        sceneImage?.addEventListener('error', () => {
          initializeScene();
        }, { once: true });
      }

      overlayLayer.addEventListener('pointerdown', onPointerDown);
      window.addEventListener('pointermove', onPointerMove);
      window.addEventListener('pointerup', onPointerUp);
      window.addEventListener('pointercancel', onPointerUp);
      window.addEventListener('keydown', onKeyDown);
      debugToggleButton.addEventListener('click', toggleDebugMode);
      saveButton.addEventListener('click', saveHotspots);
      document.getElementById('save-modal-close-btn').addEventListener('click', hideSaveModal);
      saveModal.addEventListener('click', (event) => {
        if (event.target === saveModal) {
          hideSaveModal();
        }
      });
      saveModalCopyButton.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(saveModalTextarea.value);
          saveModalCopyButton.textContent = 'Copied!';
          debugStatus.textContent = 'Chapel hotspot config copied to clipboard.';
          window.setTimeout(() => {
            saveModalCopyButton.textContent = 'Copy to clipboard';
          }, 1500);
        } catch (error) {
          debugStatus.textContent = `Clipboard copy failed: ${error?.message || 'Please copy manually.'}`;
        }
      });
    })();
  </script>
</body>
</html>
