<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Den Scene</title>
  <style>
    :root {
      --design-height: 2160;
      --tile-width: 3840;
      --uw-canvas-width: 3440;
      --uw-canvas-height: 1440;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, #1d2338 0%, transparent 45%),
        radial-gradient(circle at 80% 25%, #0f3e48 0%, transparent 40%),
        #07080d;
      color: #fff;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      touch-action: none;
      user-select: none;
    }

    /* Viewport is the camera frame shown on screen. */
    #viewport {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      isolation: isolate;
      cursor: grab;
    }

    #viewport.dragging {
      cursor: grabbing;
    }

    /* Stage keeps all scene layers in the fixed 3840x2160 coordinate world space. */
    #stage {
      position: absolute;
      left: 0;
      top: 50%;
      height: calc(var(--design-height) * 1px);
      transform-origin: top left;
      will-change: transform;
    }

    /* World slides horizontally under the camera. */
    #world {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      will-change: transform;
    }

    .layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* Parallax layers sit behind room tiles. */
    .parallax-layer {
      will-change: transform;
    }

    .parallax-canvas {
      position: absolute;
      left: 200px;
      top: calc((var(--design-height) - var(--uw-canvas-height)) * 1px);
      width: calc(var(--uw-canvas-width) * 1px);
      height: calc(var(--uw-canvas-height) * 1px);
      object-fit: cover;
      pointer-events: none;
    }

    #parallax-uw1 {
      opacity: 0.9;
    }

    #parallax-uw2 {
      opacity: 0.85;
    }

    #parallax-uw3 {
      opacity: 0.88;
    }

    #parallax-uw4 {
      opacity: 0.95;
    }

    /* Tile image layer (exact 3840x2160 PNGs placed side-by-side). */
    #tile-layer {
      z-index: 20;
    }

    .tile {
      position: absolute;
      top: 0;
      width: calc(var(--tile-width) * 1px);
      height: calc(var(--design-height) * 1px);
      object-fit: fill;
      image-rendering: auto;
      pointer-events: none;
    }

    /* Hotspots use fixed absolute coordinates in design-space pixels. */
    #hotspot-layer {
      z-index: 30;
      pointer-events: none;
    }

    .hotspot {
      position: absolute;
      pointer-events: auto;
      border: 1px solid transparent;
      background: transparent;
      color: #9fe7ff;
    }

    .hotspot-label {
      position: absolute;
      top: 0;
      left: 0;
      transform: translateY(-100%);
      padding: 4px 8px;
      font-size: 18px;
      line-height: 1;
      white-space: nowrap;
      border-radius: 4px;
      border: 1px solid transparent;
      background: transparent;
      opacity: 0;
    }

    /* Placeholder screens for TV and desk monitors. */
    #screen-overlay-layer {
      z-index: 40;
    }

    .screen-overlay {
      position: absolute;
      background: transparent;
      border: 0;
      pointer-events: none;
    }

    /* Effects always on top. */
    #effects-layer {
      z-index: 50;
      background:
        radial-gradient(circle at center, rgba(0, 0, 0, 0) 55%, rgba(0, 0, 0, 0.38) 100%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, rgba(0, 0, 0, 0.07) 100%);
      mix-blend-mode: normal;
    }

    /* Debug mode (toggle with `~`). */
    body.debug .hotspot {
      border-color: rgba(65, 229, 255, 0.95);
      background: rgba(65, 229, 255, 0.12);
    }

    body.debug .hotspot-label {
      opacity: 1;
      border-color: rgba(65, 229, 255, 0.95);
      background: rgba(8, 20, 30, 0.9);
    }

    body.debug .screen-overlay {
      background: rgba(255, 90, 140, 0.24);
      box-shadow: inset 0 0 0 2px rgba(255, 90, 140, 0.75);
    }

    #debug-hint {
      position: fixed;
      right: 16px;
      bottom: 14px;
      z-index: 999;
      padding: 6px 9px;
      border-radius: 6px;
      font-size: 12px;
      letter-spacing: 0.04em;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.9);
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    #debug-hint.hidden {
      opacity: 0;
    }

    #debug-toggle-btn {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 1000;
      min-width: 44px;
      min-height: 44px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(0, 0, 0, 0.55);
      color: rgba(255, 255, 255, 0.9);
      font-size: 11px;
      letter-spacing: 0.05em;
      cursor: pointer;
    }

    #debug-toggle-btn:focus-visible {
      outline: 2px solid rgba(65, 229, 255, 0.95);
      outline-offset: 2px;
    }

    body.lite-rendering #stage,
    body.lite-rendering #world {
      will-change: auto;
    }

    body.lite-rendering .parallax-layer,
    body.lite-rendering #effects-layer {
      display: none;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* Debug-mode hotspot drag/resize editing */
    body.debug .hotspot {
      cursor: move;
    }

    .resize-handle {
      position: absolute;
      background: rgba(65, 229, 255, 0.9);
      border: 1px solid rgba(0, 0, 0, 0.5);
      border-radius: 2px;
      opacity: 0;
      pointer-events: none;
      touch-action: none;
      z-index: 2;
    }

    body.debug .resize-handle {
      opacity: 1;
      pointer-events: auto;
    }

    .resize-n, .resize-s {
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 10px;
    }

    .resize-e, .resize-w {
      top: 50%;
      transform: translateY(-50%);
      width: 10px;
      height: 24px;
    }

    .resize-ne, .resize-nw, .resize-se, .resize-sw {
      width: 14px;
      height: 14px;
    }

    .resize-n  { top: -5px;    cursor: n-resize; }
    .resize-s  { bottom: -5px; cursor: s-resize; }
    .resize-e  { right: -5px;  cursor: e-resize; }
    .resize-w  { left: -5px;   cursor: w-resize; }
    .resize-ne { top: -7px;    right: -7px;  cursor: ne-resize; }
    .resize-nw { top: -7px;    left: -7px;   cursor: nw-resize; }
    .resize-se { bottom: -7px; right: -7px;  cursor: se-resize; }
    .resize-sw { bottom: -7px; left: -7px;   cursor: sw-resize; }

    /* Save button (sits to the right of Debug button) */
    #save-hotspots-btn {
      position: fixed;
      left: 68px;
      bottom: 12px;
      z-index: 1000;
      min-width: 44px;
      min-height: 44px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(0, 0, 0, 0.55);
      color: rgba(255, 255, 255, 0.9);
      font-size: 11px;
      letter-spacing: 0.05em;
      cursor: pointer;
    }

    #save-hotspots-btn:focus-visible {
      outline: 2px solid rgba(65, 229, 255, 0.95);
      outline-offset: 2px;
    }

    /* Save output modal */
    #save-modal {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.75);
    }

    #save-modal.hidden {
      display: none;
    }

    #save-modal-inner {
      background: #0e1520;
      border: 1px solid rgba(65, 229, 255, 0.5);
      border-radius: 10px;
      padding: 20px;
      max-width: 90vw;
      width: 600px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #save-modal-title {
      font-size: 14px;
      font-weight: 600;
      color: rgba(65, 229, 255, 0.95);
      margin: 0;
    }

    #save-modal-textarea {
      flex: 1;
      min-height: 240px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      color: #cce8ff;
      font-family: "Courier New", monospace;
      font-size: 12px;
      padding: 10px;
      resize: vertical;
    }

    #save-modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .save-modal-btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 12px;
      cursor: pointer;
    }

    .save-modal-btn.primary {
      background: rgba(65, 229, 255, 0.2);
      border-color: rgba(65, 229, 255, 0.6);
      color: rgba(65, 229, 255, 1);
    }
  </style>
</head>
<body>
  <div id="viewport" aria-label="Den side-scrolling scene">
    <div id="stage">
      <div id="world">
        <div class="layer parallax-layer" id="parallax-uw1" aria-hidden="true">
          <img class="parallax-canvas" src="assets/images/uw1.png" alt="" />
        </div>
        <div class="layer parallax-layer" id="parallax-uw2" aria-hidden="true">
          <img class="parallax-canvas" src="assets/images/uw2.png" alt="" />
        </div>
        <div class="layer parallax-layer" id="parallax-uw3" aria-hidden="true">
          <img class="parallax-canvas" src="assets/images/uw3.png" alt="" />
        </div>
        <div class="layer parallax-layer" id="parallax-uw4" aria-hidden="true">
          <img class="parallax-canvas" src="assets/images/uw4.png" alt="" />
        </div>

        <div class="layer" id="tile-layer" aria-hidden="true"></div>
        <div class="layer" id="hotspot-layer" aria-label="Interactive hotspots"></div>
        <div class="layer" id="screen-overlay-layer" aria-hidden="true"></div>
        <div class="layer" id="effects-layer" aria-hidden="true"></div>
      </div>
    </div>
  </div>
  <button id="debug-toggle-btn" type="button" aria-label="Toggle debug mode">Debug</button>
  <button id="save-hotspots-btn" type="button" aria-label="Save hotspot positions">Save</button>
  <div id="save-modal" class="hidden" role="dialog" aria-modal="true" aria-labelledby="save-modal-title">
    <div id="save-modal-inner">
      <p id="save-modal-title">Hotspot positions saved — copy the code below to update source</p>
      <textarea id="save-modal-textarea" readonly spellcheck="false"></textarea>
      <div id="save-modal-actions">
        <button type="button" class="save-modal-btn primary" id="save-modal-copy-btn">Copy to clipboard</button>
        <button type="button" class="save-modal-btn" id="save-modal-close-btn">Close</button>
      </div>
    </div>
  </div>
  <div id="debug-hint" role="status" aria-live="polite">Press ~ (or Ctrl/Cmd+Shift+D) to toggle debug hotspots</div>
  <div id="debug-status" class="sr-only" role="status" aria-live="polite"></div>

  <script>
    (() => {
      const DESIGN_HEIGHT = 2160;
      const TILE_WIDTH = 3840;
      const SCENE_OFFSET_X = TILE_WIDTH;
      const DESK_CENTER_X = SCENE_OFFSET_X + 1920;
      const WHEEL_SCROLL_MULTIPLIER = 0.8;
      const LINE_SCROLL_PIXELS = 40;
      const DOM_DELTA_LINE = 1;
      const DOM_DELTA_PAGE = 2;
      const DRAG_START_THRESHOLD_PX = 8;
      const CAMERA_SMOOTHING_FACTOR = 0.22;
      const CAMERA_SETTLE_EPSILON = 0.05;
      const HOTSPOT_CLICK_SUPPRESSION_MS = 400;
      const HOTSPOT_STORAGE_KEY = 'den_hotspot_overrides';
      const MICROSOFT_WHITEBOARD_URL = 'https://whiteboard.cloud.microsoft/?lng=en-us&ref=oib-8ad27b9b-cce3-40c7-b658-b40c8163d34a';
      const WHITEBOARD_HOTSPOT_IDS = new Set(['rca-board', 'whiteboard']);

      // Add tiles here to extend the horizontal world.
      const tiles = [
        { src: 'assets/images/den_arcade.PNG' },
        { src: 'assets/images/den_computer.png' }
      ].map((tile, index) => ({
        ...tile,
        x: index * TILE_WIDTH,
        width: TILE_WIDTH,
        height: DESIGN_HEIGHT
      }));

      // Fixed pixel hotspots in design-space coordinates.
      // Edit x/y/w/h values as artwork alignment is refined.
      const hotspots = [
        { id: 'big-tv', x: 1140, y: 560, w: 940, h: 520 },
        { id: 'left-monitor', x: 1478, y: 1064, w: 310, h: 220 },
        { id: 'commodore-screen', x: 1840, y: 1040, w: 372, h: 246 },
        { id: 'right-monitor', x: 2284, y: 1026, w: 278, h: 216 },
        { id: 'aquarium', x: 2704, y: 720, w: 455, h: 420 },
        { id: 'rca-board', x: 3220, y: 260, w: 470, h: 1060 },
        { id: 'pencil-sharpener', x: 1682, y: 1338, w: 135, h: 150 },
        { id: 'date-tracker', x: 2484, y: 912, w: 200, h: 130 },
        { id: 'ashtray', x: 2055, y: 1336, w: 176, h: 128 }
      ].map((spot) => ({ ...spot, x: spot.x + SCENE_OFFSET_X }));

      // Overlay placeholders over transparent screen cutouts.
      const overlays = [
        { id: 'overlay-big-tv', x: 1148, y: 568, w: 924, h: 505 },
        { id: 'overlay-left-monitor', x: 1488, y: 1072, w: 292, h: 205 },
        { id: 'overlay-commodore-screen', x: 1852, y: 1050, w: 348, h: 227 },
        { id: 'overlay-right-monitor', x: 2292, y: 1036, w: 262, h: 198 }
      ].map((overlay) => ({ ...overlay, x: overlay.x + SCENE_OFFSET_X }));

      const viewport = document.getElementById('viewport');
      const stage = document.getElementById('stage');
      const world = document.getElementById('world');
      const tileLayer = document.getElementById('tile-layer');
      const hotspotLayer = document.getElementById('hotspot-layer');
      const screenOverlayLayer = document.getElementById('screen-overlay-layer');
      const debugStatus = document.getElementById('debug-status');
      const debugToggleButton = document.getElementById('debug-toggle-btn');
      const isIOSDevice =
        /iPad|iPhone|iPod/.test(window.navigator.userAgent) ||
        (window.navigator.platform === 'MacIntel' && window.navigator.maxTouchPoints > 1);
      const hasCoarsePointer = window.matchMedia('(pointer: coarse)').matches;
      const useLiteRendering = isIOSDevice || hasCoarsePointer;

      const parallaxLayers = [
        { el: document.getElementById('parallax-uw1'), speed: 0.1 },
        { el: document.getElementById('parallax-uw2'), speed: 0.25 },
        { el: document.getElementById('parallax-uw3'), speed: 0.55 },
        { el: document.getElementById('parallax-uw4'), speed: 0.9 }
      ];

      const worldWidth = tiles.length * TILE_WIDTH;
      const worldHeight = DESIGN_HEIGHT;

      let scale = 1;
      let visibleWidth = worldWidth;
      let maxCameraX = 0;
      let cameraX = 0;
      let targetCameraX = 0;
      let isDragging = false;
      let isPointerDown = false;
      let activePointerId = null;
      let pointerStartX = 0;
      let lastPointerX = 0;
      let hasInitializedCamera = false;
      let dragStartedOnHotspot = false;
      let suppressHotspotClickUntil = 0;
      let cameraAnimationFrameId = null;

      // Debug hotspot editing state
      let debugEditType = null; // 'move' | 'resize'
      let debugEditEl = null;
      let debugEditDir = null;
      let debugEditStartX = 0;
      let debugEditStartY = 0;
      let debugEditOrigRect = null; // { left, top, w, h } in design-space px

      // Load any previously saved hotspot overrides from localStorage.
      // Saved values are full design-space coordinates (including SCENE_OFFSET_X).
      let hotspotOverrides = {};
      try {
        const stored = localStorage.getItem(HOTSPOT_STORAGE_KEY);
        if (stored) {
          const arr = JSON.parse(stored);
          if (Array.isArray(arr)) arr.forEach((o) => { hotspotOverrides[o.id] = o; });
        }
      } catch (_) {}

      function clamp(value, min, max) {
        return Math.max(min, Math.min(value, max));
      }

      function createTiles() {
        tiles.forEach((tile) => {
          const img = document.createElement('img');
          img.className = 'tile';
          img.src = tile.src;
          img.alt = '';
          img.draggable = false;
          img.style.left = `${tile.x}px`;
          img.width = tile.width;
          img.height = tile.height;
          tileLayer.appendChild(img);
        });
      }

      function addResizeHandles(el) {
        ['n', 'ne', 'e', 'se', 's', 'sw', 'w', 'nw'].forEach((dir) => {
          const handle = document.createElement('div');
          handle.className = `resize-handle resize-${dir}`;
          handle.dataset.dir = dir;
          handle.setAttribute('aria-hidden', 'true');
          el.appendChild(handle);
        });
      }

      function updateHotspotLabel(el) {
        const label = el.querySelector('.hotspot-label');
        if (!label) return;
        const x = Math.round(parseFloat(el.style.left));
        const y = Math.round(parseFloat(el.style.top));
        const w = Math.round(parseFloat(el.style.width));
        const h = Math.round(parseFloat(el.style.height));
        label.textContent = `${el.id} (${x}, ${y}) ${w}×${h}`;
      }

      function createHotspots() {
        const toTitleCase = (value) =>
          value
            .split('-')
            .map((word) => word.charAt(0).toUpperCase() + word.slice(1))
            .join(' ');

        hotspots.forEach((spot) => {
          const override = hotspotOverrides[spot.id];
          const x = override ? override.x : spot.x;
          const y = override ? override.y : spot.y;
          const w = override ? override.w : spot.w;
          const h = override ? override.h : spot.h;

          const readableLabel = toTitleCase(spot.id);
          const el = document.createElement('button');
          el.type = 'button';
          el.className = 'hotspot';
          el.id = spot.id;
          el.style.left = `${x}px`;
          el.style.top = `${y}px`;
          el.style.width = `${w}px`;
          el.style.height = `${h}px`;
          el.setAttribute('aria-label', readableLabel);

          const label = document.createElement('span');
          label.className = 'hotspot-label';
          label.textContent = `${spot.id} (${x}, ${y}) ${w}×${h}`;
          el.appendChild(label);

          addResizeHandles(el);

          el.addEventListener('click', () => {
            console.log(`[hotspot] ${spot.id}`);
            if (WHITEBOARD_HOTSPOT_IDS.has(spot.id)) {
              window.location.assign(MICROSOFT_WHITEBOARD_URL);
            }
          });

          el.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' || event.key === ' ') {
              event.preventDefault();
              el.click();
            }
          });

          hotspotLayer.appendChild(el);
        });
      }

      function createOverlays() {
        overlays.forEach((overlay) => {
          const el = document.createElement('div');
          el.id = overlay.id;
          el.className = 'screen-overlay';
          el.style.left = `${overlay.x}px`;
          el.style.top = `${overlay.y}px`;
          el.style.width = `${overlay.w}px`;
          el.style.height = `${overlay.h}px`;
          screenOverlayLayer.appendChild(el);
        });
      }

      function applyTransforms() {
        world.style.transform = `translate3d(${-cameraX}px, 0, 0)`;

        if (!useLiteRendering) {
          parallaxLayers.forEach(({ el, speed }) => {
            el.style.transform = `translate3d(${cameraX * (1 - speed)}px, 0, 0)`;
          });
        }
      }

      function setCameraX(nextCameraX) {
        cameraX = clamp(nextCameraX, 0, maxCameraX);
        applyTransforms();
      }

      function setTargetCameraX(nextCameraX) {
        const nextTarget = clamp(nextCameraX, 0, maxCameraX);
        if (targetCameraX === nextTarget) return;
        targetCameraX = nextTarget;
        startCameraAnimation();
      }

      function startCameraAnimation() {
        if (cameraAnimationFrameId !== null) return;
        cameraAnimationFrameId = window.requestAnimationFrame(tickCamera);
      }

      function tickCamera() {
        cameraAnimationFrameId = null;
        const delta = targetCameraX - cameraX;
        if (Math.abs(delta) < CAMERA_SETTLE_EPSILON) {
          setCameraX(targetCameraX);
          return;
        }
        setCameraX(cameraX + delta * CAMERA_SMOOTHING_FACTOR);
        startCameraAnimation();
      }

      function resize() {
        scale = window.innerHeight / DESIGN_HEIGHT;
        visibleWidth = window.innerWidth / scale;
        maxCameraX = Math.max(0, worldWidth - visibleWidth);

        stage.style.width = `${worldWidth}px`;
        stage.style.transform = `scale(${scale}) translate3d(0, -50%, 0)`;
        world.style.width = `${worldWidth}px`;
        world.style.height = `${worldHeight}px`;

        // Start camera centered on the desk area in tile 0.
        if (!hasInitializedCamera) {
          setCameraX(DESK_CENTER_X - visibleWidth / 2);
          targetCameraX = cameraX;
          hasInitializedCamera = true;
        } else {
          setCameraX(cameraX);
          targetCameraX = cameraX;
        }
      }

      function onWheel(event) {
        event.preventDefault();
        let unitScale = 1;
        if (event.deltaMode === DOM_DELTA_LINE) {
          unitScale = LINE_SCROLL_PIXELS;
        } else if (event.deltaMode === DOM_DELTA_PAGE) {
          unitScale = window.innerHeight;
        }
        // Map both vertical wheel and horizontal trackpad movement into horizontal camera travel.
        const useHorizontalAxis = Math.abs(event.deltaX) > Math.abs(event.deltaY);
        const primaryAxisDelta = useHorizontalAxis ? event.deltaX : event.deltaY;
        setTargetCameraX(targetCameraX + primaryAxisDelta * unitScale * WHEEL_SCROLL_MULTIPLIER);
      }

      function startDebugEdit(event, el, type, dir) {
        activePointerId = event.pointerId;
        debugEditType = type;
        debugEditEl = el;
        debugEditDir = dir;
        debugEditStartX = event.clientX;
        debugEditStartY = event.clientY;
        debugEditOrigRect = {
          left: parseFloat(el.style.left),
          top: parseFloat(el.style.top),
          w: parseFloat(el.style.width),
          h: parseFloat(el.style.height)
        };
        viewport.setPointerCapture(event.pointerId);
      }

      function applyDebugEdit(event) {
        const dx = (event.clientX - debugEditStartX) / scale;
        const dy = (event.clientY - debugEditStartY) / scale;
        const { left, top, w, h } = debugEditOrigRect;
        const el = debugEditEl;
        const MIN_SIZE = 20;

        if (debugEditType === 'move') {
          el.style.left = `${left + dx}px`;
          el.style.top = `${top + dy}px`;
        } else {
          const dir = debugEditDir;
          let newLeft = left;
          let newTop = top;
          let newW = w;
          let newH = h;

          if (dir.includes('e')) newW = Math.max(MIN_SIZE, w + dx);
          if (dir.includes('w')) {
            const clampedW = Math.max(MIN_SIZE, w - dx);
            newLeft = left + (w - clampedW);
            newW = clampedW;
          }
          if (dir.includes('s')) newH = Math.max(MIN_SIZE, h + dy);
          if (dir.includes('n')) {
            const clampedH = Math.max(MIN_SIZE, h - dy);
            newTop = top + (h - clampedH);
            newH = clampedH;
          }

          el.style.left   = `${newLeft}px`;
          el.style.top    = `${newTop}px`;
          el.style.width  = `${newW}px`;
          el.style.height = `${newH}px`;
        }

        updateHotspotLabel(el);
      }

      function onPointerDown(event) {
        if (activePointerId !== null) return;

        // In debug mode, intercept drags on hotspots and resize handles.
        if (document.body.classList.contains('debug')) {
          const handle = event.target.closest('.resize-handle');
          if (handle) {
            const hotspotEl = handle.closest('.hotspot');
            if (hotspotEl) {
              startDebugEdit(event, hotspotEl, 'resize', handle.dataset.dir);
              return;
            }
          }
          const hotspotEl = event.target.closest('.hotspot');
          if (hotspotEl) {
            startDebugEdit(event, hotspotEl, 'move', null);
            return;
          }
        }

        isPointerDown = true;
        activePointerId = event.pointerId;
        pointerStartX = event.clientX;
        lastPointerX = event.clientX;
        dragStartedOnHotspot = Boolean(event.target.closest('.hotspot'));
        suppressHotspotClickUntil = 0;
      }

      function onPointerMove(event) {
        if (event.pointerId !== activePointerId) return;

        // Debug edit in progress — move or resize the hotspot.
        if (debugEditType !== null) {
          applyDebugEdit(event);
          return;
        }

        if (!isPointerDown) return;

        if (!isDragging) {
          const dragDistance = Math.abs(event.clientX - pointerStartX);
          if (dragDistance < DRAG_START_THRESHOLD_PX) {
            return;
          }
          isDragging = true;
          viewport.classList.add('dragging');
          viewport.setPointerCapture(event.pointerId);
          if (dragStartedOnHotspot) {
            suppressHotspotClickUntil = Date.now() + HOTSPOT_CLICK_SUPPRESSION_MS;
          }
        }

        event.preventDefault();
        const dx = event.clientX - lastPointerX;
        lastPointerX = event.clientX;

        // Convert screen drag delta to design-space world delta.
        setTargetCameraX(targetCameraX - dx / scale);
      }

      function onPointerUp(event) {
        if (event.pointerId !== activePointerId) return;

        // End a debug edit operation.
        if (debugEditType !== null) {
          suppressHotspotClickUntil = Date.now() + HOTSPOT_CLICK_SUPPRESSION_MS;
          debugEditType = null;
          debugEditEl = null;
          debugEditDir = null;
          debugEditOrigRect = null;
          activePointerId = null;
          if (viewport.hasPointerCapture(event.pointerId)) {
            viewport.releasePointerCapture(event.pointerId);
          }
          return;
        }

        isPointerDown = false;
        activePointerId = null;
        dragStartedOnHotspot = false;
        isDragging = false;
        viewport.classList.remove('dragging');
        if (viewport.hasPointerCapture(event.pointerId)) {
          viewport.releasePointerCapture(event.pointerId);
        }
      }

      function onKeyDown(event) {
        const debugComboPressed =
          event.code === 'KeyD' &&
          (event.ctrlKey || event.metaKey) &&
          event.shiftKey;

        if (event.code === 'Backquote' || debugComboPressed) {
          toggleDebugMode();
        }
      }

      function toggleDebugMode() {
        document.body.classList.toggle('debug');
        debugStatus.textContent = document.body.classList.contains('debug')
          ? 'Debug mode enabled'
          : 'Debug mode disabled';
      }

      function saveHotspots() {
        const saved = [];
        hotspotLayer.querySelectorAll('.hotspot').forEach((el) => {
          saved.push({
            id: el.id,
            x: Math.round(parseFloat(el.style.left)),
            y: Math.round(parseFloat(el.style.top)),
            w: Math.round(parseFloat(el.style.width)),
            h: Math.round(parseFloat(el.style.height))
          });
        });

        try {
          localStorage.setItem(HOTSPOT_STORAGE_KEY, JSON.stringify(saved));
        } catch (_) {}

        // Display values with SCENE_OFFSET_X subtracted so they can be pasted
        // directly back into the hotspots array in the source.
        const lines = saved.map((s) =>
          `  { id: ${JSON.stringify(s.id)}, x: ${s.x - SCENE_OFFSET_X}, y: ${s.y}, w: ${s.w}, h: ${s.h} },`
        );
        const output =
          `const hotspots = [\n${lines.join('\n')}\n` +
          `].map((spot) => ({ ...spot, x: spot.x + SCENE_OFFSET_X }));`;

        document.getElementById('save-modal-textarea').value = output;
        document.getElementById('save-modal').classList.remove('hidden');
      }

      function cleanup() {
        if (cameraAnimationFrameId !== null) {
          window.cancelAnimationFrame(cameraAnimationFrameId);
          cameraAnimationFrameId = null;
        }
      }

      createTiles();
      createHotspots();
      createOverlays();
      if (useLiteRendering) {
        document.body.classList.add('lite-rendering');
      }

      viewport.addEventListener('wheel', onWheel, { passive: false });
      viewport.addEventListener('pointerdown', onPointerDown);
      viewport.addEventListener('pointermove', onPointerMove);
      viewport.addEventListener('pointerup', onPointerUp);
      viewport.addEventListener('pointercancel', onPointerUp);
      hotspotLayer.addEventListener('click', (event) => {
        if (Date.now() < suppressHotspotClickUntil) {
          event.preventDefault();
          event.stopPropagation();
        }
      }, true);

      window.addEventListener('keydown', onKeyDown);
      window.addEventListener('resize', resize);
      window.addEventListener('beforeunload', cleanup, { once: true });
      debugToggleButton.addEventListener('click', toggleDebugMode);

      const saveBtn = document.getElementById('save-hotspots-btn');
      saveBtn.addEventListener('click', saveHotspots);

      document.getElementById('save-modal-close-btn').addEventListener('click', () => {
        document.getElementById('save-modal').classList.add('hidden');
      });

      document.getElementById('save-modal-copy-btn').addEventListener('click', (e) => {
        const textarea = document.getElementById('save-modal-textarea');
        const btn = e.currentTarget;
        const copy = () => {
          btn.textContent = 'Copied!';
          setTimeout(() => { btn.textContent = 'Copy to clipboard'; }, 2000);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(textarea.value).then(copy).catch(() => {
            textarea.select();
            if (document.execCommand('copy')) copy();
          });
        } else {
          textarea.select();
          if (document.execCommand('copy')) copy();
        }
      });

      // Close save modal on backdrop click
      document.getElementById('save-modal').addEventListener('click', (event) => {
        if (event.target === event.currentTarget) {
          event.currentTarget.classList.add('hidden');
        }
      });

      setTimeout(() => document.getElementById('debug-hint').classList.add('hidden'), 5500);

      resize();
    })();
  </script>
</body>
</html>
