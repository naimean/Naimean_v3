<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Den Scene</title>
  <style>
    :root {
      --design-height: 2160;
      --tile-width: 3840;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      touch-action: none;
      user-select: none;
    }

    /* Viewport is the camera frame shown on screen. */
    #viewport {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      isolation: isolate;
      cursor: grab;
    }

    #viewport.dragging {
      cursor: grabbing;
    }

    /* Stage keeps all scene layers in the fixed 3840x2160 coordinate world space. */
    #stage {
      position: absolute;
      left: 0;
      top: 50%;
      height: calc(var(--design-height) * 1px);
      transform-origin: top left;
      will-change: transform;
    }

    /* World slides horizontally under the camera. */
    #world {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: #000;
      will-change: transform;
    }

    .layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    #scene-layer {
      z-index: 3;
    }

    .scene-tile {
      position: absolute;
      top: 0;
      width: calc(var(--tile-width) * 1px);
      height: calc(var(--design-height) * 1px);
      object-fit: cover;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* Hotspots use fixed absolute coordinates in design-space pixels. */
    #hotspot-layer {
      z-index: 30;
      pointer-events: none;
    }

    .hotspot {
      position: absolute;
      pointer-events: auto;
      border: 1px solid transparent;
      background: transparent;
      color: #9fe7ff;
    }

    .hotspot-label {
      position: absolute;
      top: 0;
      left: 0;
      transform: translateY(-100%);
      padding: 4px 8px;
      font-size: 24px;
      line-height: 1;
      white-space: nowrap;
      border-radius: 4px;
      border: 1px solid transparent;
      background: transparent;
      opacity: 0;
    }

    @media (pointer: coarse), (max-width: 900px) {
      .hotspot-label {
        padding: 8px 12px;
        font-size: 36px;
      }
    }

    /* Placeholder screens for TV and desk monitors. */
    #screen-overlay-layer {
      z-index: 4;
    }

    .screen-overlay {
      position: absolute;
      background: transparent;
      border: 0;
      pointer-events: none;
    }

    .screen-overlay.discord-widget-overlay {
      position: absolute;
      overflow: hidden;
      border-radius: 6px;
      pointer-events: auto;
      z-index: 0;
      background:
        radial-gradient(ellipse at 50% 42%, rgba(88, 101, 242, 0.2) 0%, rgba(25, 31, 60, 0.92) 100%),
        #0f1224;
      box-shadow:
        0 18px 36px -14px rgba(0, 0, 0, 0.72),
        0 2px 8px rgba(0, 0, 0, 0.55),
        -16px -6px 28px -24px rgba(255, 192, 128, 0.4),
        18px -10px 34px -26px rgba(112, 162, 255, 0.38),
        inset 0 -180px 180px -150px rgba(0, 0, 0, 0.78),
        inset -40px 0 56px -48px rgba(0, 0, 0, 0.52),
        inset 42px 0 56px -48px rgba(0, 0, 0, 0.46),
        inset 0 1px 0 rgba(210, 224, 255, 0.16),
        inset 0 0 0 1px rgba(84, 93, 126, 0.46);
    }

    .screen-overlay.discord-widget-overlay::before,
    .screen-overlay.discord-widget-overlay::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .screen-overlay.discord-widget-overlay::before {
      background:
        radial-gradient(78% 42% at 16% 12%, rgba(255, 230, 196, 0.22) 0%, rgba(255, 230, 196, 0) 68%),
        radial-gradient(84% 54% at 88% 16%, rgba(184, 216, 255, 0.22) 0%, rgba(184, 216, 255, 0) 70%),
        radial-gradient(130% 46% at 50% 0%, rgba(241, 247, 255, 0.26) 0%, rgba(241, 247, 255, 0.08) 24%, rgba(241, 247, 255, 0) 58%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0) 30%);
      mix-blend-mode: screen;
      opacity: 0.82;
    }

    .screen-overlay.discord-widget-overlay::after {
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.32) 0%, rgba(0, 0, 0, 0) 16%, rgba(0, 0, 0, 0) 84%, rgba(0, 0, 0, 0.36) 100%),
        radial-gradient(160% 118% at 50% 56%, rgba(0, 0, 0, 0) 48%, rgba(0, 0, 0, 0.48) 100%);
      opacity: 0.86;
    }

    .screen-overlay.aquarium-video-overlay {
      overflow: hidden;
      border-radius: 6px;
      pointer-events: none;
      z-index: 2;
      opacity: 0;
      visibility: hidden;
      background: #040506;
      transition: opacity 120ms ease, visibility 0s linear 120ms;
    }

    .screen-overlay.aquarium-video-overlay.is-active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition-delay: 0s;
    }

    .screen-overlay.commodore-desk-overlay {
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }

    .screen-overlay.join-discord-overlay,
    .screen-overlay.calendar-monitor-overlay {
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      z-index: 1;
      background:
        radial-gradient(ellipse at 50% 38%, rgba(246, 251, 255, 0.98) 0%, rgba(194, 224, 255, 0.9) 42%, rgba(80, 129, 198, 0.92) 76%, rgba(18, 41, 90, 0.96) 100%),
        linear-gradient(180deg, #cae5ff 0%, #4f79c1 65%, #1a3c7b 100%);
      box-shadow:
        inset 0 0 0 1px rgba(214, 234, 255, 0.42),
        inset 0 -18px 30px rgba(4, 14, 40, 0.5);
    }

    #overlay-left-monitor,
    #overlay-commodore-screen,
    #overlay-right-monitor {
      z-index: 1;
    }

    .commodore-desk-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .commodore-power-button-overlay {
      overflow: visible;
      z-index: 2;
    }

    .commodore-power-button-button {
      width: 100%;
      height: 100%;
      padding: 0;
      border: 1px solid rgba(110, 78, 43, 0.55);
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(126, 96, 63, 0.96) 0%, rgba(77, 51, 28, 0.96) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255, 233, 192, 0.34),
        inset 0 -2px 3px rgba(0, 0, 0, 0.42),
        0 2px 6px rgba(0, 0, 0, 0.32);
      cursor: pointer;
      pointer-events: auto;
      position: relative;
      overflow: hidden;
    }

    .commodore-power-button-button::before {
      content: '';
      position: absolute;
      inset: 17% 13%;
      border-radius: 999px;
      background:
        radial-gradient(circle at 30% 28%, rgba(255, 245, 214, 0.9) 0%, rgba(255, 245, 214, 0) 26%),
        radial-gradient(circle at center, rgba(255, 194, 106, 0.98) 0%, rgba(241, 112, 45, 0.95) 48%, rgba(139, 19, 12, 0.7) 74%, rgba(139, 19, 12, 0) 100%);
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.25),
        inset 0 -1px 1px rgba(0, 0, 0, 0.45),
        0 0 10px 2px rgba(255, 116, 29, 0.7),
        0 0 16px 4px rgba(255, 102, 0, 0.28);
      animation: commodore-power-pulse 1.6s ease-in-out infinite;
    }

    .commodore-power-button-button::after {
      content: '';
      position: absolute;
      inset: 31% 35%;
      border-radius: 999px;
      background:
        radial-gradient(circle at 35% 28%, rgba(228, 255, 232, 0.95) 0%, rgba(228, 255, 232, 0) 35%),
        linear-gradient(180deg, #96ff9a 0%, #2ce45c 55%, #0d6817 100%);
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.28),
        inset 0 -1px 1px rgba(0, 0, 0, 0.35),
        0 0 7px 1px rgba(74, 255, 118, 0.55);
      pointer-events: none;
    }

    @keyframes commodore-power-pulse {
      0% {
        box-shadow:
          inset 0 1px 1px rgba(255, 255, 255, 0.25),
          inset 0 -1px 1px rgba(0, 0, 0, 0.45),
          0 0 11px 2px rgba(255, 122, 33, 0.8),
          0 0 18px 5px rgba(255, 102, 0, 0.26);
        filter: brightness(1);
      }
      50% {
        box-shadow:
          inset 0 1px 1px rgba(255, 255, 255, 0.25),
          inset 0 -1px 1px rgba(0, 0, 0, 0.45),
          0 0 12px 3px rgba(255, 140, 48, 0.92),
          0 0 21px 6px rgba(255, 102, 0, 0.34);
        filter: brightness(1.12);
      }
    }

    body.debug .commodore-power-button-button {
      pointer-events: none;
    }

    .join-discord-button {
      width: 100%;
      height: 100%;
      padding: 0;
      border: 0;
      border-radius: 20px;
      background: transparent;
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.38);
      cursor: pointer;
      overflow: hidden;
    }

    .join-discord-button:focus-visible {
      outline: 4px solid rgba(255, 255, 255, 0.9);
      outline-offset: 4px;
    }

    .join-discord-button-image {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .overlay-static-layer {
      position: absolute;
      inset: 0;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      z-index: 3;
      background: #040506;
      transition: opacity 120ms ease;
    }

    .overlay-static-layer.is-active {
      opacity: 1;
      visibility: visible;
    }

    .overlay-static-video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      background: #040506;
    }

    .big-tv-prompt-overlay {
      position: absolute;
      inset: 0;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      z-index: 3;
      background:
        radial-gradient(120% 90% at 50% 50%, rgba(0, 24, 0, 0.7) 0%, rgba(0, 7, 0, 0.96) 100%),
        #001103;
      color: #4dff91;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding: clamp(10px, 3.5%, 24px);
      box-sizing: border-box;
      font: 700 clamp(22px, calc(5.5% + 10px), 46px) / 1.25 'Courier New', monospace;
      text-shadow: 0 0 8px rgba(77, 255, 145, 0.65);
      transition: opacity 120ms ease;
    }

    .big-tv-prompt-overlay.is-active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .big-tv-prompt-content {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.36em;
    }

    .big-tv-prompt-secret {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .big-tv-prompt-line {
      display: flex;
      align-items: baseline;
      gap: 0.08em;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .big-tv-prompt-caret {
      animation: prompt-caret-blink 1s steps(1, end) infinite;
    }

    .big-tv-prompt-submit {
      margin-top: 0.2em;
      border: 1px solid rgba(77, 255, 145, 0.85);
      background: rgba(4, 22, 7, 0.72);
      color: #4dff91;
      font: inherit;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.2em 0.55em;
      cursor: pointer;
    }

    .big-tv-prompt-submit:hover {
      background: rgba(10, 40, 14, 0.9);
    }

    .big-tv-prompt-submit:focus-visible {
      outline: 2px solid rgba(139, 255, 177, 0.95);
      outline-offset: 2px;
    }

    @keyframes prompt-caret-blink {
      0%, 45% {
        opacity: 1;
      }
      46%, 100% {
        opacity: 0;
      }
    }

    .left-monitor-selector {
      position: absolute;
      inset: 0;
      display: flex;
      z-index: 2;
    }

    .left-monitor-segment {
      flex: 1 1 20%;
      border: 0;
      margin: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
      border-left: 1px solid rgba(216, 236, 255, 0.35);
    }

    .left-monitor-segment:first-child {
      border-left: 0;
    }

    .left-monitor-segment:hover,
    .left-monitor-segment.is-selected {
      background: rgba(255, 255, 255, 0.14);
    }

    .left-monitor-segment:focus-visible {
      outline: 2px solid rgba(65, 229, 255, 0.95);
      outline-offset: -2px;
    }

    .left-monitor-state-image {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      background: #0a2f67;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
      position: relative;
      z-index: 1;
    }

    .discord-widget-frame {
      width: 100%;
      height: calc(178% - 10px);
      border: 0;
      display: block;
      pointer-events: auto;
      position: relative;
      z-index: 1;
      transform: scale(2);
      transform-origin: top left;
    }

    .discord-static-overlay {
      position: absolute;
      inset: 0;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      z-index: 2;
      background: #040506;
      transition: opacity 120ms ease;
    }

    .discord-static-overlay.is-active {
      opacity: 1;
      visibility: visible;
    }

    .discord-static-video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      background: #040506;
    }

    .nedry-gate-overlay {
      position: absolute;
      inset: 0;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      z-index: 3;
      background: #040506;
      transition: opacity 120ms ease;
    }

    .nedry-gate-overlay.is-active {
      opacity: 1;
      visibility: visible;
    }

    .nedry-gate-video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      background: #040506;
    }

    /* Effects always on top. */
    #effects-layer {
      z-index: 50;
      background: transparent;
      mix-blend-mode: normal;
    }

    /* ── Retro Desk Clock Overlay ──────────────────────────── */
    .flip-clock-overlay {
      --fc-scale: 0.72;
      --fc-card-height: calc(56px * var(--fc-scale));
      --fc-digit-width: calc(38px * var(--fc-scale));
      --fc-digit-font-size: calc(64px * var(--fc-scale));
      position: relative;
      display: flex;
      flex-direction: column;
      gap: calc(6px * var(--fc-scale));
      padding: calc(8px * var(--fc-scale)) calc(9px * var(--fc-scale)) calc(9px * var(--fc-scale));
      background:
        linear-gradient(180deg, rgba(222, 171, 124, 0.16) 0%, rgba(222, 171, 124, 0) 22%),
        linear-gradient(180deg, #8d6542 0%, #6f4b31 42%, #4f3423 100%);
      border-radius: calc(11px * var(--fc-scale));
      border: max(1px, calc(1px * var(--fc-scale))) solid rgba(228, 182, 140, 0.24);
      box-shadow:
        0 calc(10px * var(--fc-scale)) calc(18px * var(--fc-scale)) rgba(0, 0, 0, 0.5),
        inset 0 calc(1px * var(--fc-scale)) 0 rgba(240, 216, 191, 0.2),
        inset 0 calc(-3px * var(--fc-scale)) 0 rgba(47, 28, 17, 0.62);
      pointer-events: auto;
      overflow: hidden;
    }

    .flip-clock-overlay::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow:
        inset calc(2px * var(--fc-scale)) 0 0 rgba(255, 245, 231, 0.12),
        inset calc(-2px * var(--fc-scale)) 0 0 rgba(53, 34, 21, 0.24);
      pointer-events: none;
    }

    .rc-top {
      display: flex;
      align-items: center;
      gap: calc(10px * var(--fc-scale));
      min-height: calc(18px * var(--fc-scale));
      padding: 0 calc(1px * var(--fc-scale));
    }

    .rc-speaker {
      flex: 1;
      min-height: calc(11px * var(--fc-scale));
      border-radius: calc(999px * var(--fc-scale));
      background:
        radial-gradient(circle, rgba(255, 240, 220, 0.46) 0 calc(0.9px * var(--fc-scale)), transparent calc(1.1px * var(--fc-scale))),
        linear-gradient(180deg, rgba(72, 46, 28, 0.3) 0%, rgba(248, 224, 194, 0.1) 100%);
      background-size: calc(6px * var(--fc-scale)) calc(6px * var(--fc-scale)), auto;
      border: max(1px, calc(1px * var(--fc-scale))) solid rgba(87, 57, 35, 0.35);
      box-shadow: inset 0 calc(1px * var(--fc-scale)) 0 rgba(255, 244, 232, 0.18);
      opacity: 0.96;
    }

    .rc-knob {
      position: relative;
      flex: 0 0 auto;
      width: calc(11px * var(--fc-scale));
      height: calc(11px * var(--fc-scale));
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.14) 0 12%, transparent 13% 100%),
        linear-gradient(180deg, #504640 0%, #181716 100%);
      box-shadow:
        inset 0 calc(1px * var(--fc-scale)) 0 rgba(255, 255, 255, 0.12),
        0 calc(1px * var(--fc-scale)) calc(2px * var(--fc-scale)) rgba(0, 0, 0, 0.28);
    }

    .rc-knob::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: calc(2px * var(--fc-scale));
      height: calc(2px * var(--fc-scale));
      background: rgba(240, 230, 220, 0.58);
      border-radius: 999px;
      transform: translate(-50%, -50%);
    }

    .rc-knob-label {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .rc-face {
      position: relative;
      display: flex;
      align-items: stretch;
      flex: 1;
      gap: calc(8px * var(--fc-scale));
      padding: calc(8px * var(--fc-scale)) calc(9px * var(--fc-scale)) calc(7px * var(--fc-scale));
      border-radius: calc(7px * var(--fc-scale));
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0) 16%),
        linear-gradient(180deg, #1f2022 0%, #08090a 100%);
      border: max(1px, calc(1px * var(--fc-scale))) solid rgba(228, 231, 230, 0.48);
      box-shadow:
        inset 0 0 0 calc(1px * var(--fc-scale)) rgba(7, 8, 9, 0.92),
        inset 0 calc(1px * var(--fc-scale)) 0 rgba(255, 255, 255, 0.06);
      overflow: hidden;
    }

    .rc-face::after {
      content: '';
      position: absolute;
      inset: calc(2px * var(--fc-scale));
      border-radius: calc(5px * var(--fc-scale));
      border: max(1px, calc(1px * var(--fc-scale))) solid rgba(255, 255, 255, 0.08);
      pointer-events: none;
    }

    .rc-zone {
      position: relative;
      border: 0;
      background: transparent;
      color: inherit;
      padding: 0;
      margin: 0;
      border-radius: calc(8px * var(--fc-scale));
      cursor: pointer;
      transition: background 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .rc-zone:hover { background: rgba(255, 255, 255, 0.04); }
    .rc-zone:active { background: rgba(255, 255, 255, 0.08); }
    .rc-zone:focus-visible {
      outline: max(1px, calc(2px * var(--fc-scale))) solid rgba(255, 255, 255, 0.5);
      outline-offset: calc(2px * var(--fc-scale));
    }

    .rc-clock-zone {
      flex: 0 0 46%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-left: calc(4px * var(--fc-scale));
      min-width: 0;
    }

    .rc-ampm {
      margin-bottom: calc(1px * var(--fc-scale));
      padding-left: calc(4px * var(--fc-scale));
      font-size: calc(8px * var(--fc-scale));
      font-weight: 700;
      letter-spacing: 0.18em;
      color: rgba(205, 208, 210, 0.82);
      text-transform: uppercase;
      user-select: none;
      pointer-events: none;
    }

    .fc-digits {
      display: flex;
      align-items: center;
      gap: calc(4px * var(--fc-scale));
    }

    .rc-time-gap {
      position: relative;
      width: calc(10px * var(--fc-scale));
      flex: 0 0 auto;
    }

    .rc-time-gap::before,
    .rc-time-gap::after {
      content: '';
      position: absolute;
      left: 50%;
      width: calc(2px * var(--fc-scale));
      height: calc(2px * var(--fc-scale));
      border-radius: 999px;
      background: rgba(241, 244, 246, 0.85);
      transform: translateX(-50%);
      box-shadow: 0 0 calc(2px * var(--fc-scale)) rgba(255, 255, 255, 0.18);
    }

    .rc-time-gap::before { top: 35%; }
    .rc-time-gap::after { top: 62%; }

    .fc-digit {
      position: relative;
      width: var(--fc-digit-width);
      height: var(--fc-card-height);
      overflow: hidden;
      background: transparent;
      border: 0;
      border-radius: calc(2px * var(--fc-scale));
      box-shadow: none;
      pointer-events: none;
    }

    .fc-digit .fc-top,
    .fc-digit .fc-bot {
      position: absolute;
      left: 0;
      right: 0;
      height: 50%;
      overflow: hidden;
      background: transparent;
    }

    .fc-digit .fc-top {
      top: 0;
      border-bottom: max(1px, calc(1px * var(--fc-scale))) solid rgba(255, 255, 255, 0.09);
    }

    .fc-digit .fc-bot {
      bottom: 0;
    }

    .fc-digit .fc-num {
      position: absolute;
      left: 0;
      right: 0;
      height: var(--fc-card-height);
      line-height: var(--fc-card-height);
      text-align: center;
      font-size: var(--fc-digit-font-size);
      font-weight: 900;
      font-family: "Arial Black", Arial, Helvetica, sans-serif;

      function waitForMediaPlaybackToEnd(mediaEl) {
        return new Promise((resolve) => {
          const onEnded = () => {
            cleanup();
            resolve(true);
          };
          const onError = () => {
            cleanup();
            resolve(false);
          };
          const onPause = () => {
            if (mediaEl.ended) {
              return;
            }
            cleanup();
            resolve(false);
          };
          const cleanup = () => {
            mediaEl.removeEventListener('ended', onEnded);
            mediaEl.removeEventListener('error', onError);
            mediaEl.removeEventListener('pause', onPause);
          };
          mediaEl.addEventListener('ended', onEnded);
          mediaEl.addEventListener('error', onError);
          mediaEl.addEventListener('pause', onPause);
        });
      }

      function handleBigTvPromptTyping(event) {
        if (!isBigTvPromptActive) {
          return;

        if (event.metaKey || event.ctrlKey || event.altKey) {
          return;
        }
        if (event.key === 'Escape') {
          hideBigTvPromptOverlay();
          return;
        }
        if (event.key === 'Backspace') {
          event.preventDefault();
          bigTvPromptInputValue = bigTvPromptInputValue.slice(0, -1);
          updateBigTvPromptInput();
          return;
        }
        if (event.key === 'Enter') {
          event.preventDefault();
          submitBigTvPrompt();
          return;
        }
        if (event.key.length === 1) {
          event.preventDefault();
          bigTvPromptInputValue += event.key;
          updateBigTvPromptInput();
        }
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(value, max));
      }

      function isFiniteNumber(value) {
        return typeof value === 'number' && Number.isFinite(value);
      }

      function sourceHotspotsToRuntime(sourceHotspots) {
        return sourceHotspots.map((spot) => ({
          ...spot,
          x: sourceHotspotXToRuntime(spot.id, spot.x)
        }));
      }

      function runtimeHotspotsToSource(runtimeHotspots) {
        return runtimeHotspots.map((spot) => ({
          id: spot.id,
          x: runtimeHotspotXToSource(spot.id, spot.x),
          y: spot.y,
          w: spot.w,
          h: spot.h
        }));
      }

      function sanitizeSourceHotspots(input) {
        if (!Array.isArray(input)) return null;
        const entriesById = new Map();
        input.forEach((entry) => {
          if (!entry || typeof entry !== 'object' || typeof entry.id !== 'string') return;
          entriesById.set(entry.id, entry);
        });

        return defaultHotspots.map((fallback) => {
          const entry = entriesById.get(fallback.id);
          if (!entry) return { ...fallback };
          return {
            id: fallback.id,
            x: isFiniteNumber(entry.x) ? Math.round(entry.x) : fallback.x,
            y: isFiniteNumber(entry.y) ? Math.round(entry.y) : fallback.y,
            w: isFiniteNumber(entry.w) ? Math.max(20, Math.round(entry.w)) : fallback.w,
            h: isFiniteNumber(entry.h) ? Math.max(20, Math.round(entry.h)) : fallback.h
          };
        });
      }

      function getSavedHotspotsFromDom() {
        const saved = [];
        hotspotLayer.querySelectorAll('.hotspot').forEach((el) => {
          saved.push({
            id: el.id,
            x: Math.round(parseFloat(el.style.left)),
            y: Math.round(parseFloat(el.style.top)),
            w: Math.round(parseFloat(el.style.width)),
            h: Math.round(parseFloat(el.style.height))
          });
        });
        return saved;
      }

      function getRuntimeHotspotById(id) {
        return hotspots.find((spot) => spot.id === id) || null;
      }

      function rectFromBounds(bounds) {
        return {
          x: bounds.x,
          y: bounds.y,
          w: bounds.w,
          h: bounds.h
        };
      }

      function getOverlayRect(overlayId) {
        let controlHotspotId = OVERLAY_ID_TO_CONTROL_ID.get(overlayId);
        if (!controlHotspotId && overlayId === AQUARIUM_OVERLAY_ID) {
          controlHotspotId = DISCORD_OVERLAY_CONTROL_ID;
        }
        if (controlHotspotId) {
          const controlledSpot = getRuntimeHotspotById(controlHotspotId);
          if (controlledSpot) {
            return rectFromBounds(controlledSpot);
          }
        }

        const fallback = overlayDefaults.find((overlay) => overlay.id === overlayId);
        if (!fallback) return null;
        return rectFromBounds(fallback);
      }

      function syncControlledOverlaysFromHotspots() {
        OVERLAY_CONTROL_TO_OVERLAY_ID.forEach((overlayId, controlHotspotId) => {
          const hotspotEl = document.getElementById(controlHotspotId);
          const overlayEl = overlayElementsById.get(overlayId);
          if (!hotspotEl || !overlayEl) return;
          overlayEl.style.left = hotspotEl.style.left;
          overlayEl.style.top = hotspotEl.style.top;
          overlayEl.style.width = hotspotEl.style.width;
          overlayEl.style.height = hotspotEl.style.height;
        });
        const discordOverlayEl = overlayElementsById.get(DISCORD_OVERLAY_ID);
        const aquariumOverlayEl = overlayElementsById.get(AQUARIUM_OVERLAY_ID);
        if (discordOverlayEl && aquariumOverlayEl) {
          aquariumOverlayEl.style.left = discordOverlayEl.style.left;
          aquariumOverlayEl.style.top = discordOverlayEl.style.top;
          aquariumOverlayEl.style.width = discordOverlayEl.style.width;
          aquariumOverlayEl.style.height = discordOverlayEl.style.height;
        }

      function getSourceOutput(sourceHotspots) {
        const lines = sourceHotspots.map((spot) =>
          `  { id: ${JSON.stringify(spot.id)}, x: ${spot.x}, y: ${spot.y}, w: ${spot.w}, h: ${spot.h} },`
        );
        return (
          `const hotspots = [\n${lines.join('\n')}\n` +
          `].map((spot) => ({ ...spot, x: spot.x + SCENE_OFFSET_X }));`
        );
      }

      function persistSaveResultFlash(message) {
        try {

      function consumeSaveResultFlash() {
        try {
          const flash = sessionStorage.getItem(SAVE_RESULT_FLASH_KEY);
          if (!flash) return '';
          sessionStorage.removeItem(SAVE_RESULT_FLASH_KEY);
          return flash;
        } catch (_) {
          return '';

      }

      function shouldUseLegacyDataApi(status) {
        return status === 404;
      }

      function extractSourceHotspotsFromLegacyRows(rows) {
        if (!Array.isArray(rows)) return null;
        for (const row of rows) {
          if (!row || row.title !== LEGACY_HOTSPOT_RECORD_TITLE) continue;
          let parsed = null;
          if (typeof row.content === 'string') {
            try {
              parsed = JSON.parse(row.content);
            } catch (_) {}
          } else if (Array.isArray(row.content)) {
            parsed = row.content;
          }
          const sanitized = sanitizeSourceHotspots(parsed);
          if (sanitized) return sanitized;
        }
        return null;
      }

      async function loadHotspotsFromLegacyServer() {
        try {
          const response = await fetch(LEGACY_HOTSPOT_API_PATH, { cache: 'no-store' });
          if (!response.ok) return null;
          const payload = await response.json();
          const sanitized = extractSourceHotspotsFromLegacyRows(payload);
          return sanitized ? sourceHotspotsToRuntime(sanitized) : null;
        } catch (_) {
          return null;
        }
      }

      async function loadHotspotsFromServer() {
        if (hotspotApiMode === 'legacy') {
          return loadHotspotsFromLegacyServer();
        }

        try {
          const response = await fetch(HOTSPOT_API_PATH, { cache: 'no-store' });
          if (!response.ok) {
            if (shouldUseLegacyDataApi(response.status)) {
              hotspotApiMode = 'legacy';
              return loadHotspotsFromLegacyServer();
            }
            return null;
          }
          const payload = await response.json();
          const sanitized = sanitizeSourceHotspots(payload?.hotspots);
          return sanitized ? sourceHotspotsToRuntime(sanitized) : null;
        } catch (_) {
          return null;
        }
      }

      function wait(ms) {
        return new Promise((resolve) => {
          window.setTimeout(resolve, ms);
        });
      }

      async function readResponseErrorText(response) {
        try {
          const payload = await response.clone().json();
          if (payload && typeof payload.error === 'string' && payload.error.trim()) {
            return payload.error.trim();
          }
        } catch (_) {}

        try {
          const text = await response.text();
          if (text && text.trim()) return text.trim();
        } catch (_) {}

        return '';
      }

      async function postHotspotsToLegacyServer(savedSourceHotspots) {
        let lastError = null;
        for (let attempt = 1; attempt <= SAVE_RETRY_ATTEMPTS; attempt += 1) {
          try {
            const response = await fetch(LEGACY_HOTSPOT_API_PATH, {
              method: 'POST',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify({
                title: LEGACY_HOTSPOT_RECORD_TITLE,
                content: JSON.stringify(savedSourceHotspots)
              }),
              cache: 'no-store'
            });

            if (!response.ok) {
              const errorDetails = await readResponseErrorText(response);
              throw new Error(
                errorDetails
                  ? `Server save failed (${response.status}): ${errorDetails}`
                  : `Server save failed (${response.status})`
              );
            }

            return;
          } catch (error) {
            lastError = error;
            if (attempt < SAVE_RETRY_ATTEMPTS) {
              await wait(SAVE_RETRY_DELAY_MS * (2 ** (attempt - 1)));
            }
          }
        }

        throw lastError || new Error('Server save failed');
      }

      async function postHotspotsToServer(savedSourceHotspots) {
        if (hotspotApiMode === 'legacy') {
          await postHotspotsToLegacyServer(savedSourceHotspots);
          return;
        }

        let lastError = null;

        for (let attempt = 1; attempt <= SAVE_RETRY_ATTEMPTS; attempt += 1) {
          try {
            const response = await fetch(HOTSPOT_API_PATH, {
              method: 'POST',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify({ hotspots: savedSourceHotspots }),
              cache: 'no-store'
            });

            if (!response.ok) {
              if (shouldUseLegacyDataApi(response.status)) {
                hotspotApiMode = 'legacy';
                await postHotspotsToLegacyServer(savedSourceHotspots);
                return;
              }
              const errorDetails = await readResponseErrorText(response);
              throw new Error(
                errorDetails
                  ? `Server save failed (${response.status}): ${errorDetails}`
                  : `Server save failed (${response.status})`
              );
            }

            return;
          } catch (error) {
            lastError = error;
            if (attempt < SAVE_RETRY_ATTEMPTS) {
              await wait(SAVE_RETRY_DELAY_MS * (2 ** (attempt - 1)));
            }
          }
        }

        throw lastError || new Error('Server save failed');
      }

      function createFlipCard(isMonth) {
        const el = document.createElement('div');
        el.className = isMonth ? 'fc-month' : 'fc-digit';
        el.dataset.val = '';

        const top = document.createElement('div');
        top.className = 'fc-top';
        const topNum = document.createElement('span');
        topNum.className = 'fc-num';
        top.appendChild(topNum);

        const bot = document.createElement('div');
        bot.className = 'fc-bot';
        const botNum = document.createElement('span');
        botNum.className = 'fc-num';
        bot.appendChild(botNum);

        el.appendChild(top);
        el.appendChild(bot);
        return el;
      }

      function setFlipCard(el, newVal, animate) {
        const oldVal = el.dataset.val;
        if (oldVal === newVal) return;

        const topNum = el.querySelector('.fc-top .fc-num');
        const botNum = el.querySelector('.fc-bot .fc-num');

        if (!animate || oldVal === '') {
          topNum.textContent = newVal;
          botNum.textContent = newVal;
          el.dataset.val = newVal;
          return;
        }

        // Show new bottom value immediately (hidden behind flap during phase 1)
        botNum.textContent = newVal;

        // Phase 1: old top folds away
        const flap1 = document.createElement('div');
        flap1.className = 'fc-flap fc-flap-p1';
        const flap1Num = document.createElement('span');
        flap1Num.className = 'fc-num';
        flap1Num.textContent = oldVal;
        flap1.appendChild(flap1Num);
        el.appendChild(flap1);

        flap1.addEventListener('animationend', () => {
          flap1.remove();
          topNum.textContent = newVal;

          // Phase 2: new top unfolds in
          const flap2 = document.createElement('div');
          flap2.className = 'fc-flap fc-flap-p2';
          const flap2Num = document.createElement('span');
          flap2Num.className = 'fc-num';
          flap2Num.textContent = newVal;
          flap2.appendChild(flap2Num);
          el.appendChild(flap2);

          flap2.addEventListener('animationend', () => {
            flap2.remove();
          }, { once: true });
        }, { once: true });

        el.dataset.val = newVal;
      }

      function applyRadioTuningPosition(scaleBlock, value) {
        const clamped = clamp(value, 0, 1);
        scaleBlock.style.setProperty('--rc-tuning-position', `${(clamped * 100).toFixed(2)}%`);
        return clamped;
      }

      function getRadioStationStrength(position) {
        const clampedPosition = clamp(position, 0, 1);
        const strongestStationDistance = RADIO_TUNING_STATION_POSITIONS.reduce(
          (closest, stationPosition) => Math.min(closest, Math.abs(clampedPosition - stationPosition)),
          Number.POSITIVE_INFINITY
        );
        const ratio = strongestStationDistance / RADIO_TUNING_STATION_WIDTH;
        return clamp(Math.exp(-(ratio * ratio) * 2), 0, 1);
      }

      function resetRadioTuningPlayback(audioEl) {
        audioEl.playbackRate = 1;
        audioEl.volume = 1;
      }

      function ensureRadioTuningLoopPlayback(audioEl) {
        if (!audioEl.paused) return;
        const playPromise = audioEl.play();
        if (playPromise && typeof playPromise.catch === 'function') {
          playPromise.catch(() => {});
        }
      }

      function stopRadioTuningLoopPlayback(audioEl) {
        audioEl.pause();
        audioEl.currentTime = 0;
        audioEl.playbackRate = 1;
        audioEl.volume = 1;
        if (audioEl.__radioTuningState) {
          audioEl.__radioTuningState.movementEnergy = 0;
        }
      }

      function getNextRadioTuningAudioUrl() {
        if (!flipClockRadioTuningAudioCycle.length) {
          flipClockRadioTuningAudioCycle = [...RADIO_TUNING_AUDIO_URLS];
          for (let i = flipClockRadioTuningAudioCycle.length - 1; i > 0; i -= 1) {
            const j = Math.floor(Math.random() * (i + 1));
            const swapValue = flipClockRadioTuningAudioCycle[i];
            flipClockRadioTuningAudioCycle[i] = flipClockRadioTuningAudioCycle[j];
            flipClockRadioTuningAudioCycle[j] = swapValue;
          }
        }
        return flipClockRadioTuningAudioCycle.pop();
      }

      function getRadioTuningAudioElement(audioUrl) {
        let audioEl = flipClockRadioTuningAudioElsByUrl.get(audioUrl);
        if (!audioEl) {
          audioEl = new Audio(audioUrl);
          audioEl.preload = 'auto';
          audioEl.loop = true;
          flipClockRadioTuningAudioElsByUrl.set(audioUrl, audioEl);
        }
        return audioEl;
      }

      function startFlipClock(container) {
        const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun',
                             'Jul','Aug','Sep','Oct','Nov','Dec'];

        // Cache card references once to avoid repeated DOM queries
        const cards = {
          h1: container.querySelector('[data-key="h1"]'),
          h2: container.querySelector('[data-key="h2"]'),
          m1: container.querySelector('[data-key="m1"]'),
          m2: container.querySelector('[data-key="m2"]'),
          ampm: container.querySelector('[data-key="ampm"]'),
          dateBadge: container.querySelector('[data-key="date-badge"]')
        };

        function tick(animate) {
          const now = new Date();
          const hours24 = now.getHours();
          const hh = String(hours24 % 12 || 12).padStart(2, ' ');
          const mm = String(now.getMinutes()).padStart(2, '0');
          const ampm = hours24 >= 12 ? 'PM' : 'AM';
          const dateBadge = `${MONTH_NAMES[now.getMonth()].toUpperCase()} ${String(now.getDate()).padStart(2, '0')}`;

          setFlipCard(cards.h1, hh[0], animate);
          setFlipCard(cards.h2, hh[1], animate);
          setFlipCard(cards.m1, mm[0], animate);
          setFlipCard(cards.m2, mm[1], animate);
          if (cards.ampm) {
            cards.ampm.textContent = ampm;
          }
          if (cards.dateBadge) {
            cards.dateBadge.textContent = dateBadge;
          }
        }

        tick(false); // Initial render without animation

        // Align the first animated tick to the next full second boundary,
        // then switch to a regular 1 s interval for subsequent ticks.
        const msUntilNextSecond = 1000 - new Date().getMilliseconds();
        flipClockAlignTimeoutId = setTimeout(() => {
          flipClockAlignTimeoutId = null;
          tick(true);
          flipClockIntervalId = setInterval(() => tick(true), 1000);
        }, msUntilNextSecond);
      }

      function applyTransforms() {
        world.style.transform = `translate3d(${-cameraX}px, 0, 0)`;
      }

      function setCameraX(nextCameraX) {
        cameraX = clamp(nextCameraX, 0, maxCameraX);
        applyTransforms();
      }

      function setTargetCameraX(nextCameraX) {
        const nextTarget = clamp(nextCameraX, 0, maxCameraX);
        if (targetCameraX === nextTarget) return;
        targetCameraX = nextTarget;
        startCameraAnimation();
      }

      function startCameraAnimation() {
        if (cameraAnimationFrameId !== null) return;
        cameraAnimationFrameId = window.requestAnimationFrame(tickCamera);
      }

      function tickCamera() {
        cameraAnimationFrameId = null;
        const delta = targetCameraX - cameraX;
        if (Math.abs(delta) < CAMERA_SETTLE_EPSILON) {
          setCameraX(targetCameraX);
          return;
        }
        setCameraX(cameraX + delta * CAMERA_SMOOTHING_FACTOR);
        startCameraAnimation();
      }

      function startMomentum(initialVelocityX) {
        stopMomentum();
        if (!shouldUseMomentum(activePointerType) || Math.abs(initialVelocityX) < TOUCH_MOMENTUM_MIN_VELOCITY) {
          return;
        }

        setCameraX(targetCameraX);
        targetCameraX = cameraX;
        momentumVelocityX = initialVelocityX;
        momentumAnimationFrameId = window.requestAnimationFrame(function tickMomentum(timestamp) {
          if (lastMomentumTimestamp === 0) {
            lastMomentumTimestamp = timestamp;
          }

          const elapsed = Math.max(1, timestamp - lastMomentumTimestamp);
          lastMomentumTimestamp = timestamp;
          momentumVelocityX *= Math.exp(-TOUCH_MOMENTUM_DECAY * elapsed);

          if (Math.abs(momentumVelocityX) < TOUCH_MOMENTUM_MIN_VELOCITY) {
            stopMomentum();
            return;
          }

          const previousCameraX = cameraX;
          setCameraX(cameraX + momentumVelocityX * elapsed);
          targetCameraX = cameraX;

          if (cameraX === previousCameraX) {
            stopMomentum();
            return;
          }

          momentumAnimationFrameId = window.requestAnimationFrame(tickMomentum);
        });
      }

      function resize() {
        scale = window.innerHeight / DESIGN_HEIGHT;
        visibleWidth = window.innerWidth / scale;
        maxCameraX = Math.max(0, worldWidth - visibleWidth);

        stage.style.width = `${worldWidth}px`;
        stage.style.transform = `scale(${scale}) translate3d(0, -50%, 0)`;
        world.style.width = `${worldWidth}px`;
        world.style.height = `${worldHeight}px`;

        // Start camera centered on the desk area in tile 0.
        if (!hasInitializedCamera) {
          setCameraX(DESK_CENTER_X - visibleWidth / 2);
          targetCameraX = cameraX;
          hasInitializedCamera = true;
        } else {
          setCameraX(cameraX);
          targetCameraX = cameraX;
        }
      }

      function onWheel(event) {
        event.preventDefault();
        stopMomentum();
        let unitScale = 1;
        if (event.deltaMode === DOM_DELTA_LINE) {
          unitScale = LINE_SCROLL_PIXELS;
        } else if (event.deltaMode === DOM_DELTA_PAGE) {
          unitScale = window.innerHeight;
        }
        // Map both vertical wheel and horizontal trackpad movement into horizontal camera travel.
        const useHorizontalAxis = Math.abs(event.deltaX) > Math.abs(event.deltaY);
        const primaryAxisDelta = useHorizontalAxis ? event.deltaX : event.deltaY;
        setTargetCameraX(targetCameraX + primaryAxisDelta * unitScale * WHEEL_SCROLL_MULTIPLIER);
      }

      function startDebugEdit(event, el, type, dir) {
        if (el.classList.contains('locked-debug-hotspot')) return;
        activePointerId = event.pointerId;
        debugEditType = type;
        debugEditEl = el;
        debugEditDir = dir;
        debugEditStartX = event.clientX;
        debugEditStartY = event.clientY;
        debugEditOrigRect = {
          left: parseFloat(el.style.left),
          top: parseFloat(el.style.top),
          w: parseFloat(el.style.width),
          h: parseFloat(el.style.height)
        };
        viewport.setPointerCapture(event.pointerId);
      }

      function applyDebugEdit(event) {
        const dx = (event.clientX - debugEditStartX) / scale;
        const dy = (event.clientY - debugEditStartY) / scale;
        const { left, top, w, h } = debugEditOrigRect;
        const el = debugEditEl;
        const MIN_SIZE = 20;

        if (debugEditType === 'move') {
          el.style.left = `${left + dx}px`;
          el.style.top = `${top + dy}px`;
        } else {
          const dir = debugEditDir;
          let newLeft = left;
          let newTop = top;
          let newW = w;
          let newH = h;

          if (dir.includes('e')) newW = Math.max(MIN_SIZE, w + dx);
          if (dir.includes('w')) {
            const clampedW = Math.max(MIN_SIZE, w - dx);
            newLeft = left + (w - clampedW);
            newW = clampedW;
          }
          if (dir.includes('s')) newH = Math.max(MIN_SIZE, h + dy);
          if (dir.includes('n')) {
            const clampedH = Math.max(MIN_SIZE, h - dy);
            newTop = top + (h - clampedH);
            newH = clampedH;
          }

          el.style.left   = `${newLeft}px`;
          el.style.top    = `${newTop}px`;
          el.style.width  = `${newW}px`;
          el.style.height = `${newH}px`;
        }

        if (OVERLAY_CONTROL_TO_OVERLAY_ID.has(el.id)) {

      function onPointerDown(event) {
        if (activePointerId !== null) return;
        stopMomentum();

        // In debug mode, intercept drags on hotspots and resize handles.
        if (document.body.classList.contains('debug')) {
          const handle = event.target.closest('.resize-handle');
          if (handle) {
            const hotspotEl = handle.closest('.hotspot');
            if (hotspotEl && !hotspotEl.classList.contains('locked-debug-hotspot')) {
              startDebugEdit(event, hotspotEl, 'resize', handle.dataset.dir);
              return;
            }
          }
          const hotspotEl = event.target.closest('.hotspot');
          if (hotspotEl && !hotspotEl.classList.contains('locked-debug-hotspot')) {
            startDebugEdit(event, hotspotEl, 'move', null);
            return;
          }

        activePointerId = event.pointerId;
        activePointerType = event.pointerType || '';
        pointerStartX = event.clientX;
        lastPointerX = event.clientX;
        lastPointerMoveTime = event.timeStamp;
        dragVelocityX = 0;
        dragStartedOnHotspot = Boolean(event.target.closest('.hotspot'));
        suppressHotspotClickUntil = 0;
      }

      function onPointerMove(event) {
        if (event.pointerId !== activePointerId) return;

        // Debug edit in progress — move or resize the hotspot.
        if (debugEditType !== null) {
          applyDebugEdit(event);
          return;
        }

        if (!isPointerDown) return;

        if (!isDragging) {
          const dragDistance = Math.abs(event.clientX - pointerStartX);
          if (dragDistance < DRAG_START_THRESHOLD_PX) {
            return;
          }
          isDragging = true;
          viewport.classList.add('dragging');
          viewport.setPointerCapture(event.pointerId);
          if (dragStartedOnHotspot) {
            suppressHotspotClickUntil = Date.now() + HOTSPOT_CLICK_SUPPRESSION_MS;

        const dx = event.clientX - lastPointerX;
        const elapsed = Math.max(1, event.timeStamp - lastPointerMoveTime);
        lastPointerX = event.clientX;
        lastPointerMoveTime = event.timeStamp;

        // Convert screen drag delta to design-space world delta.
        const dragScrollMultiplier = shouldUseMomentum(activePointerType)
          ? MOBILE_DRAG_SCROLL_MULTIPLIER
          : DESKTOP_DRAG_SCROLL_MULTIPLIER;
        const worldDelta = (-dx / scale) * dragScrollMultiplier;
        dragVelocityX = dragVelocityX * 0.75 + (worldDelta / elapsed) * 0.25;
        setTargetCameraX(targetCameraX + worldDelta);
      }

      function onPointerUp(event) {
        if (event.pointerId !== activePointerId) return;

        // End a debug edit operation.
        if (debugEditType !== null) {
          suppressHotspotClickUntil = Date.now() + HOTSPOT_CLICK_SUPPRESSION_MS;
          debugEditType = null;
          debugEditEl = null;
          debugEditDir = null;
          debugEditOrigRect = null;
          activePointerId = null;
          activePointerType = '';
          if (viewport.hasPointerCapture(event.pointerId)) {
            viewport.releasePointerCapture(event.pointerId);
          }
          return;
        }

        const shouldStartMomentum = isDragging && shouldUseMomentum(activePointerType);
        const releasedVelocityX = dragVelocityX;
        isPointerDown = false;
        activePointerId = null;
        activePointerType = '';
        dragStartedOnHotspot = false;
        isDragging = false;
        dragVelocityX = 0;
        viewport.classList.remove('dragging');
        if (viewport.hasPointerCapture(event.pointerId)) {
          viewport.releasePointerCapture(event.pointerId);
        }
        if (shouldStartMomentum) {
          startMomentum(releasedVelocityX);
        }
      }

      function onKeyDown(event) {
        const debugComboPressed =
          event.code === 'KeyD' &&
          (event.ctrlKey || event.metaKey) &&
          event.shiftKey;

      function setDebugMode(enabled) {
        document.body.classList.toggle('debug', enabled);

      function toggleDebugMode() {
        setDebugMode(!document.body.classList.contains('debug'));
      }

      async function saveHotspots() {
        const savedRuntimeHotspots = getSavedHotspotsFromDom();
        const savedSourceHotspots = runtimeHotspotsToSource(savedRuntimeHotspots);
        hotspots = savedRuntimeHotspots;
        hideSaveModal();

        setSaveButtonText('Saving...', true);
        try {
          await postHotspotsToServer(savedSourceHotspots);
          persistSaveResultFlash('Hotspots saved to the server.');
          setDebugMode(false);
          window.location.reload();
        } catch (error) {
          setSaveButtonText('Save failed');
          debugStatus.textContent = 'Server save failed; hotspots were not persisted (server-only mode).';
          showSaveFallbackModal(
            savedSourceHotspots,
            `Unable to save to the server (${error.message}) — hotspots were not persisted (server-only mode); copy the code below to update source manually`
          );
          resetSaveButtonSoon();
        }
      }

      function cleanup() {
        hideBigTvPromptOverlay();
        if (cameraAnimationFrameId !== null) {
          window.cancelAnimationFrame(cameraAnimationFrameId);
          cameraAnimationFrameId = null;
        }
        if (flipClockAlignTimeoutId !== null) {
          clearTimeout(flipClockAlignTimeoutId);
          flipClockAlignTimeoutId = null;
        }
        if (flipClockIntervalId !== null) {
          clearInterval(flipClockIntervalId);
          flipClockIntervalId = null;
        }
        if (flipClockRadioTuningAudioEl) {
          stopRadioTuningLoopPlayback(flipClockRadioTuningAudioEl);
          flipClockRadioTuningAudioEl.currentTime = 0;
        }
        stopMomentum();
      }

      async function initializeScene() {
        const serverHotspots = await loadHotspotsFromServer();
        const hasServerHotspots = serverHotspots !== null && serverHotspots !== undefined;
        hotspots = hasServerHotspots ? serverHotspots : sourceHotspotsToRuntime(defaultHotspots);

        createSceneTiles();
        createHotspots(hotspots);
        createOverlays();
        if (useLiteRendering) {
          document.body.classList.add('lite-rendering');
        }

        resize();

        const saveResultFlash = consumeSaveResultFlash();
        if (saveResultFlash) {
          debugStatus.textContent = saveResultFlash;
        } else {
          debugStatus.textContent = hasServerHotspots
            ? 'Hotspots loaded from the server.'
            : 'Server hotspots unavailable; loaded bundled default hotspots.';
        }
      }

      viewport.addEventListener('wheel', onWheel, { passive: false });
      viewport.addEventListener('pointerdown', onPointerDown);
      viewport.addEventListener('pointermove', onPointerMove);
      viewport.addEventListener('pointerup', onPointerUp);
      viewport.addEventListener('pointercancel', onPointerUp);
      hotspotLayer.addEventListener('click', (event) => {
        if (Date.now() < suppressHotspotClickUntil) {
          event.preventDefault();
          event.stopPropagation();
        }
      }, true);

      window.addEventListener('keydown', onKeyDown);
      window.addEventListener('keydown', handleBigTvPromptTyping);
      window.addEventListener('resize', resize);
      window.addEventListener('beforeunload', cleanup, { once: true });
      debugToggleButton.addEventListener('click', toggleDebugMode);

      saveBtn.addEventListener('click', saveHotspots);

      document.getElementById('save-modal-close-btn').addEventListener('click', hideSaveModal);

      document.getElementById('save-modal-copy-btn').addEventListener('click', (e) => {
        const btn = e.currentTarget;
        const copy = () => {
          btn.textContent = 'Copied!';
          setTimeout(() => { btn.textContent = 'Copy to clipboard'; }, 2000);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(saveModalTextarea.value).then(copy).catch(() => {
            saveModalTextarea.select();
            if (document.execCommand('copy')) copy();
          });
        } else {
          saveModalTextarea.select();
          if (document.execCommand('copy')) copy();
        }
      });

      // Close save modal on backdrop click
      saveModal.addEventListener('click', (event) => {
        if (event.target === event.currentTarget) {
          hideSaveModal();
        }
      });

      initializeScene();
    })();
  </script>
</body>
</html>
