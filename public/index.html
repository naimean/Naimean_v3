<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Den Scene</title>
  <link rel="preload" as="image" type="image/avif" href="assets/images/den_arcade.v20260528.avif" fetchpriority="high" />
    <link rel="stylesheet" href="assets/css/index.css" />
</head>
<body class="scene-loading">
  <div id="viewport" aria-label="Den side-scrolling scene">
    <div id="stage">
      <div id="world">
        <div class="layer" id="scene-layer" aria-hidden="true"></div>
        <div class="layer" id="hotspot-layer" aria-label="Interactive hotspots"></div>
        <div class="layer" id="screen-overlay-layer" aria-hidden="true"></div>
        <div class="layer" id="effects-layer" aria-hidden="true"></div>
      </div>
    </div>
  </div>
  <button id="debug-toggle-btn" type="button" aria-label="Toggle debug mode">🐛</button>
  <button id="save-hotspots-btn" type="button" aria-label="Save hotspot positions">Save</button>
  <div id="debug-object-controls" aria-label="Debug object controls">
    <label for="debug-object-select">Object</label>
    <select id="debug-object-select" aria-label="Select object for debug lock state"></select>
    <div id="debug-object-actions">
      <button id="debug-object-lock-btn" class="debug-object-action-btn" type="button">Lock</button>
      <button id="debug-object-unlock-btn" class="debug-object-action-btn" type="button">Unlock</button>
    </div>
    <div id="debug-url-row" hidden>
      <label for="debug-url-input">URL</label>
      <input type="url" id="debug-url-input" spellcheck="false" placeholder="https://…" autocomplete="off" />
      <button id="debug-url-save-btn" type="button">Save URL</button>
    </div>
  </div>
  <div id="save-modal" class="hidden" role="dialog" aria-modal="true" aria-labelledby="save-modal-title">
    <div id="save-modal-inner">
      <p id="save-modal-title">Unable to save to the server — copy the code below to update source manually</p>
      <textarea id="save-modal-textarea" readonly spellcheck="false"></textarea>
      <div id="save-modal-actions">
        <button type="button" class="save-modal-btn primary" id="save-modal-copy-btn">Copy to clipboard</button>
        <button type="button" class="save-modal-btn" id="save-modal-close-btn">Close</button>
      </div>
    </div>
  </div>
  <div id="discord-error-toast" class="hidden" role="alert">
    <span id="discord-error-toast-msg"></span>
    <button type="button" id="discord-error-toast-close" aria-label="Dismiss">✕</button>
  </div>
  <div id="debug-status" class="sr-only" role="status" aria-live="polite"></div>

    <script type="module" src="assets/js/index.js"></script>
</body>
</html>
